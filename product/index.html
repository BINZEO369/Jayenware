        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']

                    colors: {

    <style>
        :root {
            --primary: #1d1d1f;
            --accent: #86868b;
            --soft: #f5f5f7;
            --blue: #007aff;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        
        img { max-width: 100%; height: auto; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        
        .variant-btn {
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .variant-btn.selected {
            border-color: #1d1d1f !important;
            background: #1d1d1f !important;
            color: white !important;
        }
        
        #product-zoom-container {
            cursor: crosshair;
            overflow: hidden;
            position: relative;
        }
        #product-zoom-image {
            transition: transform 0.1s ease-out;
            will-change: transform;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .star-rating {
            direction: rtl;
            display: inline-flex;
        }
        .star-rating input[type="radio"] {
            display: none;
        }
        .star-rating label {
            color: #d2d2d7;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating input[type="radio"]:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ff9500;
        }
        
        #toast {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: calc(100vw - 32px);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .product-card {
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .product-card:hover {
            transform: translateY(-2px);
        }
        .product-card .product-image {
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .product-card:hover .product-image {
            transform: scale(1.03);
        }
        
        @media (max-width: 640px) {
            .product-img-container { aspect-ratio: 3/4; }
        }
        @media (min-width: 641px) {
            .product-img-container { aspect-ratio: 3/4; }
        }
        
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

    <script>

                console.error('Supabase initialization failed:', e);
                return null;
            }
        })();
        
        let currentProduct = null;
        let allProducts = [];
        let allVariants = [];
        let allReviews = [];
        let selectedVariantObj = null;
        let cart = [];
        let wishlist = [];
        
        // DOM Elements
        const loader = document.getElementById('global-loader');
        const notFoundDiv = document.getElementById('product-not-found');
        const loadingDiv = document.getElementById('product-loading');
        const contentDiv = document.getElementById('product-detail-content');
        const ctlSection = document.getElementById('complete-the-look-section');
        const ctlGrid = document.getElementById('complete-the-look-grid');
        const canonicalLink = document.getElementById('canonical-url');
        
        // Get slug from URL path
        function getSlugFromURL() {
            const path = window.location.pathname;
            let slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
            // Remove any query parameters
            slug = slug.split('?')[0];
            // Remove any hash
            slug = slug.split('#')[0];
            return slug || null;
        }
        
        // Generate slug from title
        function generateSlug(title) {
            if (!title) return '';
            return title.toLowerCase()
                .replace(/[^\w\s\u0980-\u09FF-]/g, '') // Allow Bengali characters
                .replace(/[\s_]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .substring(0, 80);
        }
        
        // Initialize from localStorage
        function initLocalStorage() {
            try {
                cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
                wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
            } catch(e) {
                cart = [];
                wishlist = [];
            }
        }
        
        // Toast notification
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            document.getElementById('toast-text').innerText = text;
            const icon = document.getElementById('toast-icon');
            
            if (type === 'success') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-green-100 text-green-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'error') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-red-100 text-red-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            } else {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-blue-100 text-blue-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-info"></i>';
            }
            
            toast.style.transform = 'translateX(0)';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
            }, 3000);
        }
        
        function hideToast() {
            const toast = document.getElementById('toast');
            if (toast) toast.style.transform = 'translateX(120%)';
        }
        
        // Update cart count
        function updateCartCount() {
            const countEl = document.getElementById('cart-count');
            if (countEl) countEl.innerText = cart.length;
        }
        
        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('jayen_cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        // Add to cart
        function addToCart(productId, buyNow = false) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return showToast('Product not found', 'error');
            
            // Check stock
            const cartItemCount = cart.filter(i => i.product_id === productId).length;
            if (cartItemCount >= product.stock) return showToast('Stock limit reached', 'error');
            
            let finalPrice = product.price;
            let variantId = null;
            let variantName = null;
            
            // Check if product has variants
            const hasVariants = allVariants.some(v => v.product_id === productId);
            
            if (hasVariants) {
                if (!selectedVariantObj) return showToast('Please select a variant', 'error');
                variantId = selectedVariantObj.id;
                variantName = selectedVariantObj.name;
                finalPrice = selectedVariantObj.price;
            }
            
            cart.push({
                id: Date.now(),
                product_id: product.id,
                variant_id: variantId,
                title: product.title,
                price: finalPrice,
                img: product.img,
                variant: variantName,
                quantity: 1
            });
            
            saveCart();
            showToast('Added to Bag!');
            
            if (buyNow) {
                window.location.href = '/checkout';
            }
        }
        
        // Toggle wishlist
        function toggleWishlist(productId) {
            if (wishlist.includes(productId)) {
                wishlist = wishlist.filter(x => x !== productId);
            } else {
                wishlist.push(productId);
            }
            localStorage.setItem('jayen_wish', JSON.stringify(wishlist));
            showToast('Wishlist Updated', 'info');
            
            // Update heart icon
            const heartBtn = document.querySelector('[data-wishlist-btn]');
            if (heartBtn) {
                const isWished = wishlist.includes(productId);
                heartBtn.querySelector('i').className = `fa-${isWished ? 'solid' : 'regular'} fa-heart`;
                heartBtn.classList.toggle('text-red-500', isWished);
                heartBtn.classList.toggle('text-gray-400', !isWished);
            }
        }
        
        // Select variant
        function selectVariant(btn, variantId, variantName, variantPrice) {
            document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedVariantObj = { id: variantId, name: variantName, price: variantPrice };
        }
        
        // Zoom image
        function zoomImage(e) {
            const container = document.getElementById('product-zoom-container');
            const img = document.getElementById('product-zoom-image');
            if (!container || !img) return;
            
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) / rect.width;
            const y = (clientY - rect.top) / rect.height;
            
            img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
            img.style.transform = 'scale(2)';
        }
        
        function resetZoom() {
            const img = document.getElementById('product-zoom-image');
            if (img) img.style.transform = 'scale(1)';
        }
        
        // Submit review
        async function submitReview(productId) {
            if (!_supabase) return showToast('Service unavailable', 'error');
            
            const text = document.getElementById('review-text')?.value?.trim();
            const starsInput = document.querySelector('input[name="product-rating"]:checked');
            
            if (!text || !starsInput) {
                return showToast('Please complete all fields', 'error');
            }
            
            const rating = parseInt(starsInput.value);
            
            try {
                const { error } = await _supabase.from('product_reviews').insert([{
                    product_id: productId,
                    user_name: 'Guest User',
                    rating: rating,
                    review_text: text
                }]);
                
                if (error) throw error;
                
                showToast('Review submitted! Thank you.', 'success');
                setTimeout(() => location.reload(), 1500);
            } catch(e) {
                showToast(e.message || 'Failed to submit review', 'error');
            }
        }
        
        // Product card HTML
        function productCardHTML(product) {
            if (!product) return '';
            const isOut = product.stock <= 0;
            const slug = product.slug || generateSlug(product.title);
            
            return `
            <a href="/product/${slug}" 
               class="product-card bg-white rounded-2xl overflow-hidden border border-gray-100 cursor-pointer group no-underline block">
                <div class="product-img-container" style="aspect-ratio:3/4; overflow:hidden; position:relative;">
                    <img src="${product.img || ''}" alt="${product.title || 'Product'}" class="product-image w-full h-full object-cover" loading="lazy" onerror="this.src='/logo.png'">
                    ${isOut ? `
                    <div class="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center">
                        <span class="bg-primary text-white text-[8px] sm:text-[10px] font-black px-2 sm:px-3 py-1 rounded-full uppercase">Sold Out</span>
                    </div>` : ''}
                </div>
                <div class="p-2.5 sm:p-4">
                    <p class="text-[9px] sm:text-[10px] font-bold text-accent uppercase mb-0.5 sm:mb-1">${product.category || ''}</p>
                    <h3 class="font-bold text-xs sm:text-sm text-primary truncate mb-1.5 sm:mb-2">${product.title || ''}</h3>
                    <span class="font-black text-xs sm:text-sm text-primary">৳ ${product.price || 0}</span>
                </div>
            </a>`;
        }
        
        // Get random related products
        function getRandomProducts(currentProductId, count = 4) {
            const available = allProducts.filter(p => p.id !== currentProductId);
            const shuffled = [...available].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }
        
        // Render product details
        function renderProductDetails(product) {
            currentProduct = product;
            const productSlug = product.slug || generateSlug(product.title);
            
            // Hide loading, show content
            if (loadingDiv) loadingDiv.classList.add('hidden');
            if (notFoundDiv) notFoundDiv.classList.add('hidden');
            if (contentDiv) contentDiv.classList.remove('hidden');
            
            // Update page title and meta
            document.title = `${product.title || 'Product'} | Buy Online at JAYENWARE`;
            
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.content = (product.description || product.title || 'Premium product').substring(0, 155) + '...';
            }
            
            // Update canonical URL
            if (canonicalLink) {
                canonicalLink.href = `https://jayenwaretest369.vercel.app/product/${productSlug}`;
            }
            
            const variants = allVariants.filter(v => v.product_id === product.id);
            const allImages = product.images ? product.images.split(',').filter(Boolean) : [];
            if (allImages.length === 0 && product.img) allImages.push(product.img);
            const prodReviews = allReviews.filter(r => r.product_id === product.id);
            const isOut = product.stock <= 0;
            
            // Set first variant as selected
            if (variants.length > 0) {
                selectedVariantObj = {
                    id: variants[0].id,
                    name: variants[0].name,
                    price: variants[0].price
                };
            } else {
                selectedVariantObj = null;
            }
            
            const avgRating = prodReviews.length > 0 
                ? (prodReviews.reduce((sum, r) => sum + r.rating, 0) / prodReviews.length).toFixed(1) 
                : null;
            
            const reviewsHTML = prodReviews.length ? prodReviews.map(r => `
                <div class="bg-white p-3 sm:p-4 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[#ff9500] text-sm">${'★'.repeat(r.rating || 0)}${'☆'.repeat(5 - (r.rating || 0))}</span>
                        <span class="text-[10px] sm:text-xs font-bold">${r.user_name || 'Anonymous'}</span>
                        <span class="text-[8px] sm:text-[9px] text-gray-400 ml-auto">${r.created_at ? new Date(r.created_at).toLocaleDateString() : ''}</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-gray-600">${r.review_text || ''}</p>
                </div>
            `).join('') : '<p class="text-gray-400 text-xs sm:text-sm italic">No reviews yet. Be the first to review!</p>';
            
            contentDiv.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 lg:gap-12 xl:gap-16 mb-8 sm:mb-10">
                <!-- Product Images -->
                <div>
                    <div id="product-zoom-container" class="rounded-3xl overflow-hidden bg-soft" 
                         style="aspect-ratio:3/4; max-height:70vh;" 
                         onmousemove="zoomImage(event)" 
                         onmouseleave="resetZoom()" 
                         ontouchmove="zoomImage(event)" 
                         ontouchend="resetZoom()">
                        <img id="product-zoom-image" src="${allImages[0] || '/logo.png'}" alt="${product.title || 'Product'}" onerror="this.src='/logo.png'">
                    </div>
                    ${allImages.length > 1 ? `
                    <div class="flex gap-1.5 sm:gap-2 mt-3 sm:mt-4 overflow-x-auto no-scrollbar pb-1">
                        ${allImages.map((img, i) => `
                        <img src="${img}" 
                             onclick="document.getElementById('product-zoom-image').src='${img}';resetZoom()" 
                             class="w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 object-cover rounded-xl cursor-pointer border-2 ${i === 0 ? 'border-primary' : 'border-transparent'} hover:border-primary transition shrink-0" 
                             loading="lazy" 
                             alt="${product.title || 'Product'} - Image ${i + 1}"
                             onerror="this.style.display='none'">
                        `).join('')}
                    </div>` : ''}
                </div>
                
                <!-- Product Info -->
                <div class="flex flex-col">
                    <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-blue">${product.category || ''}</span>
                    <h1 class="text-2xl sm:text-3xl lg:text-4xl xl:text-5xl font-bold tracking-tight text-primary mt-1 sm:mt-2 mb-4 sm:mb-6">${product.title || 'Product'}</h1>
                    
                    <div class="mb-4 sm:mb-6">
                        <span class="text-2xl sm:text-3xl font-black">৳ ${product.price || 0}</span>
                        ${product.old_price ? `<span class="ml-2 sm:ml-3 text-base sm:text-lg text-accent line-through">৳ ${product.old_price}</span>` : ''}
                    </div>
                    
                    <div class="flex items-center gap-2 mb-4 sm:mb-6">
                        <span class="w-2 h-2 rounded-full ${isOut ? 'bg-red-500' : 'bg-green-500'}"></span>
                        <span class="text-[10px] sm:text-xs font-bold ${isOut ? 'text-red-500' : 'text-green-600'}">
                            ${isOut ? 'Out of Stock' : `In Stock: ${product.stock || 0}`}
                        </span>
                        ${avgRating ? `<span class="text-[10px] sm:text-xs text-gray-400 ml-2"><i class="fa-solid fa-star text-[#ff9500] text-[9px]"></i> ${avgRating} (${prodReviews.length} reviews)</span>` : ''}
                    </div>
                    
                    <!-- Variants -->
                    ${variants.length ? `
                    <div class="mb-6 sm:mb-8">
                        <p class="text-[9px] sm:text-[10px] font-black uppercase text-accent mb-2 sm:mb-3">Select Variant</p>
                        <div class="flex flex-wrap gap-1.5 sm:gap-2" id="detail-variant-container">
                            ${variants.map((v, i) => `
                            <button onclick="selectVariant(this, '${v.id}', '${(v.name || '').replace(/'/g, "\\'")}', ${v.price || 0})" 
                                    class="variant-btn px-4 sm:px-5 py-2.5 sm:py-3 border-2 border-gray-200 rounded-2xl text-[10px] sm:text-xs font-bold transition hover:border-primary ${i === 0 ? 'selected' : ''}" 
                                    data-vid="${v.id}">
                                ${v.name || ''} - ৳${v.price || 0}
                            </button>`).join('')}
                        </div>
                    </div>` : ''}
                    
                    <!-- Buttons -->
                    <div class="grid grid-cols-2 gap-2 sm:gap-3 mb-6 sm:mb-8">
                        <button onclick="addToCart(${product.id})" ${isOut ? 'disabled' : ''} 
                                class="py-3 sm:py-4 ${isOut ? 'bg-gray-200 cursor-not-allowed' : 'bg-primary hover:bg-blue'} text-white rounded-2xl font-bold text-[10px] sm:text-xs uppercase tracking-wider transition">
                            Add to Bag
                        </button>
                        <button onclick="addToCart(${product.id}, true)" ${isOut ? 'disabled' : ''} 
                                class="py-3 sm:py-4 ${isOut ? 'bg-gray-100 cursor-not-allowed' : 'bg-white border-2 border-primary hover:bg-primary hover:text-white'} rounded-2xl font-bold text-[10px] sm:text-xs uppercase tracking-wider transition">
                            Buy Now
                        </button>
                    </div>
                    
                    <!-- Wishlist Button -->
                    <button onclick="toggleWishlist(${product.id})" data-wishlist-btn
                            class="mb-4 flex items-center gap-2 px-4 py-2 rounded-full border border-gray-200 text-[10px] font-bold uppercase tracking-wider hover:bg-gray-50 transition w-fit">
                        <i class="fa-${wishlist.includes(product.id) ? 'solid' : 'regular'} fa-heart ${wishlist.includes(product.id) ? 'text-red-500' : 'text-gray-400'}"></i>
                        ${wishlist.includes(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist'}
                    </button>
                    
                    <!-- Description -->
                    ${product.description ? `
                    <div class="bg-soft p-4 sm:p-6 rounded-2xl mb-6">
                        <h3 class="font-bold text-[10px] sm:text-xs uppercase mb-2">Description</h3>
                        <p class="text-xs sm:text-sm text-gray-600 leading-relaxed">${product.description}</p>
                    </div>` : ''}
                    
                    <!-- Additional Info -->
                    <div class="bg-soft p-4 sm:p-6 rounded-2xl mb-6">
                        <h3 class="font-bold text-[10px] sm:text-xs uppercase mb-3">Product Details</h3>
                        <div class="grid grid-cols-2 gap-2 text-[10px] sm:text-xs">
                            ${product.fabric_type ? `<div><span class="text-gray-400">Fabric:</span> <span class="font-bold">${product.fabric_type}</span></div>` : ''}
                            ${product.gsm_type ? `<div><span class="text-gray-400">GSM:</span> <span class="font-bold">${product.gsm_type}</span></div>` : ''}
                            ${product.fit_type ? `<div><span class="text-gray-400">Fit:</span> <span class="font-bold">${product.fit_type}</span></div>` : ''}
                            ${product.gender ? `<div><span class="text-gray-400">Gender:</span> <span class="font-bold">${product.gender}</span></div>` : ''}
                            ${product.print_type ? `<div><span class="text-gray-400">Print:</span> <span class="font-bold">${product.print_type}</span></div>` : ''}
                            ${product.sku ? `<div class="col-span-2"><span class="text-gray-400">SKU:</span> <span class="font-bold text-[9px]">${product.sku}</span></div>` : ''}
                        </div>
                    </div>
                    
                    <!-- Trust Badges -->
                    <div class="flex flex-wrap gap-1.5 sm:gap-2 mt-auto">
                        <div class="flex items-center gap-1 bg-green-50 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px]">
                            <i class="fa-solid fa-shield-halved text-green-600"></i> 100% Authentic
                        </div>
                        <div class="flex items-center gap-1 bg-blue-50 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px]">
                            <i class="fa-solid fa-truck-fast text-blue-600"></i> Fast Delivery
                        </div>
                        <div class="flex items-center gap-1 bg-yellow-50 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px]">
                            <i class="fa-solid fa-rotate-left text-yellow-600"></i> Easy Returns
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Reviews Section -->
            <div class="border-t pt-8 sm:pt-10">
                <div class="flex items-center gap-3 mb-6">
                    <h3 class="text-xl sm:text-2xl font-bold tracking-tight text-primary">Customer Reviews</h3>
                    <span class="text-xs sm:text-sm text-gray-400 font-bold">(${prodReviews.length})</span>
                </div>
                <div class="space-y-3 sm:space-y-4 mb-6 sm:mb-8">
                    ${reviewsHTML}
                </div>
                
                <!-- Review Form -->
                <div class="bg-soft p-4 sm:p-5 rounded-2xl">
                    <h4 class="font-bold text-[10px] sm:text-xs uppercase mb-3">Write a Review</h4>
                    <div class="star-rating mb-3" id="review-stars">
                        <input type="radio" id="star5" name="product-rating" value="5">
                        <label for="star5"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" id="star4" name="product-rating" value="4">
                        <label for="star4"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" id="star3" name="product-rating" value="3">
                        <label for="star3"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" id="star2" name="product-rating" value="2">
                        <label for="star2"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" id="star1" name="product-rating" value="1">
                        <label for="star1"><i class="fa-solid fa-star"></i></label>
                    </div>
                    <textarea id="review-text" placeholder="Share your experience..." 
                              class="w-full p-3 border rounded-xl text-xs h-20 mb-3 outline-none focus:border-blue transition"></textarea>
                    <button onclick="submitReview(${product.id})" 
                            class="px-6 py-2.5 bg-primary text-white rounded-full text-[10px] font-bold uppercase hover:bg-blue transition">
                        Submit Review
                    </button>
                </div>
            </div>`;
            
            // Render related products
            const related = getRandomProducts(product.id, 4);
            if (related.length > 0) {
                ctlSection.classList.remove('hidden');
                ctlGrid.innerHTML = related.map(p => productCardHTML(p)).join('');
            } else {
                ctlSection.classList.add('hidden');
            }
        }
        
        // Load product by slug from Supabase
        async function loadProductBySlug(slug) {
            if (!_supabase) {
                console.error('Supabase client not initialized');
                return false;
            }
            
            try {
                // Fetch all active products
                const { data: products, error: productsError } = await _supabase
                    .from('products')
                    .select('*')
                    .eq('status', 'Active');
                
                if (productsError) {
                    console.error('Products fetch error:', productsError);
                    throw productsError;
                }
                
                allProducts = products || [];
                console.log(`Loaded ${allProducts.length} products, looking for slug: "${slug}"`);
                
                // Find product by slug or generate slug from title for matching
                const product = allProducts.find(p => {
                    const productSlug = p.slug || generateSlug(p.title);
                    console.log(`  Checking: "${productSlug}" === "${slug}"`);
                    return productSlug === slug;
                });
                
                if (!product) {
                    console.warn(`No product found for slug: "${slug}"`);
                    // Debug: show all available slugs
                    console.log('Available slugs:', allProducts.map(p => p.slug || generateSlug(p.title)));
                    return false;
                }
                
                console.log('Found product:', product.title);
                
                // Fetch variants for this product
                const { data: variants, error: variantsError } = await _supabase
                    .from('product_variants')
                    .select('*')
                    .eq('product_id', product.id);
                
                if (variantsError) console.warn('Variants fetch error:', variantsError);
                allVariants = variants || [];
                
                // Fetch reviews for this product
                const { data: reviews, error: reviewsError } = await _supabase
                    .from('product_reviews')
                    .select('*')
                    .eq('product_id', product.id)
                    .order('created_at', { ascending: false });
                
                if (reviewsError) console.warn('Reviews fetch error:', reviewsError);
                allReviews = reviews || [];
                
                // Add to recently viewed
                try {
                    let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
                    recent = [product.id.toString(), ...recent.filter(id => id !== product.id.toString())].slice(0, 8);
                    localStorage.setItem('jayen_recent', JSON.stringify(recent));
                } catch(e) {}
                
                renderProductDetails(product);
                return true;
                
            } catch (error) {
                console.error('Error loading product:', error);
                return false;
            }
        }
        
        // Hide loader
        function hideLoader() {
            if (loader) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 600);
            }
        }
        
        // Show not found
        function showNotFound() {
            hideLoader();
            if (loadingDiv) loadingDiv.classList.add('hidden');
            if (contentDiv) contentDiv.innerHTML = '';
            if (ctlSection) ctlSection.classList.add('hidden');
            if (notFoundDiv) notFoundDiv.classList.remove('hidden');
        }
        
        // Initialize page
        async function initProductPage() {
            initLocalStorage();
            updateCartCount();
            
            const slug = getSlugFromURL();
            console.log('Product page initialized. Slug from URL:', slug);
            
            if (!slug) {
                console.warn('No slug found in URL');
                showNotFound();
                return;
            }
            
            // Show loading state
            if (loadingDiv) loadingDiv.classList.remove('hidden');
            if (notFoundDiv) notFoundDiv.classList.add('hidden');
            if (contentDiv) contentDiv.innerHTML = '';
            
            const found = await loadProductBySlug(slug);
            
            if (!found) {
                showNotFound();
            } else {
                hideLoader();
            }
        }
        
        // Start the page
        document.getElementById('display-year').innerText = new Date().getFullYear();
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initProductPage);
        } else {
            initProductPage();
        }
        
        // Export for global access
        window.addToCart = addToCart;
        window.toggleWishlist = toggleWishlist;
        window.selectVariant = selectVariant;
        window.zoomImage = zoomImage;
        window.resetZoom = resetZoom;
        window.submitReview = submitReview;
        window.hideToast = hideToast;
    </script>
</body>
</html>
