<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- Dynamic title & SEO will be injected by JS -->
  <title>Product | JAYENWARE</title>
  <meta name="description" content="Shop premium lifestyle product at JAYENWARE official store. Fast delivery across Bangladesh.">
  <meta name="theme-color" content="#1d1d1f">
  <meta property="og:title" content="Product | JAYENWARE">
  <meta property="og:description" content="Discover quality fashion at JAYENWARE.">
  <meta property="og:image" content="https://www.jayenware.shop/logo.png">
  <meta property="og:url" content="https://www.jayenware.shop/product">
  <meta property="og:type" content="product">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://www.jayenware.shop/product">
  <link rel="icon" type="image/png" sizes="32x32" href="https://www.jayenware.shop/logo.png">
  <link rel="apple-touch-icon" href="https://www.jayenware.shop/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Supabase config must be globally accessible; using same pattern as original -->
  <script src="/api-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          }
        }
      }
    }
  </script>
  <style>
    :root { --primary: #1d1d1f; --accent: #86868b; --soft: #f5f5f7; --blue: #007aff; }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #ffffff; color: #1d1d1f; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; padding-top: 80px; }
    @media (min-width: 1024px) { main { padding-top: 96px; } }
    .glass-nav {
      background: rgba(255,255,255,0.92); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
      border-bottom: 1px solid rgba(0,0,0,0.06); position: fixed; width: 100%; top: 0; z-index: 50;
    }
    .product-img-container { background: #f5f5f7; border-radius: 24px; overflow: hidden; aspect-ratio: 3/4; }
    #zoom-image { transition: transform 0.1s ease-out; will-change: transform; cursor: crosshair; }
    .variant-btn { transition: all 0.2s ease; white-space: nowrap; }
    .variant-btn.selected { border-color: #1d1d1f !important; background: #1d1d1f !important; color: white !important; }
    .star-rating { direction: rtl; display: inline-flex; }
    .star-rating input[type="radio"] { display: none; }
    .star-rating label { color: #d2d2d7; font-size: 20px; cursor: pointer; transition: color 0.2s; }
    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover, .star-rating label:hover ~ label { color: #ff9500; }
    #toast {
      position: fixed; top: 16px; right: 16px; z-index: 200; transform: translateX(120%);
      transition: transform 0.35s ease; max-width: calc(100vw - 32px);
    }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body class="antialiased">

  <!-- Toast notification -->
  <div id="toast">
    <div class="bg-white shadow-2xl rounded-2xl p-3 flex items-center gap-3 min-w-[260px] border border-gray-100">
      <span id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0"></span>
      <p id="toast-text" class="text-xs font-bold flex-grow"></p>
      <button onclick="hideToast()" class="text-gray-300 hover:text-gray-600 shrink-0"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="glass-nav">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 lg:h-20 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 sm:gap-3 no-underline text-primary">
        <img src="https://www.jayenware.shop/logo.png" class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg" alt="JAYENWARE Logo">
        <span class="text-xl lg:text-2xl font-black font-serif tracking-tight">JAYENWARE</span>
      </a>
      <div class="flex items-center gap-3 lg:gap-5">
        <a href="/products" class="text-xs font-bold uppercase tracking-wider text-primary hover:text-blue transition no-underline hidden sm:inline">All Products</a>
        <a href="/" class="text-xs font-bold uppercase tracking-wider text-primary hover:text-blue transition no-underline">Home</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-10">
      <!-- Back link -->
      <a href="/products" class="inline-flex items-center gap-2 text-xs font-bold text-gray-400 hover:text-primary transition mb-6 lg:mb-8 no-underline">
        <i class="fa-solid fa-arrow-left"></i> Back to Collection
      </a>

      <!-- Product skeleton / content injected here -->
      <div id="product-content" class="animate-pulse">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
          <div class="product-img-container bg-gray-200"></div>
          <div class="space-y-4">
            <div class="h-4 bg-gray-200 rounded w-1/4"></div>
            <div class="h-8 bg-gray-200 rounded w-3/4"></div>
            <div class="h-6 bg-gray-200 rounded w-1/3"></div>
            <div class="h-20 bg-gray-200 rounded"></div>
          </div>
        </div>
      </div>

      <!-- Complete the look section -->
      <div id="complete-look-section" class="mt-16 lg:mt-20 border-t pt-10 hidden">
        <h3 class="text-2xl font-bold tracking-tight text-primary mb-6">Complete the Look</h3>
        <div id="complete-look-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 lg:gap-6"></div>
      </div>
    </div>
  </main>

  <footer class="bg-primary text-gray-400 py-8 mt-10">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-xs uppercase tracking-wider">© <span id="display-year"></span> JAYENWARE. A concern of BINZEO.</p>
    </div>
  </footer>

  <script>
    // ---------- SUPABASE CLIENT ----------
    const _supabase = supabase.createClient(
      window.SUPABASE_URL || 'https://vdqbjwzixppbtkbgvhlq.supabase.co',
      window.SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcWJqd3ppeHBwYnRrYmd2aGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ2NjYwNjcsImV4cCI6MjA2MDI0MjA2N30.lSWgT7R4N1XkQH3MxH4fFwKQaJ8YlZ9t0vXaJxZ9t0vX'
    );

    // Global state
    let allProducts = [];
    let allVariants = [];
    let allReviews = [];
    let currentProduct = null;
    let selectedVariant = null;

    // ---------- UTILS ----------
    function getProductSlug(product) {
      if (!product || !product.title) return '';
      return product.title.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '').substring(0, 80);
    }

    function showToast(text, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').innerText = text;
      const icon = document.getElementById('toast-icon');
      if (type === 'success') {
        icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-green-100 text-green-600 shrink-0';
        icon.innerHTML = '<i class="fa-solid fa-check"></i>';
      } else if (type === 'error') {
        icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-red-100 text-red-600 shrink-0';
        icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
      } else {
        icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-blue-100 text-blue-600 shrink-0';
        icon.innerHTML = '<i class="fa-solid fa-info"></i>';
      }
      toast.style.transform = 'translateX(0)';
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => { toast.style.transform = 'translateX(120%)'; }, 3000);
    }
    function hideToast() { document.getElementById('toast').style.transform = 'translateX(120%)'; }

    // ---------- DATA FETCH ----------
    async function fetchAllData() {
      const [prodRes, varRes, revRes] = await Promise.all([
        _supabase.from('products').select('*').order('created_at', { ascending: false }),
        _supabase.from('product_variants').select('*'),
        _supabase.from('product_reviews').select('*')
      ]);
      if (prodRes.data) allProducts = prodRes.data;
      if (varRes.data) allVariants = varRes.data;
      if (revRes.data) allReviews = revRes.data;
    }

    // ---------- FIND PRODUCT BY SLUG ----------
    function findProductBySlug() {
      const path = window.location.pathname;
      // Expected pattern: /product/your-product-slug
      const parts = path.split('/').filter(p => p);
      if (parts.length < 2 || parts[0] !== 'product') return null;
      const slug = parts[1];
      return allProducts.find(p => getProductSlug(p) === slug) || null;
    }

    // ---------- RENDER PRODUCT DETAIL ----------
    function renderProductDetail(product) {
      currentProduct = product;
      selectedVariant = null;
      if (!product) {
        document.getElementById('product-content').innerHTML = `<div class="text-center py-20"><h2 class="text-2xl font-bold">Product not found</h2><a href="/products" class="text-blue font-bold mt-4 inline-block">Browse collection</a></div>`;
        return;
      }

      // Update SEO dynamically
      document.title = `${product.title} | Buy Online at JAYENWARE`;
      const descMeta = document.querySelector('meta[name="description"]');
      if (descMeta) descMeta.content = (product.description || '').substring(0, 155) + '...';
      document.querySelector('meta[property="og:title"]').setAttribute('content', product.title + ' | JAYENWARE');
      document.querySelector('meta[property="og:description"]').setAttribute('content', (product.description || '').substring(0, 155));
      document.querySelector('meta[property="og:image"]').setAttribute('content', product.img);
      document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.href = window.location.href;

      const variants = allVariants.filter(v => v.product_id === product.id);
      const productReviews = allReviews.filter(r => r.product_id === product.id);
      const allImages = product.images ? product.images.split(',') : [product.img];
      const isOutOfStock = product.stock <= 0;

      // Build variant buttons HTML
      let variantHTML = '';
      if (variants.length) {
        variantHTML = `
          <div class="mb-6">
            <p class="text-xs font-black uppercase text-accent mb-3">Select Variant</p>
            <div class="flex flex-wrap gap-2" id="variant-container">
              ${variants.map((v, idx) => `
                <button onclick="selectVariant(this, '${v.id}', '${v.name}', ${v.price})" 
                  class="variant-btn px-5 py-2.5 border-2 rounded-2xl text-xs font-bold transition ${idx === 0 ? 'selected' : ''}" 
                  data-vid="${v.id}">${v.name} - ৳${v.price}</button>
              `).join('')}
            </div>
          </div>`;
        // Set initial selected variant
        selectedVariant = { id: variants[0].id, name: variants[0].name, price: variants[0].price };
      }

      // Reviews HTML
      const reviewsHTML = productReviews.length ? productReviews.map(r => `
        <div class="bg-white p-4 rounded-xl border">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-[#ff9500] text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
            <span class="text-xs font-bold">${r.user_name || 'Anonymous'}</span>
            <span class="text-[10px] text-gray-400 ml-auto">${new Date(r.created_at).toLocaleDateString()}</span>
          </div>
          <p class="text-xs text-gray-600">${r.review_text}</p>
        </div>
      `).join('') : '<p class="text-gray-400 text-sm italic">No reviews yet.</p>';

      const reviewFormHTML = `
        <div class="bg-soft p-5 rounded-2xl mt-6">
          <h4 class="font-bold text-xs uppercase mb-3">Write a Review</h4>
          <div class="star-rating mb-3" id="review-stars">
            <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
          </div>
          <textarea id="review-text" placeholder="Share your experience..." class="w-full p-3 border rounded-xl text-xs h-20 mb-3 outline-none"></textarea>
          <button onclick="submitReview()" class="px-6 py-2.5 bg-primary text-white rounded-full text-xs font-bold uppercase hover:bg-blue transition">Submit</button>
        </div>`;

      const mainHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
          <div>
            <div id="zoom-container" class="product-img-container" onmousemove="zoomImage(event)" onmouseleave="resetZoom()" ontouchmove="zoomImage(event)" ontouchend="resetZoom()">
              <img id="zoom-image" src="${allImages[0]}" alt="${product.title}" class="w-full h-full object-cover">
            </div>
            <div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1">
              ${allImages.map(img => `<img src="${img}" onclick="document.getElementById('zoom-image').src='${img}';resetZoom()" class="w-16 h-16 lg:w-20 lg:h-20 object-cover rounded-xl cursor-pointer border-2 border-transparent hover:border-primary transition shrink-0" alt="view">`).join('')}
            </div>
          </div>
          <div class="flex flex-col">
            <span class="text-xs font-bold uppercase tracking-wider text-blue">${product.category}</span>
            <h1 class="text-2xl lg:text-4xl font-bold tracking-tight mt-2 mb-4">${product.title}</h1>
            <div class="mb-4"><span class="text-3xl font-black">৳ ${product.price}</span>${product.old_price ? `<span class="ml-3 text-lg text-accent line-through">৳${product.old_price}</span>` : ''}</div>
            <div class="flex items-center gap-2 mb-4">
              <span class="w-2 h-2 rounded-full ${isOutOfStock ? 'bg-red-500' : 'bg-green-500'}"></span>
              <span class="text-xs font-bold ${isOutOfStock ? 'text-red-500' : 'text-green-600'}">${isOutOfStock ? 'Out of Stock' : `In Stock: ${product.stock}`}</span>
              ${productReviews.length ? `<span class="text-xs text-gray-400 ml-2"><i class="fa-solid fa-star text-[#ff9500] text-xs"></i> ${(productReviews.reduce((s,r)=>s+r.rating,0)/productReviews.length).toFixed(1)}</span>` : ''}
            </div>
            ${variantHTML}
            <div class="grid grid-cols-2 gap-3 mb-6">
              <button onclick="addToCart()" ${isOutOfStock ? 'disabled' : ''} class="py-3.5 ${isOutOfStock ? 'bg-gray-200' : 'bg-primary hover:bg-blue'} text-white rounded-2xl font-bold text-xs uppercase tracking-wider transition">Add to Bag</button>
              <button onclick="buyNow()" ${isOutOfStock ? 'disabled' : ''} class="py-3.5 border-2 border-primary rounded-2xl font-bold text-xs uppercase hover:bg-primary hover:text-white transition">Buy Now</button>
            </div>
            <div class="bg-soft p-5 rounded-2xl">
              <h3 class="font-bold text-xs uppercase mb-2">Description</h3>
              <p class="text-sm text-gray-600 leading-relaxed">${product.description}</p>
            </div>
          </div>
        </div>
        <div class="border-t pt-10 mt-10">
          <h3 class="text-xl font-bold mb-4">Customer Reviews (${productReviews.length})</h3>
          <div class="space-y-3">${reviewsHTML}</div>
          ${reviewFormHTML}
        </div>`;

      document.getElementById('product-content').innerHTML = mainHTML;
      document.getElementById('product-content').classList.remove('animate-pulse');
      renderCompleteTheLook(product);
    }

    // Variant selection
    window.selectVariant = function(btn, vId, vName, vPrice) {
      document.querySelectorAll('#variant-container .variant-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedVariant = { id: vId, name: vName, price: vPrice };
    };

    // Zoom
    window.zoomImage = function(e) {
      const container = document.getElementById('zoom-container');
      const img = document.getElementById('zoom-image');
      if (!container || !img) return;
      const rect = container.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;
      img.style.transformOrigin = `${x*100}% ${y*100}%`;
      img.style.transform = 'scale(2)';
    };
    window.resetZoom = function() {
      const img = document.getElementById('zoom-image');
      if (img) img.style.transform = 'scale(1)';
    };

    // Cart actions (simple localStorage based)
    function addToCart(buyNow = false) {
      if (!currentProduct) return;
      let finalPrice = currentProduct.price;
      let variantId = null, variantName = null;
      const hasVariants = allVariants.some(v => v.product_id === currentProduct.id);
      if (hasVariants) {
        if (!selectedVariant) return showToast('Please select a variant', 'error');
        variantId = selectedVariant.id;
        variantName = selectedVariant.name;
        finalPrice = selectedVariant.price;
      }
      let cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
      cart.push({
        id: Date.now(),
        product_id: currentProduct.id,
        variant_id: variantId,
        title: currentProduct.title,
        price: finalPrice,
        img: currentProduct.img,
        variant: variantName,
        quantity: 1
      });
      localStorage.setItem('jayen_cart', JSON.stringify(cart));
      showToast('Added to bag!');
      if (buyNow) window.location.href = '/cart';
    }
    window.addToCart = () => addToCart(false);
    window.buyNow = () => addToCart(true);

    // Submit review (anonymous allowed for demo)
    window.submitReview = async function() {
      const text = document.getElementById('review-text')?.value;
      const starsEl = document.querySelector('input[name="rating"]:checked');
      if (!text || !starsEl || !currentProduct) return showToast('Complete all fields', 'error');
      const { error } = await _supabase.from('product_reviews').insert([{
        product_id: currentProduct.id,
        user_name: 'Guest',
        rating: parseInt(starsEl.value),
        review_text: text
      }]);
      if (error) showToast(error.message, 'error');
      else {
        showToast('Review submitted!');
        setTimeout(() => location.reload(), 1500);
      }
    };

    function renderCompleteTheLook(product) {
      const grid = document.getElementById('complete-look-grid');
      const section = document.getElementById('complete-look-section');
      // Random 4 products from same category, excluding current
      const related = allProducts.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
      if (!related.length) {
        section.classList.add('hidden');
        return;
      }
      section.classList.remove('hidden');
      grid.innerHTML = related.map(p => {
        const slug = getProductSlug(p);
        return `<a href="/product/${slug}" class="bg-white rounded-2xl border no-underline text-primary overflow-hidden group">
          <div class="aspect-[3/4] bg-soft"><img src="${p.img}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"></div>
          <div class="p-3"><p class="text-xs font-bold truncate">${p.title}</p><p class="font-black text-sm">৳${p.price}</p></div>
        </a>`;
      }).join('');
    }

    // ---------- INIT ----------
    async function init() {
      document.getElementById('display-year').innerText = new Date().getFullYear();
      await fetchAllData();
      const product = findProductBySlug();
      renderProductDetail(product);
    }

    window.addEventListener('DOMContentLoaded', init);
    // Handle popstate (browser back/forward)
    window.addEventListener('popstate', () => {
      const product = findProductBySlug();
      renderProductDetail(product);
    });
  </script>
</body>
</html>
