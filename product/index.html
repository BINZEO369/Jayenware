<!DOCTYPE html>
<html lang="en-BD">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Product Details | JAYENWARE</title>
    
    <meta name="description" content="Shop premium products at JAYENWARE official store">
    <meta name="theme-color" content="#1d1d1f">
    
    <meta property="og:title" content="JAYENWARE Product">
    <meta property="og:description" content="Premium lifestyle products by BINZEO">
    <meta property="og:image" content="https://www.jayenware.shop/logo.png">
    <meta property="og:url" id="og-url" content="https://www.jayenware.shop/">
    <meta property="og:type" content="product">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="JAYENWARE Product">
    <meta name="twitter:description" content="Premium lifestyle products by BINZEO">
    <meta name="twitter:image" content="https://www.jayenware.shop/logo.png">
    
    <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/">
    <link rel="icon" type="image/png" href="https://www.jayenware.shop/logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/api-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    colors: {
                        primary: '#1d1d1f',
                        accent: '#86868b',
                        soft: '#f5f5f7',
                        blue: '#007aff'
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        main {
            flex-grow: 1;
            padding-top: 72px;
            padding-bottom: 40px;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .variant-btn {
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .variant-btn.selected {
            border-color: #1d1d1f !important;
            background: #1d1d1f !important;
            color: white !important;
        }
        
        #product-zoom-container {
            cursor: crosshair;
            overflow: hidden;
        }
        #product-zoom-image {
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        
        .star-rating {
            direction: rtl;
            display: inline-flex;
        }
        .star-rating input[type="radio"] {
            display: none;
        }
        .star-rating label {
            color: #d2d2d7;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating input[type="radio"]:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ff9500;
        }
        
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            max-width: calc(100vw - 32px);
        }
        .toast-container.show {
            transform: translateX(0);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e5e5;
            border-top-color: #1d1d1f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            main {
                padding-top: 60px;
            }
            .product-img-container {
                aspect-ratio: 3/4;
            }
        }
        
        @media (min-width: 641px) and (max-width: 1023px) {
            .product-img-container {
                aspect-ratio: 3/4;
            }
        }
        
        @media (min-width: 1024px) {
            .product-img-container {
                aspect-ratio: 3/4;
            }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Toast Notification -->
    <div id="toast" class="toast-container">
        <div class="bg-white shadow-2xl rounded-2xl p-3 flex items-center gap-3 min-w-[260px] border border-gray-100">
            <span id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0"></span>
            <p id="toast-text" class="text-xs font-bold flex-grow"></p>
            <button onclick="hideToast()" class="text-gray-300 hover:text-gray-600 shrink-0">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-4 h-14 sm:h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 no-underline">
                <img src="https://www.jayenware.shop/logo.png" class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg" alt="JAYENWARE Logo">
                <span class="text-lg sm:text-xl font-black font-serif text-primary">JAYENWARE</span>
            </a>
            <div class="flex items-center gap-3 sm:gap-4">
                <a href="/products" class="hidden sm:block text-xs font-bold uppercase tracking-wider text-primary hover:text-blue transition no-underline">
                    Shop All
                </a>
                <a href="/wishlist" class="relative p-1.5 no-underline text-primary hover:text-blue transition">
                    <i class="fa-regular fa-heart text-lg sm:text-xl"></i>
                    <span id="wish-count" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">0</span>
                </a>
                <a href="/cart" class="relative p-1.5 no-underline text-primary hover:text-blue transition">
                    <i class="fa-solid fa-bag-shopping text-lg sm:text-xl"></i>
                    <span id="cart-count" class="absolute -top-0.5 -right-0.5 bg-primary text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="max-w-7xl mx-auto px-3 sm:px-4">
            <!-- Breadcrumb -->
            <div class="mb-6">
                <a href="/" class="text-xs font-bold text-gray-400 hover:text-primary transition flex items-center gap-2 no-underline">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
            
            <!-- Loading State -->
            <div id="loading-state" class="text-center py-20">
                <div class="loading-spinner"></div>
                <p class="text-sm text-gray-400 mt-4">Loading product details...</p>
            </div>
            
            <!-- Product Content -->
            <div id="product-content" class="hidden"></div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden text-center py-20">
                <i class="fa-solid fa-circle-exclamation text-5xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-bold text-gray-500 mb-2">Product Not Found</h2>
                <p class="text-sm text-gray-400 mb-6">The product you're looking for doesn't exist or has been removed.</p>
                <div class="flex gap-3 justify-center">
                    <a href="/" class="px-6 py-3 bg-primary text-white rounded-full text-xs font-bold uppercase hover:bg-blue transition no-underline inline-block">
                        Go Home
                    </a>
                    <a href="/products" class="px-6 py-3 border-2 border-primary text-primary rounded-full text-xs font-bold uppercase hover:bg-primary hover:text-white transition no-underline inline-block">
                        Browse Products
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-gray-400 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h4 class="text-white font-black font-serif text-lg mb-2">JAYENWARE</h4>
            <p class="text-[10px] uppercase tracking-wider">© <span id="display-year"></span> JAYENWARE. All rights reserved. | A Concern of BINZEO</p>
        </div>
    </footer>

    <!-- Messenger Button -->
    <div class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-40">
        <a href="https://m.me/861762253694814" target="_blank" rel="noopener noreferrer" 
           class="w-12 h-12 sm:w-14 sm:h-14 bg-primary text-white rounded-full flex items-center justify-center text-lg sm:text-xl shadow-2xl hover:bg-blue transition-all no-underline">
            <i class="fa-brands fa-facebook-messenger"></i>
        </a>
        <span class="absolute top-0 right-0 w-2.5 h-2.5 sm:w-3 sm:h-3 bg-green-500 rounded-full border-2 border-white"></span>
    </div>

    <script>
        // Initialize Supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // State
        let currentProduct = null;
        let selectedVariantObj = null;
        let cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
        let wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
        
        // Toast System
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-text').innerText = text;
            
            if (type === 'success') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-green-100 text-green-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'error') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-red-100 text-red-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            } else {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-blue-100 text-blue-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-info"></i>';
            }
            
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function hideToast() {
            document.getElementById('toast').classList.remove('show');
        }
        
        // Update Counts
        function updateCounts() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('wish-count').innerText = wishlist.length;
        }
        
        function saveCart() {
            localStorage.setItem('jayen_cart', JSON.stringify(cart));
            updateCounts();
        }
        
        function saveWishlist() {
            localStorage.setItem('jayen_wish', JSON.stringify(wishlist));
            updateCounts();
        }
        
        // Get product slug from URL
        function getProductSlugFromURL() {
            const path = window.location.pathname;
            // Remove /product/ from path
            const slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
            return slug || '';
        }
        
        // Generate product slug
        function getProductSlug(title) {
            if (!title) return '';
            return title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .substring(0, 80);
        }
        
        // Load Product Data
        async function loadProduct() {
            const slug = getProductSlugFromURL();
            console.log('Loading product with slug:', slug);
            
            if (!slug) {
                showErrorState();
                return;
            }
            
            try {
                // Fetch all products
                const { data: products, error } = await _supabase
                    .from('products')
                    .select('*');
                
                if (error) {
                    console.error('Supabase error:', error);
                    throw error;
                }
                
                if (!products || products.length === 0) {
                    console.error('No products found');
                    showErrorState();
                    return;
                }
                
                // Find product by matching slug
                const product = products.find(p => getProductSlug(p.title) === slug);
                
                if (!product) {
                    console.error('Product not found for slug:', slug);
                    showErrorState();
                    return;
                }
                
                currentProduct = product;
                console.log('Product found:', product.title);
                
                // Add to recently viewed
                let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
                recent = [product.id.toString(), ...recent.filter(id => id !== product.id.toString())].slice(0, 8);
                localStorage.setItem('jayen_recent', JSON.stringify(recent));
                
                // Fetch related data
                const [variantsResult, reviewsResult] = await Promise.all([
                    _supabase.from('product_variants').select('*').eq('product_id', product.id),
                    _supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at', { ascending: false })
                ]);
                
                const variants = variantsResult.data || [];
                const reviews = reviewsResult.data || [];
                
                // Render product
                renderProduct(product, variants, reviews);
                
                // Update SEO
                updateSEOMeta(product);
                
            } catch (error) {
                console.error('Error loading product:', error);
                showErrorState();
            }
        }
        
        function showErrorState() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('product-content').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }
        
        function updateSEOMeta(product) {
            document.title = `${product.title} | Buy Online at JAYENWARE`;
            
            const desc = (product.description || 'Premium product from JAYENWARE').substring(0, 155);
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.content = desc;
            
            const slug = getProductSlug(product.title);
            const url = `https://www.jayenware.shop/product/${slug}`;
            
            const canonical = document.getElementById('canonical-url');
            const ogUrl = document.getElementById('og-url');
            
            if (canonical) canonical.href = url;
            if (ogUrl) ogUrl.content = url;
            
            // Update OG tags
            const ogTitle = document.querySelector('meta[property="og:title"]');
            const ogDesc = document.querySelector('meta[property="og:description"]');
            const ogImage = document.querySelector('meta[property="og:image"]');
            
            if (ogTitle) ogTitle.content = `${product.title} | JAYENWARE`;
            if (ogDesc) ogDesc.content = desc;
            if (ogImage) ogImage.content = product.img || 'https://www.jayenware.shop/logo.png';
            
            // Update Twitter tags
            const twTitle = document.querySelector('meta[name="twitter:title"]');
            const twDesc = document.querySelector('meta[name="twitter:description"]');
            const twImage = document.querySelector('meta[name="twitter:image"]');
            
            if (twTitle) twTitle.content = `${product.title} | JAYENWARE`;
            if (twDesc) twDesc.content = desc;
            if (twImage) twImage.content = product.img || 'https://www.jayenware.shop/logo.png';
        }
        
        function renderProduct(product, variants, reviews) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            
            const content = document.getElementById('product-content');
            content.classList.remove('hidden');
            
            const allImages = product.images ? product.images.split(',').filter(img => img.trim()) : [product.img];
            const isOut = product.stock <= 0;
            const wished = wishlist.includes(product.id);
            
            // Set default variant
            if (variants.length > 0) {
                selectedVariantObj = {
                    id: variants[0].id,
                    name: variants[0].name,
                    price: variants[0].price
                };
            }
            
            const avgRating = reviews.length
                ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
                : 0;
            
            const reviewsHTML = reviews.length
                ? reviews.map(r => `
                    <div class="bg-white p-3 sm:p-4 rounded-xl border border-gray-100">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[#ff9500] text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                            <span class="text-xs font-bold">${r.user_name || 'Anonymous'}</span>
                            <span class="text-[9px] text-gray-400 ml-auto">${new Date(r.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-xs text-gray-600">${r.review_text}</p>
                    </div>
                `).join('')
                : '<p class="text-gray-400 text-sm italic text-center py-4">No reviews yet. Be the first to review!</p>';
            
            content.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 lg:gap-12 xl:gap-16 mb-8 sm:mb-10">
                    <!-- Product Images -->
                    <div>
                        <div id="product-zoom-container" class="rounded-3xl overflow-hidden bg-soft" style="aspect-ratio:3/4; max-height:70vh;" 
                             onmousemove="zoomImage(event)" onmouseleave="resetZoom()" 
                             ontouchmove="zoomImage(event)" ontouchend="resetZoom()">
                            <img id="product-zoom-image" src="${allImages[0]}" alt="${product.title}" class="w-full h-full object-cover">
                        </div>
                        ${allImages.length > 1 ? `
                            <div class="flex gap-2 mt-3 sm:mt-4 overflow-x-auto no-scrollbar pb-1">
                                ${allImages.map((img, idx) => `
                                    <img src="${img}" 
                                         onclick="switchProductImage('${img}', this)" 
                                         class="w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 object-cover rounded-xl cursor-pointer border-2 ${idx === 0 ? 'border-primary' : 'border-transparent'} hover:border-primary transition shrink-0" 
                                         alt="${product.title} - Image ${idx + 1}"
                                         loading="lazy">
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                    
                    <!-- Product Info -->
                    <div class="flex flex-col">
                        <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-blue">${product.category}</span>
                        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold tracking-tight text-primary mt-1 sm:mt-2 mb-4 sm:mb-6">${product.title}</h1>
                        
                        <!-- Price -->
                        <div class="mb-4 sm:mb-6">
                            <span class="text-2xl sm:text-3xl font-black">৳ ${selectedVariantObj ? selectedVariantObj.price : product.price}</span>
                            ${product.old_price ? `<span class="ml-2 sm:ml-3 text-base sm:text-lg text-accent line-through">৳${product.old_price}</span>` : ''}
                        </div>
                        
                        <!-- Stock Status -->
                        <div class="flex items-center gap-2 mb-4 sm:mb-6">
                            <span class="w-2 h-2 rounded-full ${isOut ? 'bg-red-500' : 'bg-green-500'}"></span>
                            <span class="text-[10px] sm:text-xs font-bold ${isOut ? 'text-red-500' : 'text-green-600'}">
                                ${isOut ? 'Out of Stock' : `In Stock: ${product.stock}`}
                            </span>
                            ${reviews.length ? `
                                <span class="text-[10px] sm:text-xs text-gray-400 ml-2">
                                    <i class="fa-solid fa-star text-[#ff9500] text-[9px]"></i> 
                                    ${avgRating} (${reviews.length})
                                </span>
                            ` : ''}
                        </div>
                        
                        <!-- Variants -->
                        ${variants.length ? `
                            <div class="mb-6 sm:mb-8">
                                <p class="text-[9px] sm:text-[10px] font-black uppercase text-accent mb-2 sm:mb-3">Select Variant</p>
                                <div class="flex flex-wrap gap-1.5 sm:gap-2" id="detail-variant-container">
                                    ${variants.map((v, i) => `
                                        <button onclick="selectVariant(this, '${v.id}', '${v.name}', ${v.price})" 
                                                class="variant-btn px-4 sm:px-5 py-2.5 sm:py-3 border-2 rounded-2xl text-[10px] sm:text-xs font-bold transition ${i === 0 ? 'selected' : ''}" 
                                                data-vid="${v.id}">
                                            ${v.name} - ৳${v.price}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        <!-- Action Buttons -->
                        <div class="grid grid-cols-2 gap-2 sm:gap-3 mb-6 sm:mb-8">
                            <button onclick="addToCart()" ${isOut ? 'disabled' : ''} 
                                    class="py-3 sm:py-4 ${isOut ? 'bg-gray-200 cursor-not-allowed' : 'bg-primary hover:bg-blue'} text-white rounded-2xl font-bold text-[10px] sm:text-xs uppercase tracking-wider transition">
                                <i class="fa-solid fa-bag-shopping mr-1"></i> Add to Bag
                            </button>
                            <button onclick="buyNow()" ${isOut ? 'disabled' : ''} 
                                    class="py-3 sm:py-4 ${isOut ? 'bg-gray-100 cursor-not-allowed' : 'bg-white border-2 border-primary hover:bg-primary hover:text-white'} rounded-2xl font-bold text-[10px] sm:text-xs uppercase tracking-wider transition">
                                Buy Now
                            </button>
                        </div>
                        
                        <!-- Wishlist Button -->
                        <button onclick="toggleWishlist(${product.id})" 
                                class="mb-6 py-3 px-6 ${wished ? 'bg-red-50 text-red-500 border-red-200' : 'bg-soft text-gray-600 border-gray-200'} border-2 rounded-2xl font-bold text-[10px] sm:text-xs uppercase tracking-wider transition hover:border-red-300">
                            <i class="fa-${wished ? 'solid' : 'regular'} fa-heart mr-2"></i> ${wished ? 'Remove from Wishlist' : 'Add to Wishlist'}
                        </button>
                        
                        <!-- Description -->
                        <div class="bg-soft p-4 sm:p-6 rounded-2xl mb-6">
                            <h3 class="font-bold text-[10px] sm:text-xs uppercase mb-2">Description</h3>
                            <p class="text-xs sm:text-sm text-gray-600 leading-relaxed">${product.description || 'No description available.'}</p>
                        </div>
                        
                        <!-- Trust Badges -->
                        <div class="flex flex-wrap gap-1.5 sm:gap-2 mt-auto">
                            <div class="flex items-center gap-1 bg-green-50 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px]">
                                <i class="fa-solid fa-shield-halved text-green-600"></i> 100% Authentic
                            </div>
                            <div class="flex items-center gap-1 bg-blue-50 px-2.5 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px]">
                                <i class="fa-solid fa-truck-fast text-blue-600"></i> Fast Delivery
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Reviews Section -->
                <div class="border-t pt-8 sm:pt-10">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl sm:text-2xl font-bold tracking-tight text-primary">Customer Reviews</h3>
                            <span class="text-xs sm:text-sm text-gray-400 font-bold">(${reviews.length})</span>
                        </div>
                        ${reviews.length ? `
                            <span class="text-sm text-gray-400">
                                <i class="fa-solid fa-star text-[#ff9500]"></i> ${avgRating} avg
                            </span>
                        ` : ''}
                    </div>
                    
                    <div class="space-y-3 sm:space-y-4 mb-6 sm:mb-8">
                        ${reviewsHTML}
                    </div>
                    
                    <!-- Review Form -->
                    <div class="bg-soft p-4 sm:p-5 rounded-2xl">
                        <h4 class="font-bold text-[10px] sm:text-xs uppercase mb-3">Write a Review</h4>
                        <div class="star-rating mb-3" id="review-stars">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
                        </div>
                        <input type="text" id="review-name" placeholder="Your name" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none focus:border-blue transition">
                        <textarea id="review-text" placeholder="Share your experience..." class="w-full p-3 border rounded-xl text-xs h-20 mb-3 outline-none focus:border-blue transition"></textarea>
                        <button onclick="submitReview(${product.id})" class="px-6 py-2.5 bg-primary text-white rounded-full text-[10px] font-bold uppercase hover:bg-blue transition">
                            Submit Review
                        </button>
                    </div>
                </div>
            `;
        }
        
        // Switch product image
        function switchProductImage(imgSrc, element) {
            document.getElementById('product-zoom-image').src = imgSrc;
            resetZoom();
            
            // Update active state on thumbnails
            document.querySelectorAll('.cursor-pointer.border-2').forEach(el => {
                el.classList.remove('border-primary');
                el.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-primary');
        }
        
        // Variant Selection
        function selectVariant(btn, vId, vName, vPrice) {
            document.querySelectorAll('#detail-variant-container .variant-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedVariantObj = { id: vId, name: vName, price: vPrice };
            
            // Update price display
            const priceSpan = document.querySelector('.text-2xl.sm\\:text-3xl.font-black');
            if (priceSpan) {
                priceSpan.textContent = `৳ ${vPrice}`;
            }
        }
        
        // Image Zoom
        function zoomImage(e) {
            const container = document.getElementById('product-zoom-container');
            const img = document.getElementById('product-zoom-image');
            if (!container || !img) return;
            
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) / rect.width;
            const y = (clientY - rect.top) / rect.height;
            
            img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
            img.style.transform = 'scale(2)';
        }
        
        function resetZoom() {
            const img = document.getElementById('product-zoom-image');
            if (img) img.style.transform = 'scale(1)';
        }
        
        // Add to Cart
        function addToCart() {
            if (!currentProduct) return;
            
            let finalPrice = currentProduct.price;
            let vId = null;
            let vName = null;
            
            const hasVariants = document.getElementById('detail-variant-container');
            if (hasVariants) {
                if (!selectedVariantObj) {
                    showToast('Please select a variant', 'error');
                    return;
                }
                vId = selectedVariantObj.id;
                vName = selectedVariantObj.name;
                finalPrice = selectedVariantObj.price;
            }
            
            // Check stock
            const existingCount = cart.filter(i => i.product_id === currentProduct.id).length;
            if (existingCount >= currentProduct.stock) {
                showToast('Stock limit reached', 'error');
                return;
            }
            
            cart.push({
                id: Date.now(),
                product_id: currentProduct.id,
                variant_id: vId,
                title: currentProduct.title,
                price: finalPrice,
                img: currentProduct.img,
                variant: vName,
                quantity: 1
            });
            
            saveCart();
            showToast('Added to bag successfully!');
        }
        
        // Buy Now
        function buyNow() {
            addToCart();
            window.location.href = '/cart';
        }
        
        // Toggle Wishlist
        function toggleWishlist(productId) {
            if (wishlist.includes(productId)) {
                wishlist = wishlist.filter(id => id !== productId);
                showToast('Removed from wishlist', 'info');
            } else {
                wishlist.push(productId);
                showToast('Added to wishlist!');
            }
            
            saveWishlist();
            
            // Reload product to update wishlist button
            if (currentProduct && currentProduct.id === productId) {
                loadProduct();
            }
        }
        
        // Submit Review
        async function submitReview(productId) {
            const text = document.getElementById('review-text').value.trim();
            const name = document.getElementById('review-name').value.trim();
            const stars = document.querySelector('input[name="rating"]:checked');
            
            if (!text) {
                showToast('Please write a review', 'error');
                return;
            }
            if (!name) {
                showToast('Please enter your name', 'error');
                return;
            }
            if (!stars) {
                showToast('Please select a rating', 'error');
                return;
            }
            
            try {
                const { error } = await _supabase
                    .from('product_reviews')
                    .insert([{
                        product_id: productId,
                        user_name: name,
                        rating: parseInt(stars.value),
                        review_text: text
                    }]);
                
                if (error) throw error;
                
                showToast('Review submitted! Thank you.');
                
                // Reload product to show new review
                setTimeout(() => loadProduct(), 1500);
                
            } catch (error) {
                console.error('Review submission error:', error);
                showToast('Failed to submit review. Please try again.', 'error');
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-year').innerText = new Date().getFullYear();
            updateCounts();
            loadProduct();
        });
        
        // Handle browser back/forward buttons
        window.addEventListener('popstate', () => {
            loadProduct();
        });
    </script>
</body>
</html>
