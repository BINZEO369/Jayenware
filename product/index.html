<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Product Details | JAYENWARE</title>
    <meta name="description" content="Discover detailed product specifications, fabric, fit, and more at JAYENWARE.">
    <meta name="theme-color" content="#1d1d1f">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/product/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="/api-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    colors: {
                        primary: '#1d1d1f',
                        accent: '#86868b',
                        soft: '#f5f5f7',
                        blue: '#007aff'
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --primary: #1d1d1f;
            --accent: #86868b;
            --soft: #f5f5f7;
            --white: #ffffff;
            --black: #000000;
            --border: #e5e5e5;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #1d1d1f;
            background: #ffffff;
        }
        
        img { max-width: 100%; height: auto; display: block; }
        
        /* Product Image Section */
        .product-image-section {
            width: 100%;
            background: #fafafa;
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: zoom-in;
        }
        
        .product-image-section img {
            width: 100%;
            height: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .product-image-section:hover img {
            transform: scale(2);
        }
        
        @media (min-width: 768px) {
            .product-image-section { min-height: 70vh; }
        }
        
        /* Product Info Container */
        .product-info-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        
        /* Category & Subcategory Badge */
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .category-tag {
            padding: 6px 16px;
            background: #000;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }
        
        .subcategory-tag {
            padding: 6px 16px;
            background: #fff;
            color: #000;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1.5px solid #000;
            border-radius: 4px;
        }
        
        /* Product Title */
        .product-title {
            font-size: 24px;
            font-weight: 900;
            color: #000;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        /* Price Section */
        .price-section {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .current-price {
            font-size: 28px;
            font-weight: 900;
            color: #000;
        }
        
        .original-price {
            font-size: 16px;
            color: #86868b;
            text-decoration: line-through;
        }
        
        .discount-badge {
            padding: 4px 10px;
            background: #000;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
        }
        
        /* Divider */
        .divider {
            height: 1px;
            background: #e5e5e5;
            margin: 20px 0;
        }
        
        /* Selection Labels */
        .selection-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .selection-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000;
        }
        
        .selection-value {
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }
        
        /* Color Selection */
        .color-selection {
            margin-bottom: 24px;
        }
        
        .color-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .color-option {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 2px solid #e5e5e5;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            background: transparent;
            padding: 0;
        }
        
        .color-option:hover {
            border-color: #000;
            transform: scale(1.05);
        }
        
        .color-option.selected {
            border-color: #000;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000;
        }
        
        .color-option .color-fill {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .color-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* Size Selection */
        .size-selection {
            margin-bottom: 24px;
        }
        
        .size-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }
        
        .size-option {
            padding: 10px;
            background: #fff;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .size-option:hover {
            border-color: #000;
            background: #fafafa;
        }
        
        .size-option.selected {
            background: #000;
            color: #fff;
            border-color: #000;
        }
        
        .size-option.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
            pointer-events: none;
        }
        
        /* Stock Status */
        .stock-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 16px;
            background: #f5f5f7;
            border-radius: 8px;
        }
        
        .stock-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .stock-dot.in-stock { background: #22c55e; }
        .stock-dot.out-of-stock { background: #ef4444; }
        .stock-dot.select-variant { background: #f59e0b; }
        
        .stock-text {
            font-size: 12px;
            font-weight: 600;
        }
        
        .stock-text.in-stock { color: #16a34a; }
        .stock-text.out-of-stock { color: #ef4444; }
        .stock-text.select-variant { color: #d97706; }
        
        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            padding: 14px;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .btn-primary:hover {
            background: #1a1a1a;
        }
        
        .btn-outline {
            padding: 14px;
            background: #fff;
            color: #000;
            border: 2px solid #000;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .btn-outline:hover {
            background: #fafafa;
        }
        
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* Wishlist Button */
        .wishlist-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #fff;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #000;
            width: 100%;
            margin-bottom: 24px;
        }
        
        .wishlist-btn:hover {
            border-color: #000;
            background: #fafafa;
        }
        
        .wishlist-btn.active {
            border-color: #000;
            background: #000;
            color: #fff;
        }
        
        /* Variant Info */
        .variant-info {
            padding: 16px;
            background: #f5f5f7;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        
        .variant-info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #666;
        }
        
        .variant-info-item strong {
            color: #000;
            font-weight: 700;
        }
        
        .variant-info-item code {
            background: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            border: 1px solid #e5e5e5;
        }
        
        /* Expandable Sections */
        .expandable-section {
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .expandable-header {
            padding: 16px 20px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s ease;
            border: none;
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000;
        }
        
        .expandable-header:hover {
            background: #fafafa;
        }
        
        .expandable-header i {
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .expandable-header.open i {
            transform: rotate(180deg);
        }
        
        .expandable-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #fff;
        }
        
        .expandable-content.open {
            max-height: 2000px;
        }
        
        .expandable-inner {
            padding: 0 20px 20px;
        }
        
        /* Specs Grid */
        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .spec-item {
            padding: 14px;
            background: #f5f5f7;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .spec-item i {
            font-size: 16px;
            color: #000;
            width: 20px;
            text-align: center;
        }
        
        .spec-label {
            font-size: 9px;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        
        .spec-value {
            font-size: 12px;
            font-weight: 700;
            color: #000;
        }
        
        /* Description */
        .description-text {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.8;
        }
        
        /* Barcode */
        .barcode-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        
        .barcode-container svg {
            max-width: 100%;
            height: auto;
        }
        
        /* Sticky Add to Cart */
        .sticky-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid #e5e5e5;
            padding: 12px 20px calc(12px + var(--safe-bottom));
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        
        .sticky-bar.active {
            display: flex;
        }
        
        .sticky-price {
            font-size: 20px;
            font-weight: 900;
            color: #000;
        }
        
        .sticky-add-btn {
            padding: 12px 28px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }
        
        /* Thumbnails */
        .thumbnails-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .thumbnails-row::-webkit-scrollbar {
            height: 3px;
        }
        
        .thumbnails-row::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        
        .thumbnail-item {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            opacity: 0.6;
            transition: all 0.2s ease;
        }
        
        .thumbnail-item:hover {
            opacity: 1;
            border-color: #86868b;
        }
        
        .thumbnail-item.active {
            opacity: 1;
            border-color: #000;
        }
        
        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Global Loader -->
    <div id="global-loader" style="position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s;">
        <div style="text-align:center;">
            <div style="width:40px;height:40px;border:3px solid #e5e5e5;border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
            <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3em;color:rgba(0,0,0,0.5);">JAYENWARE</p>
        </div>
    </div>

    <!-- Main Content -->
    <main id="product-page-content" style="flex-grow:1;min-height:100vh;">
        
        <!-- Product Not Found -->
        <div id="product-not-found" style="display:none;text-align:center;padding:100px 20px;">
            <i class="fa-solid fa-box-open" style="font-size:64px;color:#e5e5e5;margin-bottom:20px;"></i>
            <h2 style="font-size:24px;font-weight:700;color:#000;margin-bottom:8px;">Product Not Found</h2>
            <p style="color:#6b7280;margin-bottom:28px;">The product you're looking for doesn't exist or has been removed.</p>
            <a href="/products" style="display:inline-block;padding:14px 36px;background:#000;color:#fff;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:12px;text-decoration:none;">Browse Products</a>
        </div>

        <!-- Loading Skeleton -->
        <div id="product-loading" style="display:grid;grid-template-columns:1fr;gap:0;">
            <div class="skeleton" style="width:100%;aspect-ratio:4/5;border-radius:0;"></div>
            <div style="padding:24px 20px;">
                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <div class="skeleton" style="height:20px;width:80px;border-radius:4px;"></div>
                    <div class="skeleton" style="height:20px;width:80px;border-radius:4px;"></div>
                </div>
                <div class="skeleton" style="height:24px;width:90%;margin-bottom:8px;"></div>
                <div class="skeleton" style="height:32px;width:120px;margin-bottom:16px;"></div>
                <div class="skeleton" style="height:44px;border-radius:8px;margin-bottom:12px;"></div>
                <div class="skeleton" style="height:100px;border-radius:8px;"></div>
            </div>
        </div>

        <!-- Product Detail Content -->
        <div id="product-detail-content"></div>

    </main>

    <!-- Sticky Add to Cart Bar -->
    <div id="sticky-add-bar" class="sticky-bar">
        <span id="sticky-price" class="sticky-price">৳ 0</span>
        <button id="sticky-add-btn" class="sticky-add-btn">Add to Bag</button>
    </div>

    <script src="/components.js"></script>

    <script>
        (function() {
            // ==================== INITIALIZATION ====================
            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            let currentProduct = null;
            let allProducts = [];
            let productColors = [];
            let colorSizes = [];
            let productVariants = [];
            let allReviews = [];
            let selectedColorId = null;
            let selectedSizeId = null;
            let selectedVariant = null;
            let barcodeGenerated = false;
            
            // DOM Elements
            const loader = document.getElementById('global-loader');
            const notFoundDiv = document.getElementById('product-not-found');
            const loadingDiv = document.getElementById('product-loading');
            const contentDiv = document.getElementById('product-detail-content');
            const canonicalLink = document.getElementById('canonical-url');
            const stickyBar = document.getElementById('sticky-add-bar');
            
            // ==================== UTILS ====================
            function getSlugFromURL() {
                const path = window.location.pathname;
                let slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
                return slug.split('?')[0].split('#')[0] || null;
            }
            
            function getAvailableSizesForColor(colorId) {
                const variants = productVariants.filter(v => v.color_id == colorId && v.is_active && v.stock > 0);
                const sizeIds = variants.map(v => v.size_id);
                return colorSizes.filter(s => sizeIds.includes(s.id) && s.color_id == colorId);
            }
            
            function getVariant(colorId, sizeId) {
                return productVariants.find(v => v.color_id == colorId && v.size_id == sizeId) || null;
            }
            
            // ==================== SELECTIONS ====================
            window.selectColor = function(colorId) {
                selectedColorId = colorId;
                selectedSizeId = null;
                selectedVariant = null;
                
                document.querySelectorAll('.color-option').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
                const selectedBtn = document.querySelector(`.color-option[data-color-id="${colorId}"]`);
                if (selectedBtn) selectedBtn.classList.add('selected');
                
                const color = productColors.find(c => c.id == colorId);
                const selectedColorNameEl = document.getElementById('selected-color-name');
                if (selectedColorNameEl && color) {
                    selectedColorNameEl.textContent = color.color_name;
                }
                
                if (color && color.color_image) {
                    const mainImg = document.getElementById('product-hero-image');
                    if (mainImg) {
                        mainImg.src = color.color_image;
                        updateThumbnailSelection(color.color_image);
                    }
                }
                
                updateSizeOptions();
                updatePriceDisplay();
                updateVariantInfo();
                updateStickyBar();
            };
            
            window.selectSize = function(sizeId) {
                selectedSizeId = sizeId;
                
                document.querySelectorAll('.size-option').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
                const selectedBtn = document.querySelector(`.size-option[data-size-id="${sizeId}"]`);
                if (selectedBtn) selectedBtn.classList.add('selected');
                
                const size = colorSizes.find(s => s.id == sizeId);
                const selectedSizeNameEl = document.getElementById('selected-size-name');
                if (selectedSizeNameEl && size) {
                    selectedSizeNameEl.textContent = size.size_name;
                }
                
                if (selectedColorId && selectedSizeId) {
                    selectedVariant = getVariant(selectedColorId, selectedSizeId);
                }
                
                updatePriceDisplay();
                updateVariantInfo();
                updateStickyBar();
            };
            
            window.selectThumbnail = function(imageSrc) {
                const mainImg = document.getElementById('product-hero-image');
                if (mainImg) mainImg.src = imageSrc;
                updateThumbnailSelection(imageSrc);
            };
            
            function updateThumbnailSelection(activeSrc) {
                document.querySelectorAll('.thumbnail-item').forEach(thumb => {
                    thumb.classList.toggle('active', thumb.src === activeSrc);
                });
            }
            
            function updateSizeOptions() {
                const sizeContainer = document.getElementById('size-options-container');
                if (!sizeContainer || !selectedColorId) return;
                
                const allSizesForColor = colorSizes.filter(s => s.color_id == selectedColorId);
                
                if (allSizesForColor.length === 0) {
                    sizeContainer.innerHTML = '<p style="font-size:12px;color:#9ca3af;grid-column:1/-1;padding:8px 0;">No sizes available</p>';
                    return;
                }
                
                sizeContainer.innerHTML = allSizesForColor.map(size => {
                    const variant = getVariant(selectedColorId, size.id);
                    const isAvailable = variant && variant.stock > 0 && variant.is_active;
                    
                    return `
                        <button 
                            data-size-id="${size.id}"
                            class="size-option ${!isAvailable ? 'disabled' : ''}"
                            onclick="${isAvailable ? `selectSize(${size.id})` : ''}"
                            ${!isAvailable ? 'disabled' : ''}
                        >${size.size_name}</button>
                    `;
                }).join('');
                
                selectedSizeId = null;
                selectedVariant = null;
                const selectedSizeNameEl = document.getElementById('selected-size-name');
                if (selectedSizeNameEl) selectedSizeNameEl.textContent = 'Select a size';
            }
            
            function updatePriceDisplay() {
                const priceEl = document.getElementById('variant-price-display');
                if (!priceEl) return;
                
                if (selectedVariant) {
                    const discountPercent = selectedVariant.old_price ? 
                        Math.round((1 - selectedVariant.price / selectedVariant.old_price) * 100) : 0;
                    
                    priceEl.innerHTML = `
                        <span class="current-price">৳ ${selectedVariant.price}</span>
                        ${selectedVariant.old_price ? `<span class="original-price">৳ ${selectedVariant.old_price}</span>` : ''}
                        ${discountPercent > 0 ? `<span class="discount-badge">-${discountPercent}%</span>` : ''}
                    `;
                } else if (selectedColorId) {
                    const variantsForColor = productVariants.filter(v => v.color_id == selectedColorId && v.is_active);
                    if (variantsForColor.length > 0) {
                        const minPrice = Math.min(...variantsForColor.map(v => v.price));
                        const maxPrice = Math.max(...variantsForColor.map(v => v.price));
                        priceEl.innerHTML = `<span class="current-price">৳ ${minPrice === maxPrice ? minPrice : `${minPrice} - ${maxPrice}`}</span>`;
                    } else {
                        priceEl.innerHTML = `<span class="current-price">৳ ${currentProduct?.price || 0}</span>`;
                    }
                } else {
                    priceEl.innerHTML = `<span class="current-price">৳ ${currentProduct?.price || 0}</span>`;
                }
            }
            
            function updateVariantInfo() {
                const infoEl = document.getElementById('variant-info');
                const stockEl = document.getElementById('stock-status');
                const buyBtn = document.getElementById('buy-now-btn');
                const addBtn = document.getElementById('add-to-bag-btn');
                
                if (!infoEl || !stockEl) return;
                
                if (selectedVariant) {
                    infoEl.style.display = 'flex';
                    infoEl.innerHTML = `
                        <div class="variant-info-item"><strong>SKU:</strong> <code>${selectedVariant.sku || 'N/A'}</code></div>
                        ${selectedVariant.barcode ? `<div class="variant-info-item"><strong>Barcode:</strong> <code>${selectedVariant.barcode}</code></div>` : ''}
                        ${selectedVariant.weight ? `<div class="variant-info-item"><strong>Weight:</strong> ${selectedVariant.weight}g</div>` : ''}
                    `;
                    
                    const isOut = selectedVariant.stock <= 0;
                    stockEl.innerHTML = `
                        <span class="stock-dot ${isOut ? 'out-of-stock' : 'in-stock'}"></span>
                        <span class="stock-text ${isOut ? 'out-of-stock' : 'in-stock'}">${isOut ? 'Out of Stock' : 'In Stock'}</span>
                    `;
                    
                    if (buyBtn) { buyBtn.disabled = isOut; buyBtn.classList.toggle('btn-disabled', isOut); }
                    if (addBtn) { addBtn.disabled = isOut; addBtn.classList.toggle('btn-disabled', isOut); }
                } else {
                    infoEl.style.display = 'none';
                    stockEl.innerHTML = `
                        <span class="stock-dot select-variant"></span>
                        <span class="stock-text select-variant">Select variant for availability</span>
                    `;
                }
            }
            
            function updateStickyBar() {
                const stickyPrice = document.getElementById('sticky-price');
                const stickyBtn = document.getElementById('sticky-add-btn');
                if (!stickyPrice || !stickyBtn) return;
                
                let price = currentProduct?.price || 0;
                if (selectedVariant) price = selectedVariant.price;
                else if (selectedColorId) {
                    const variantsForColor = productVariants.filter(v => v.color_id == selectedColorId && v.is_active);
                    if (variantsForColor.length > 0) price = Math.min(...variantsForColor.map(v => v.price));
                }
                
                stickyPrice.innerHTML = `৳ ${price}`;
                stickyBtn.onclick = () => addToCartHandler(currentProduct?.id);
                
                const isDisabled = selectedVariant ? selectedVariant.stock <= 0 : false;
                stickyBtn.disabled = isDisabled;
                stickyBtn.style.opacity = isDisabled ? '0.5' : '1';
            }
            
            // Sticky bar scroll handler
            window.addEventListener('scroll', () => {
                const buySection = document.getElementById('buy-section');
                if (buySection && stickyBar) {
                    const rect = buySection.getBoundingClientRect();
                    stickyBar.classList.toggle('active', rect.bottom < 0);
                }
            }, { passive: true });
            
            // ==================== CART ====================
            window.addToCartHandler = function(productId, buyNow = false) {
                const product = allProducts.find(p => p.id == productId);
                if (!product) return showToast('Product not found', 'error');
                
                if (productColors.length > 0 && !selectedVariant) {
                    if (!selectedColorId) return showToast('Please select a color', 'error');
                    if (!selectedSizeId) return showToast('Please select a size', 'error');
                }
                
                if (selectedVariant && selectedVariant.stock <= 0) return showToast('Out of stock', 'error');
                
                if (typeof cart === 'undefined') { window.location.reload(); return; }
                
                cart.push({
                    id: Date.now(),
                    product_id: product.id,
                    variant_id: selectedVariant?.id || null,
                    title: product.title,
                    price: selectedVariant?.price || product.price,
                    img: product.img,
                    variant: selectedVariant?.name || null,
                    sku: selectedVariant?.sku || null,
                    quantity: 1
                });
                
                saveCart();
                showToast('Added to Bag! 🎉');
                if (buyNow) window.location.href = '/checkout';
            };
            
            // ==================== EXPANDABLE SECTIONS ====================
            window.toggleExpandable = function(contentId, headerEl) {
                const content = document.getElementById(contentId);
                if (!content) return;
                
                const isOpen = content.classList.contains('open');
                content.classList.toggle('open', !isOpen);
                headerEl.classList.toggle('open', !isOpen);
                
                if (contentId === 'barcode-content' && !barcodeGenerated && !isOpen) {
                    const barcodeText = selectedVariant?.barcode || currentProduct?.barcode;
                    if (barcodeText) setTimeout(() => generateBarcode(barcodeText), 200);
                }
            };
            
            function generateBarcode(barcodeText) {
                if (!barcodeText || typeof JsBarcode === 'undefined') return;
                const svgElement = document.getElementById('barcode-svg');
                if (!svgElement) return;
                
                try {
                    JsBarcode("#barcode-svg", barcodeText, {
                        format: "CODE128", width: 2, height: 80, displayValue: true,
                        fontSize: 14, margin: 10, background: "#ffffff", lineColor: "#000000"
                    });
                    barcodeGenerated = true;
                } catch(e) {
                    console.error('Barcode generation failed:', e);
                }
            }
            
            // ==================== REVIEWS ====================
            window.submitReview = async function(productId) {
                const text = document.getElementById('review-text')?.value?.trim();
                const starsInput = document.querySelector('input[name="product-rating"]:checked');
                if (!text || !starsInput) return showToast('Please complete all fields', 'error');
                
                try {
                    const { error } = await _supabase.from('product_reviews').insert([{
                        product_id: productId, user_name: 'Guest User',
                        rating: parseInt(starsInput.value), review_text: text
                    }]);
                    if (error) throw error;
                    showToast('Review submitted! Thank you 🎉', 'success');
                    setTimeout(() => location.reload(), 1500);
                } catch(e) { showToast(e.message || 'Failed', 'error'); }
            };
            
            // ==================== RENDER ====================
            function renderProductDetails(product) {
                currentProduct = product;
                barcodeGenerated = false;
                selectedColorId = null;
                selectedSizeId = null;
                selectedVariant = null;
                
                if (loadingDiv) loadingDiv.style.display = 'none';
                if (notFoundDiv) notFoundDiv.style.display = 'none';
                if (contentDiv) contentDiv.style.display = 'block';
                
                document.title = `${product.title || 'Product'} | JAYENWARE`;
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.content = (product.description || product.title || '').substring(0, 155) + '...';
                if (canonicalLink) canonicalLink.href = `https://www.jayenware.shop/product/${product.slug || generateSlug(product.title)}`;
                
                const allImages = product.images ? product.images.split(',').filter(Boolean) : [];
                if (allImages.length === 0 && product.img) allImages.push(product.img);
                
                const prodReviews = allReviews.filter(r => r.product_id == product.id);
                const avgRating = prodReviews.length ? (prodReviews.reduce((s,r)=>s+r.rating,0)/prodReviews.length).toFixed(1) : null;
                const mainImage = allImages[0] || product.img || '/logo.png';
                
                // Reviews HTML
                const reviewsHTML = prodReviews.length ? prodReviews.map(r=>`
                    <div style="background:#fff;padding:16px;border-radius:8px;border:1px solid #e5e5e5;margin-bottom:8px;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                            <span style="color:#000;">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</span>
                            <span style="font-weight:700;font-size:12px;">${r.user_name||'Anonymous'}</span>
                            <span style="margin-left:auto;font-size:10px;color:#86868b;">${r.created_at?new Date(r.created_at).toLocaleDateString():''}</span>
                        </div>
                        <p style="font-size:12px;color:#4b5563;line-height:1.6;">${r.review_text||''}</p>
                    </div>`).join('') : '<p style="color:#86868b;font-size:12px;text-align:center;padding:20px;">No reviews yet. Be the first to review!</p>';
                
                // Colors HTML
                let colorsHTML = '';
                if (productColors.length > 0) {
                    colorsHTML = `
                        <div class="color-selection">
                            <div class="selection-label">
                                <span class="selection-title">Color</span>
                                <span id="selected-color-name" class="selection-value">Select a color</span>
                            </div>
                            <div class="color-options">
                                ${productColors.map(color => {
                                    const hasStock = productVariants.filter(v => v.color_id == color.id && v.is_active && v.stock > 0).length > 0;
                                    return `
                                        <button 
                                            class="color-option ${!hasStock ? 'disabled' : ''}"
                                            data-color-id="${color.id}"
                                            onclick="selectColor(${color.id})"
                                            title="${color.color_name}${!hasStock ? ' (Out of Stock)' : ''}"
                                            ${!hasStock ? 'disabled' : ''}>
                                            <span class="color-fill" style="background:${color.color_code || '#ccc'};"></span>
                                        </button>`;
                                }).join('')}
                            </div>
                        </div>`;
                }
                
                // Sizes HTML
                let sizesHTML = '';
                if (productColors.length > 0) {
                    sizesHTML = `
                        <div class="size-selection">
                            <div class="selection-label">
                                <span class="selection-title">Size</span>
                                <span id="selected-size-name" class="selection-value">Select a size</span>
                            </div>
                            <div id="size-options-container" class="size-options">
                                <p style="font-size:11px;color:#86868b;grid-column:1/-1;padding:8px 0;">Please select a color first</p>
                            </div>
                        </div>`;
                }
                
                // Thumbnails
                const thumbnailsHTML = allImages.length > 1 ? `
                    <div class="thumbnails-row">
                        ${allImages.map((img, index) => `
                            <img src="${img}" 
                                 onclick="selectThumbnail('${img}')" 
                                 class="thumbnail-item ${index === 0 ? 'active' : ''}" 
                                 alt="Image ${index + 1}" 
                                 loading="lazy"
                                 onerror="this.style.display='none'">
                        `).join('')}
                    </div>` : '';
                
                // Build HTML
                contentDiv.innerHTML = `
                <!-- Image Section -->
                <div class="product-image-section" id="product-hero">
                    <img id="product-hero-image" src="${mainImage}" alt="${product.title || ''}" onerror="this.src='/logo.png'">
                </div>
                
                <!-- Product Info -->
                <div class="product-info-container">
                    
                    <!-- Category & Subcategory Badges -->
                    <div class="category-badge">
                        ${product.category ? `<span class="category-tag">${product.category}</span>` : ''}
                        ${product.subcategory ? `<span class="subcategory-tag">${product.subcategory}</span>` : ''}
                    </div>
                    
                    <!-- Title -->
                    <h1 class="product-title">${product.title || ''}</h1>
                    
                    <!-- Price -->
                    <div id="variant-price-display" class="price-section">
                        <span class="current-price">৳ ${product.price||0}</span>
                        ${product.old_price?`<span class="original-price">৳ ${product.old_price}</span>`:''}
                    </div>
                    
                    <div class="divider"></div>
                    
                    <!-- Color Selection -->
                    ${colorsHTML}
                    
                    <!-- Size Selection -->
                    ${sizesHTML}
                    
                    <!-- Stock Status -->
                    <div id="stock-status" class="stock-status">
                        <span class="stock-dot select-variant"></span>
                        <span class="stock-text select-variant">Select variant for availability</span>
                        ${avgRating?`<span style="font-size:10px;color:#86868b;margin-left:6px;">★ ${avgRating} (${prodReviews.length})</span>`:''}
                    </div>
                    
                    <!-- Action Buttons -->
                    <div id="buy-section" class="action-buttons">
                        <button id="add-to-bag-btn" onclick="addToCartHandler(${product.id})" class="btn-primary">Add to Bag</button>
                        <button id="buy-now-btn" onclick="addToCartHandler(${product.id},true)" class="btn-outline">Buy Now</button>
                    </div>
                    
                    <!-- Wishlist -->
                    <button onclick="toggleWishlist(${product.id})" data-wishlist-btn class="wishlist-btn ${wishlist.includes(product.id)?'active':''}">
                        <i class="fa-${wishlist.includes(product.id)?'solid':'regular'} fa-heart"></i>
                        ${wishlist.includes(product.id)?'Wishlisted':'Add to Wishlist'}
                    </button>
                    
                    <!-- Variant Info -->
                    <div id="variant-info" class="variant-info" style="display:none;"></div>
                    
                    ${thumbnailsHTML ? `<div style="margin-bottom:16px;">${thumbnailsHTML}</div>` : ''}
                    
                    <!-- Short Description -->
                    ${product.short_description ? `<p style="font-size:12px;color:#666;margin-bottom:20px;line-height:1.6;">${product.short_description}</p>` : ''}
                    
                    <!-- Specifications -->
                    <div class="expandable-section">
                        <button class="expandable-header" onclick="toggleExpandable('specs-content', this)">
                            <span><i class="fa-solid fa-sliders" style="margin-right:10px;"></i>Specifications</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div id="specs-content" class="expandable-content">
                            <div class="expandable-inner">
                                <div class="specs-grid">
                                    ${product.fabric_type ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-shirt"></i>
                                            <div><div class="spec-label">Fabric</div><div class="spec-value">${product.fabric_type}</div></div>
                                        </div>` : ''}
                                    ${product.gsm_type ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-weight-scale"></i>
                                            <div><div class="spec-label">GSM</div><div class="spec-value">${product.gsm_type}</div></div>
                                        </div>` : ''}
                                    ${product.fit_type ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-ruler"></i>
                                            <div><div class="spec-label">Fit</div><div class="spec-value">${product.fit_type}</div></div>
                                        </div>` : ''}
                                    ${product.gender ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-venus-mars"></i>
                                            <div><div class="spec-label">Gender</div><div class="spec-value">${product.gender}</div></div>
                                        </div>` : ''}
                                    ${product.print_type ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-palette"></i>
                                            <div><div class="spec-label">Print</div><div class="spec-value">${product.print_type}</div></div>
                                        </div>` : ''}
                                    ${product.sku ? `
                                        <div class="spec-item">
                                            <i class="fa-solid fa-barcode"></i>
                                            <div><div class="spec-label">SKU</div><div class="spec-value">${product.sku}</div></div>
                                        </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Description -->
                    ${product.description ? `
                    <div class="expandable-section">
                        <button class="expandable-header" onclick="toggleExpandable('desc-content', this)">
                            <span><i class="fa-solid fa-align-left" style="margin-right:10px;"></i>Description</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div id="desc-content" class="expandable-content">
                            <div class="expandable-inner">
                                <p class="description-text">${product.description}</p>
                            </div>
                        </div>
                    </div>` : ''}
                    
                    <!-- Barcode -->
                    ${(product.barcode || productVariants.some(v => v.barcode)) ? `
                    <div class="expandable-section">
                        <button class="expandable-header" onclick="toggleExpandable('barcode-content', this)">
                            <span><i class="fa-solid fa-upc" style="margin-right:10px;"></i>Barcode</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div id="barcode-content" class="expandable-content">
                            <div class="expandable-inner">
                                <div class="barcode-container">
                                    <svg id="barcode-svg"></svg>
                                </div>
                            </div>
                        </div>
                    </div>` : ''}
                    
                    <!-- Reviews -->
                    <div style="margin-top:28px;">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                            <h3 style="font-size:20px;font-weight:700;">Reviews</h3>
                            <span style="color:#86868b;">(${prodReviews.length})</span>
                        </div>
                        
                        <div style="margin-bottom:20px;">${reviewsHTML}</div>
                        
                        <div style="background:#f5f5f7;padding:20px;border-radius:8px;">
                            <h4 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Write a Review</h4>
                            
                            <div class="star-rating" style="display:flex;gap:4px;margin-bottom:12px;direction:rtl;justify-content:flex-end;">
                                ${[5,4,3,2,1].map(n => `
                                    <input type="radio" id="star${n}" name="product-rating" value="${n}" style="display:none;">
                                    <label for="star${n}" style="cursor:pointer;font-size:18px;color:#d2d2d7;transition:color 0.2s;"><i class="fa-solid fa-star"></i></label>
                                `).join('')}
                            </div>
                            
                            <textarea id="review-text" placeholder="Share your experience..." style="width:100%;padding:12px;border:1px solid #e5e5e5;border-radius:6px;font-size:12px;height:80px;margin-bottom:12px;font-family:Inter,sans-serif;resize:vertical;"></textarea>
                            <button onclick="submitReview(${product.id})" class="btn-primary" style="width:auto;padding:12px 24px;">Submit Review</button>
                        </div>
                    </div>
                    
                    <div style="height:40px;"></div>
                </div>`;
                
                updateStickyBar();
            }
            
            // ==================== LOAD DATA ====================
            async function loadProductBySlug(slug) {
                try {
                    const { data: products, error: prodErr } = await _supabase.from('products').select('*').eq('status', 'Active');
                    if (prodErr) throw prodErr;
                    allProducts = products || [];
                    const product = allProducts.find(p => (p.slug || generateSlug(p.title)) === slug);
                    if (!product) return false;
                    
                    const [colorsRes, variantsRes, revRes] = await Promise.all([
                        _supabase.from('product_colors').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
                        _supabase.from('product_variants').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
                        _supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at', { ascending: false })
                    ]);
                    
                    productColors = colorsRes.data || [];
                    productVariants = variantsRes.data || [];
                    allReviews = revRes.data || [];
                    
                    if (productColors.length > 0) {
                        const colorIds = productColors.map(c => c.id);
                        const { data: sizesData } = await _supabase.from('color_sizes').select('*').in('color_id', colorIds).order('sort_order', { ascending: true });
                        colorSizes = sizesData || [];
                    } else {
                        colorSizes = [];
                    }
                    
                    try {
                        let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
                        recent = [product.id.toString(), ...recent.filter(id => id != product.id)].slice(0,8);
                        localStorage.setItem('jayen_recent', JSON.stringify(recent));
                    } catch(e) {}
                    
                    renderProductDetails(product);
                    return true;
                } catch(e) {
                    console.error('Error loading product:', e);
                    return false;
                }
            }
            
            function hideLoader() {
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.transition = 'opacity 0.4s';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }
            
            function showNotFound() {
                hideLoader();
                if (loadingDiv) loadingDiv.style.display = 'none';
                if (contentDiv) contentDiv.innerHTML = '';
                if (notFoundDiv) notFoundDiv.style.display = 'block';
                if (stickyBar) stickyBar.classList.remove('active');
            }
            
            // ==================== STAR RATING HOVER STYLE ====================
            const starStyle = document.createElement('style');
            starStyle.textContent = `
                .star-rating input[type="radio"]:checked ~ label,
                .star-rating label:hover,
                .star-rating label:hover ~ label { color: #000; }
            `;
            document.head.appendChild(starStyle);
            
            // ==================== INIT ====================
            async function init() {
                await initSharedComponents();
                updateCounts();
                
                const slug = getSlugFromURL();
                if (!slug) { showNotFound(); return; }
                
                if (loadingDiv) loadingDiv.style.display = 'grid';
                if (notFoundDiv) notFoundDiv.style.display = 'none';
                
                const found = await loadProductBySlug(slug);
                found ? hideLoader() : showNotFound();
            }
            
            document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', init) : init();
        })();
    </script>
</body>
</html>
