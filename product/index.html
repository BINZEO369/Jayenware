<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Product Details | JAYENWARE</title>
  <meta name="description" content="Discover detailed product specifications, fabric, fit, and more at JAYENWARE.">
  <meta name="theme-color" content="#1d1d1f">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="canonical" id="canonical-url" href="https://jayenwaretest369.vercel.app/product/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="/api-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { max-width: 100%; height: auto; display: block; }
    
    /* Glass Navigation */
    .glass-nav {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
    }
    
    /* Color Swatch Button */
    .color-swatch-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #e5e5e5;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      flex-shrink: 0;
      background: transparent;
      padding: 0;
      outline: none;
    }
    .color-swatch-btn:hover {
      transform: scale(1.12);
      border-color: #86868b;
    }
    .color-swatch-btn.selected {
      border-color: #1d1d1f !important;
      box-shadow: 0 0 0 3px #ffffff, 0 0 0 5px #1d1d1f;
      transform: scale(1.12);
    }
    .color-swatch-btn .swatch-color {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }
    .color-swatch-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .color-swatch-btn.disabled .swatch-color::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -5%;
      width: 110%;
      height: 2px;
      background: #ef4444;
      transform: rotate(-45deg);
    }
    
    /* Size Button */
    .size-btn {
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 13px;
      background: white;
      color: #1d1d1f;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }
    .size-btn:hover { border-color: #86868b; background: #fafafa; }
    .size-btn.selected {
      border-color: #1d1d1f !important;
      background: #1d1d1f !important;
      color: white !important;
    }
    .size-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: #f5f5f7;
      border-color: #e5e5e5;
      text-decoration: line-through;
      pointer-events: none;
    }
    
    /* Product Zoom - CSS from first program */
    .product-hero {
      position: relative;
      width: 100%;
      background: #fafafa;
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: zoom-in;
      transition: background 0.3s ease;
    }
    .product-hero:hover {
      background: #f5f5f5;
    }
    .product-hero img {
      width: 100%;
      height: 100%;
      max-height: 80vh;
      object-fit: contain;
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }
    .product-hero.zoomed img {
      transform: scale(2.5);
    }
    @media (min-width: 768px) {
      .product-hero {
        min-height: 70vh;
      }
      .product-hero img {
        max-height: 90vh;
      }
    }
    @media (min-width: 1024px) {
      .product-hero {
        min-height: 80vh;
      }
    }
    
    /* Star Rating */
    .star-rating { direction: rtl; display: inline-flex; }
    .star-rating input[type="radio"] { display: none; }
    .star-rating label {
      color: #d2d2d7;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: #ff9500; }
    
    /* Toast */
    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 40px);
    }
    #toast.show { transform: translateX(0); }
    
    /* Hide Scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Loader Animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Product Card */
    .product-card {
      transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .product-card:hover { transform: translateY(-4px); }
    .product-card .product-image {
      transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .product-card:hover .product-image { transform: scale(1.04); }
    
    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Specs Badge */
    .detail-badge {
      background: #f5f5f7;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .detail-badge:hover { background: #eeeef0; }
    .detail-badge i {
      font-size: 18px;
      color: #1d1d1f;
      width: 24px;
      text-align: center;
    }
    
    /* Toggle Button */
    .toggle-btn {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 16px 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.2s;
      text-align: left;
    }
    .toggle-btn:hover { background: #fafafa; border-color: #d1d1d1; }
    
    /* Collapse Section */
    .collapse-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .collapse-section.open { max-height: 1000px; }
    
    /* Description Content */
    .description-content {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 16px;
      margin-top: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.8;
    }
    
    /* Variant Info Badge */
    .variant-info-badge {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 12px;
      font-size: 12px;
      color: #0369a1;
    }
    
    /* Barcode Wrapper */
    .barcode-wrapper {
      background: white;
      padding: 28px 20px 20px;
      border-radius: 20px;
      border: 1px solid #f0f0f0;
      margin-top: 4px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      overflow: hidden;
    }
    .barcode-wrapper svg { max-width: 100%; height: auto; display: block; }
    
    /* Thumbnail Grid - Full Width */
    .thumbnail-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
    }
    .thumbnail-grid::-webkit-scrollbar { height: 3px; }
    .thumbnail-grid::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .thumbnail-grid::-webkit-scrollbar-track { background: transparent; }
    
    .thumbnail-item {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: all 0.2s ease;
      opacity: 0.7;
    }
    .thumbnail-item:hover { opacity: 1; border-color: #86868b; }
    .thumbnail-item.active {
      opacity: 1;
      border-color: #1d1d1f !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    
    /* Main Image Container - Full Width Edge to Edge */
    .main-image-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      position: relative;
    }
    @media (min-width: 768px) {
      .main-image-wrapper {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        border-radius: 0;
      }
    }
    
    /* Sticky Add to Cart Bar for Mobile */
    .sticky-add-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-top: 0.5px solid rgba(0,0,0,0.08);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      z-index: 49;
      display: none;
      align-items: center;
      gap: 12px;
    }
    .sticky-add-bar.active { display: flex; }
    
    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="antialiased">
  <!-- Global Loader -->
  <div id="global-loader" style="position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s;">
    <div style="text-align:center;">
      <div style="width:40px;height:40px;border:3px solid #e5e5e5;border-top-color:#1d1d1f;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
      <p style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.3em;color:rgba(29,29,31,0.5);">JAYENWARE</p>
    </div>
  </div>
  
  <!-- Toast Notification -->
  <div id="toast">
    <div style="background:white;box-shadow:0 20px 60px rgba(0,0,0,0.15);border-radius:18px;padding:14px 18px;display:flex;align-items:center;gap:12px;min-width:280px;border:1px solid #f0f0f0;">
      <span id="toast-icon" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;"></span>
      <p id="toast-text" style="font-size:13px;font-weight:600;flex-grow:1;"></p>
      <button onclick="hideToast()" style="color:#ccc;background:none;border:none;cursor:pointer;font-size:16px;flex-shrink:0;padding:4px 8px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="glass-nav">
    <div style="max-width:100%;margin:0 auto;padding:0 20px;height:56px;display:flex;justify-content:space-between;align-items:center;">
      <a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#1d1d1f;" aria-label="JAYENWARE Home">
        <img src="/logo.png" style="width:32px;height:32px;border-radius:8px;" alt="JAYENWARE Logo" width="40" height="40">
        <span style="font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:-0.5px;">JAYENWARE</span>
      </a>
      <div style="display:flex;align-items:center;gap:16px;">
        <a href="/" style="text-decoration:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#1d1d1f;">Home</a>
        <a href="/products" style="text-decoration:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#1d1d1f;">Shop</a>
        <a href="/cart" style="position:relative;padding:6px;text-decoration:none;color:#1d1d1f;" aria-label="Cart">
          <i class="fa-solid fa-bag-shopping" style="font-size:18px;"></i>
          <span id="cart-count" style="position:absolute;top:-2px;right:-4px;background:#1d1d1f;color:white;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main style="padding-top:56px;flex-grow:1;">
    <!-- Product Not Found -->
    <div id="product-not-found" style="display:none;text-align:center;padding:100px 20px;">
      <i class="fa-solid fa-box-open" style="font-size:64px;color:#e5e5e5;margin-bottom:20px;"></i>
      <h2 style="font-size:24px;font-weight:700;color:#1d1d1f;margin-bottom:8px;">Product Not Found</h2>
      <p style="color:#6b7280;margin-bottom:28px;">The product you're looking for doesn't exist or has been removed.</p>
      <a href="/products" style="display:inline-block;padding:14px 36px;background:#1d1d1f;color:white;border-radius:9999px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:12px;text-decoration:none;">Browse Products</a>
    </div>

    <!-- Loading Skeleton -->
    <div id="product-loading" style="display:grid;grid-template-columns:1fr;gap:0;">
      <div class="skeleton" style="width:100%;aspect-ratio:4/5;border-radius:0;"></div>
      <div style="padding:20px;">
        <div class="skeleton" style="height:14px;width:80px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:28px;width:100%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:36px;width:120px;margin-bottom:16px;"></div>
        <div class="skeleton" style="height:16px;width:200px;margin-bottom:16px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:20px;">
          <div class="skeleton" style="height:40px;width:100px;border-radius:12px;"></div>
          <div class="skeleton" style="height:40px;width:100px;border-radius:12px;"></div>
        </div>
        <div class="skeleton" style="height:120px;border-radius:16px;"></div>
      </div>
    </div>

    <!-- Product Detail Content -->
    <div id="product-detail-content"></div>

    <!-- Complete the Look -->
    <div id="complete-the-look-section" style="display:none;padding:40px 20px 60px;border-top:1px solid #f0f0f0;">
      <h3 style="font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:28px;text-align:center;">Complete the Look</h3>
      <div id="complete-the-look-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:600px;margin:0 auto;"></div>
    </div>
  </main>

  <!-- Sticky Add to Cart Bar -->
  <div id="sticky-add-bar" class="sticky-add-bar">
    <div style="flex-grow:1;">
      <span id="sticky-price" style="font-size:18px;font-weight:900;">৳ 0</span>
    </div>
    <button id="sticky-add-btn" style="padding:12px 28px;background:#1d1d1f;color:white;border:none;border-radius:9999px;font-weight:700;text-transform:uppercase;font-size:12px;cursor:pointer;white-space:nowrap;">Add to Bag</button>
  </div>

  <!-- Footer -->
  <footer style="background:#1d1d1f;color:#9ca3af;padding:40px 0 24px;margin-top:auto;">
    <div style="max-width:1280px;margin:0 auto;padding:0 20px;text-align:center;">
      <p style="font-size:11px;">Powered by <a href="https://binzeo.vercel.app" target="_blank" rel="noopener noreferrer" style="color:#007aff;font-weight:700;text-decoration:none;">BINZEO</a></p>
      <p style="font-size:9px;margin-top:10px;">&copy; <span id="display-year"></span> JAYENWARE. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function() {
      // ==================== INITIALIZATION ====================
      if (typeof JsBarcode === 'undefined') {
        console.warn('JsBarcode library failed to load. Barcode generation disabled.');
      }
      
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      // State variables
      let currentProduct = null;
      let allProducts = [];
      let productColors = [];
      let colorSizes = [];
      let productVariants = [];
      let allReviews = [];
      let selectedColorId = null;
      let selectedSizeId = null;
      let selectedVariant = null;
      let cart = [];
      let wishlist = [];
      let barcodeGenerated = false;
      let allImages = [];
      
      // DOM Elements
      const loader = document.getElementById('global-loader');
      const notFoundDiv = document.getElementById('product-not-found');
      const loadingDiv = document.getElementById('product-loading');
      const contentDiv = document.getElementById('product-detail-content');
      const ctlSection = document.getElementById('complete-the-look-section');
      const ctlGrid = document.getElementById('complete-the-look-grid');
      const canonicalLink = document.getElementById('canonical-url');
      const stickyBar = document.getElementById('sticky-add-bar');
      
      // ==================== UTILITY FUNCTIONS ====================
      function getSlugFromURL() {
        const path = window.location.pathname;
        let slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
        slug = slug.split('?')[0].split('#')[0];
        return slug || null;
      }
      
      function generateSlug(title) {
        if (!title) return '';
        return title.toLowerCase().replace(/[^\w\s\u0980-\u09FF-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '').substring(0, 80);
      }
      
      function initLocalStorage() {
        try {
          cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
          wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
        } catch(e) { cart = []; wishlist = []; }
      }
      
      function saveCart() { 
        localStorage.setItem('jayen_cart', JSON.stringify(cart)); 
        updateCartCount(); 
      }
      
      function updateCartCount() {
        const countEl = document.getElementById('cart-count');
        if (countEl) countEl.innerText = cart.length;
      }
      
      // ==================== TOAST NOTIFICATION ====================
      window.showToast = function(text, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        document.getElementById('toast-text').innerText = text;
        const icon = document.getElementById('toast-icon');
        if (type === 'success') {
          icon.style.background = '#ecfdf5'; icon.style.color = '#059669';
          icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else if (type === 'error') {
          icon.style.background = '#fef2f2'; icon.style.color = '#dc2626';
          icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
        } else {
          icon.style.background = '#eff6ff'; icon.style.color = '#2563eb';
          icon.innerHTML = '<i class="fa-solid fa-info"></i>';
        }
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
      };
      
      window.hideToast = function() {
        const toast = document.getElementById('toast');
        if (toast) toast.classList.remove('show');
      };
      
      // ==================== VARIANT HELPERS ====================
      function getAvailableSizesForColor(colorId) {
        const variants = productVariants.filter(v => v.color_id == colorId && v.is_active && v.stock > 0);
        const sizeIds = variants.map(v => v.size_id);
        return colorSizes.filter(s => sizeIds.includes(s.id) && s.color_id == colorId);
      }
      
      function getVariant(colorId, sizeId) {
        return productVariants.find(v => v.color_id == colorId && v.size_id == sizeId) || null;
      }
      
      // ==================== COLOR SELECTION ====================
      window.selectColor = function(colorId) {
        selectedColorId = colorId;
        selectedSizeId = null;
        selectedVariant = null;
        
        document.querySelectorAll('.color-swatch-btn').forEach(btn => {
          btn.classList.remove('selected');
          btn.style.borderColor = '#e5e5e5';
          btn.style.boxShadow = 'none';
          btn.style.transform = 'scale(1)';
        });
        
        const selectedBtn = document.querySelector(`.color-swatch-btn[data-color-id="${colorId}"]`);
        if (selectedBtn) {
          selectedBtn.classList.add('selected');

      // ==================== ADD TO CART ====================
      window.addToCart = function(productId, buyNow = false) {
        const product = allProducts.find(p => p.id == productId);
        if (!product) return showToast('Product not found', 'error');
        
        let finalPrice = product.price;
        let variantId = null;
        let variantName = null;
        let variantSku = null;
        
        if (productColors.length > 0 && !selectedVariant) {
          if (!selectedColorId) return showToast('Please select a color', 'error');
          if (!selectedSizeId) return showToast('Please select a size', 'error');
        }
        
        if (selectedVariant) {
          if (selectedVariant.stock <= 0) return showToast('Out of stock', 'error');
          const cartCount = cart.filter(i => i.variant_id == selectedVariant.id).length;
          if (cartCount >= selectedVariant.stock) return showToast('Stock limit reached', 'error');
          variantId = selectedVariant.id;
          variantName = selectedVariant.name;
          variantSku = selectedVariant.sku;
          finalPrice = selectedVariant.price;
        } else {
          if (cart.filter(i => i.product_id == productId && !i.variant_id).length >= product.stock) {
            return showToast('Stock limit reached', 'error');
          }
        }
        
        cart.push({
          id: Date.now(),
          product_id: product.id,
          variant_id: variantId,
          title: product.title,
          price: finalPrice,
          img: product.img,
          variant: variantName,
          sku: variantSku,
          quantity: 1
        });
        
        saveCart();
        showToast('Added to Bag! 🎉');
        if (buyNow) window.location.href = '/checkout';
      };

      // ==================== IMAGE ZOOM - From First Program ====================
      window.initZoom = function(container) {
        const img = container.querySelector('img');
        if (!img) return;
        
        container.addEventListener('mousemove', (e) => {
          const rect = container.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width;
          const y = (e.clientY - rect.top) / rect.height;
          img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
          container.classList.add('zoomed');
        });
        
        container.addEventListener('mouseleave', () => {
          container.classList.remove('zoomed');
        });
        
        // Touch support
        container.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const rect = container.getBoundingClientRect();
          const x = (e.touches[0].clientX - rect.left) / rect.width;
          const y = (e.touches[0].clientY - rect.top) / rect.height;
          img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
          container.classList.add('zoomed');
        }, { passive: false });
        
        container.addEventListener('touchend', () => {
          container.classList.remove('zoomed');
        });
      };

      // ==================== BARCODE GENERATION ====================
      function generateBarcode(barcodeText) {
        if (!barcodeText || typeof JsBarcode === 'undefined') {
          const container = document.getElementById('barcode-svg-container');
          if (container) container.innerHTML = '<p style="color:#9ca3af;font-size:12px;text-align:center;padding:20px;">Barcode library not available</p>';
          return;
        }
        const svgElement = document.getElementById('barcode-svg');
        if (!svgElement) return;
        
        try {
          JsBarcode("#barcode-svg", barcodeText, {
            format: "CODE128", width: 2, height: 80, displayValue: true,
            fontSize: 14, margin: 10, background: "#ffffff", lineColor: "#1d1d1f"
          });
          barcodeGenerated = true;
        } catch(e) {
          const container = document.getElementById('barcode-svg-container');
          if (container) container.innerHTML = '<p style="color:#ef4444;font-size:12px;text-align:center;padding:20px;">Failed to generate barcode</p>';
        }
      }

          const { error } = await _supabase.from('product_reviews').insert([{

          if (error) throw error;
          showToast('Review submitted! Thank you 🎉', 'success');

              ${product.old_price?`<span style="font-size:16px;color:#86868b;text-decoration:line-through;">৳ ${product.old_price}</span>`:''}
            </div>
            <button onclick="toggleWishlist(${product.id})" data-wishlist-btn style="display:flex;align-items:center;gap:6px;padding:10px 18px;border:1.5px solid #e5e5e5;border-radius:9999px;font-size:10px;font-weight:700;background:white;cursor:pointer;white-space:nowrap;transition:all 0.2s;">
              <i class="fa-${wishlist.includes(product.id)?'solid':'regular'} fa-heart" style="color:${wishlist.includes(product.id)?'#ef4444':'#9ca3af'};"></i> ${wishlist.includes(product.id)?'Wishlisted':'Wishlist'}
            </button>
          </div>
          
          <!-- Stock Status & Rating -->
          <div id="stock-status" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
            ${stockDisplayHTML}
            ${avgRating?`<span style="font-size:12px;color:#9ca3af;margin-left:8px;"><i class="fa-solid fa-star" style="color:#ff9500;"></i> ${avgRating} (${prodReviews.length})</span>`:''}
          </div>
          
          <!-- Short Description -->
          ${product.short_description ? `<p style="font-size:14px;color:#6b7280;margin-bottom:20px;line-height:1.7;">${product.short_description}</p>` : ''}
          
          <!-- Color Selection -->
          ${colorsHTML}
          
          <!-- Size Selection -->
          ${sizesHTML}
          
          <!-- Variant Info Badge -->
          <div id="variant-info" class="variant-info-badge" style="display:none;"></div>
          
          <!-- Buy Buttons -->
          <div id="buy-section" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0;">
            <button id="add-to-bag-btn" onclick="addToCart(${product.id})" style="padding:16px;background:#1d1d1f;color:white;border:none;border-radius:16px;font-weight:700;text-transform:uppercase;font-size:13px;cursor:pointer;letter-spacing:0.5px;">Add to Bag</button>
            <button id="buy-now-btn" onclick="addToCart(${product.id},true)" style="padding:16px;background:white;border:2px solid #1d1d1f;color:#1d1d1f;border-radius:16px;font-weight:700;text-transform:uppercase;font-size:13px;cursor:pointer;letter-spacing:0.5px;">Buy Now</button>
          </div>
          
          <!-- Specifications -->
          <button class="toggle-btn" onclick="toggleCollapse('specs-collapse','specs-icon')">
            <span><i class="fa-solid fa-sliders" style="margin-right:10px;"></i>Specifications</span>
            <i id="specs-icon" class="fa-solid fa-chevron-down"></i>
          </button>
          <div id="specs-collapse" class="collapse-section">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 16px;">
              ${product.fabric_type ? `<div class="detail-badge"><i class="fa-solid fa-shirt"></i><div><span style="color:#9ca3af;font-size:9px;">Fabric</span><br><span style="font-weight:700;">${product.fabric_type}</span></div></div>` : ''}
              ${product.gsm_type ? `<div class="detail-badge"><i class="fa-solid fa-weight-scale"></i><div><span style="color:#9ca3af;font-size:9px;">GSM</span><br><span style="font-weight:700;">${product.gsm_type}</span></div></div>` : ''}
              ${product.fit_type ? `<div class="detail-badge"><i class="fa-solid fa-ruler"></i><div><span style="color:#9ca3af;font-size:9px;">Fit</span><br><span style="font-weight:700;">${product.fit_type}</span></div></div>` : ''}
              ${product.gender ? `<div class="detail-badge"><i class="fa-solid fa-venus-mars"></i><div><span style="color:#9ca3af;font-size:9px;">Gender</span><br><span style="font-weight:700;">${product.gender}</span></div></div>` : ''}
              ${product.print_type ? `<div class="detail-badge"><i class="fa-solid fa-palette"></i><div><span style="color:#9ca3af;font-size:9px;">Print</span><br><span style="font-weight:700;">${product.print_type}</span></div></div>` : ''}
              ${product.sku ? `<div class="detail-badge"><i class="fa-solid fa-barcode"></i><div><span style="color:#9ca3af;font-size:9px;">SKU</span><br><span style="font-weight:700;font-size:10px;">${product.sku}</span></div></div>` : ''}
            </div>
          </div>
          
          <!-- Description -->
          ${product.description ? `
          <button class="toggle-btn" onclick="toggleCollapse('desc-collapse','desc-icon')">
            <span><i class="fa-solid fa-align-left" style="margin-right:10px;"></i>Description</span>
            <i id="desc-icon" class="fa-solid fa-chevron-down"></i>
          </button>
          <div id="desc-collapse" class="collapse-section">
            <div class="description-content">${product.description}</div>
          </div>` : ''}
          
          <!-- Barcode -->
          ${(selectedVariant?.barcode || product.barcode) ? `
          <button class="toggle-btn" onclick="toggleCollapse('barcode-collapse','barcode-icon', '${(selectedVariant?.barcode || product.barcode || '').replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">
            <span><i class="fa-solid fa-upc" style="margin-right:10px;"></i>Barcode</span>
            <i id="barcode-icon" class="fa-solid fa-chevron-down"></i>
          </button>
          <div id="barcode-collapse" class="collapse-section">
            <div class="barcode-wrapper" id="barcode-svg-container">
              <svg id="barcode-svg"></svg>
            </div>
          </div>` : ''}
          
          <!-- Reviews Section -->
          <div style="border-top:1px solid #f0f0f0;padding-top:32px;margin-top:28px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
              <h3 style="font-size:22px;font-weight:700;">Reviews</h3>
              <span style="color:#9ca3af;">(${prodReviews.length})</span>
            </div>
            <div style="margin-bottom:24px;">${reviewsHTML}</div>
            
            <!-- Write Review -->
            <div style="background:#f5f5f7;padding:24px;border-radius:18px;">
              <h4 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">Write a Review</h4>
              <div class="star-rating" style="margin-bottom:14px;">
                <input type="radio" id="star5" name="product-rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star4" name="product-rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star3" name="product-rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star2" name="product-rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
                <input type="radio" id="star1" name="product-rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
              </div>
              <textarea id="review-text" placeholder="Share your experience..." style="width:100%;padding:14px;border:1px solid #e5e5e5;border-radius:14px;font-size:13px;height:90px;margin-bottom:14px;font-family:Inter,sans-serif;resize:vertical;"></textarea>
              <button onclick="submitReview(${product.id})" style="padding:12px 28px;background:#1d1d1f;color:white;border:none;border-radius:9999px;font-weight:700;text-transform:uppercase;font-size:11px;cursor:pointer;letter-spacing:0.5px;">Submit Review</button>
            </div>
          </div>
          
          <div style="height:40px;"></div>
        </div>`;
        
        // Complete the Look
        const related = getRandomProducts(product.id, 4);
        if (related.length) {
          ctlSection.style.display = 'block';
          ctlGrid.innerHTML = related.map(p => productCardHTML(p)).join('');
        } else {
          ctlSection.style.display = 'none';
        }
        
        // Initialize sticky bar
        initStickyBar();
        updateStickyBar();
        
        // Trigger initial scroll check
        setTimeout(() => {
          if (scrollHandler) scrollHandler();
        }, 100);
        
        // Initialize zoom after content is rendered - From First Program
        setTimeout(() => {
          const hero = document.getElementById('product-hero');
          if (hero) initZoom(hero);
        }, 100);
      }
      
      // ==================== DATA LOADING ====================
      async function loadProductBySlug(slug) {
        try {
          const { data: products, error: prodErr } = await _supabase.from('products').select('*').eq('status', 'Active');
          if (prodErr) throw prodErr;
          allProducts = products || [];
          const product = allProducts.find(p => (p.slug || generateSlug(p.title)) === slug);
          if (!product) return false;
          
          const [colorsRes, variantsRes, revRes] = await Promise.all([
            _supabase.from('product_colors').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
            _supabase.from('product_variants').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
            _supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at', { ascending: false })
          ]);
          
          productColors = colorsRes.data || [];
          productVariants = variantsRes.data || [];
          allReviews = revRes.data || [];
          
          if (productColors.length > 0) {
            const colorIds = productColors.map(c => c.id);
            const { data: sizesData } = await _supabase.from('color_sizes').select('*').in('color_id', colorIds).order('sort_order', { ascending: true });
            colorSizes = sizesData || [];
          } else {
            colorSizes = [];
          }
          
          // Save to recent
          try {
            let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
            recent = [product.id.toString(), ...recent.filter(id => id != product.id)].slice(0,8);
            localStorage.setItem('jayen_recent', JSON.stringify(recent));
          } catch(e) {}
          
          renderProductDetails(product);
          return true;
        } catch(e) {
          console.error('Error loading product:', e);
          return false;
        }
      }
      
      function hideLoader() {
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.4s';
          setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
      }
      
      function showNotFound() {
        hideLoader();
        if (loadingDiv) loadingDiv.style.display = 'none';
        if (contentDiv) contentDiv.innerHTML = '';
        if (ctlSection) ctlSection.style.display = 'none';
        if (notFoundDiv) notFoundDiv.style.display = 'block';
        if (stickyBar) stickyBar.classList.remove('active');
      }
      
      // ==================== INIT ====================
      async function init() {
        initLocalStorage();
        updateCartCount();
        document.getElementById('display-year').innerText = new Date().getFullYear();
        
        const slug = getSlugFromURL();
        if (!slug) {
          showNotFound();
          return;
        }
        
        if (loadingDiv) loadingDiv.style.display = 'grid';
        if (notFoundDiv) notFoundDiv.style.display = 'none';
        
        const found = await loadProductBySlug(slug);
        if (!found) {
          showNotFound();
        } else {
          hideLoader();
        }
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
