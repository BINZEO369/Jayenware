<!DOCTYPE html>
<html lang="en-BD">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Product | JAYENWARE</title>
    
    <meta name="description" content="Shop premium products at JAYENWARE official store">
    <meta property="og:title" content="JAYENWARE Product">
    <meta property="og:description" content="Premium lifestyle products by BINZEO">
    <meta property="og:image" content="https://www.jayenware.shop/logo.png">
    <meta property="og:url" id="og-url" content="https://www.jayenware.shop/product/">
    <meta property="og:type" content="product">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index, follow">
    <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/product/">
    
    <link rel="icon" type="image/png" href="https://www.jayenware.shop/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/api-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    colors: {
                        primary: '#1d1d1f',
                        accent: '#86868b',
                        soft: '#f5f5f7',
                        blue: '#007aff'
                    }
                }
            }
        }
    </script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #fff; color: #1d1d1f; font-family: 'Inter', sans-serif; margin: 0; }
        .glass-nav {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: fixed; top: 0; width: 100%; z-index: 50;
        }
        .variant-btn { transition: all 0.2s ease; }
        .variant-btn.selected { border-color: #1d1d1f !important; background: #1d1d1f !important; color: white !important; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input[type="radio"] { display: none; }
        .star-rating label { color: #d2d2d7; font-size: 20px; cursor: pointer; transition: color 0.2s; }
        .star-rating input[type="radio"]:checked ~ label,
        .star-rating label:hover, .star-rating label:hover ~ label { color: #ff9500; }
        
        #product-zoom-container { cursor: crosshair; overflow: hidden; }
        #product-zoom-image { transition: transform 0.1s ease-out; }
        
        .toast {
            position: fixed; top: 16px; right: 16px; z-index: 200;
            transform: translateX(120%); transition: transform 0.35s ease;
            max-width: calc(100vw - 32px);
        }
        .toast.show { transform: translateX(0); }
        
        @media (max-width: 640px) {
            .product-img-container { aspect-ratio: 3/4; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="bg-white shadow-2xl rounded-2xl p-3 flex items-center gap-3 min-w-[260px] border border-gray-100">
            <span id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0"></span>
            <p id="toast-text" class="text-xs font-bold flex-grow"></p>
            <button onclick="hideToast()" class="text-gray-300 hover:text-gray-600 shrink-0"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-4 h-14 sm:h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 no-underline">
                <img src="https://www.jayenware.shop/logo.png" class="w-8 h-8 rounded-lg" alt="JAYENWARE">
                <span class="text-lg font-black font-serif text-primary">JAYENWARE</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="/products" class="text-xs font-bold uppercase tracking-wider text-primary hover:text-blue transition no-underline">Shop All</a>
                <a href="/cart" class="relative p-1.5 no-underline text-primary">
                    <i class="fa-solid fa-bag-shopping text-lg"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-14 sm:pt-16">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 py-6">
            <a href="/products" class="mb-6 text-xs font-bold text-gray-400 hover:text-primary transition flex items-center gap-2 no-underline">
                <i class="fa-solid fa-arrow-left"></i> Back to Collection
            </a>
            
            <!-- Loading State -->
            <div id="loading-state" class="text-center py-20">
                <div class="w-10 h-10 border-3 border-gray-200 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-sm text-gray-400">Loading product...</p>
            </div>
            
            <!-- Product Content -->
            <div id="product-content" class="hidden">
                <!-- Product details will be injected here -->
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden text-center py-20">
                <i class="fa-solid fa-circle-exclamation text-5xl text-gray-300 mb-4"></i>
                <p class="text-lg text-gray-500 mb-4">Product not found</p>
                <a href="/products" class="px-6 py-3 bg-primary text-white rounded-full text-xs font-bold uppercase hover:bg-blue transition no-underline inline-block">Browse Products</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-gray-400 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-[10px] uppercase tracking-wider">© <span id="display-year"></span> JAYENWARE. A BINZEO Concern</p>
        </div>
    </footer>

    <script>
        // Supabase Setup
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
        let wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
        let selectedVariantObj = null;
        let currentProduct = null;
        
        // Toast System
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-text').innerText = text;
            
            if (type === 'success') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-green-100 text-green-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'error') {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-red-100 text-red-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            } else {
                icon.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm bg-blue-100 text-blue-600 shrink-0';
                icon.innerHTML = '<i class="fa-solid fa-info"></i>';
            }
            
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function hideToast() {
            document.getElementById('toast').classList.remove('show');
        }
        
        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }
        
        function saveCart() {
            localStorage.setItem('jayen_cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        // Get product slug from URL
        function getProductSlugFromURL() {
            const path = window.location.pathname;
            const parts = path.split('/');
            return parts[parts.length - 1] || '';
        }
        
        // Generate product slug
        function getProductSlug(title) {
            if (!title) return '';
            return title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .substring(0, 80);
        }
        
        // Load Product
        async function loadProduct() {
            const slug = getProductSlugFromURL();
            
            if (!slug) {
                showError();
                return;
            }
            
            try {
                // First try to get all products to find the matching slug
                const { data: products, error } = await _supabase
                    .from('products')
                    .select('*');
                
                if (error) throw error;
                
                if (!products || !products.length) {
                    showError();
                    return;
                }
                
                // Find product by matching slug
                const product = products.find(p => getProductSlug(p.title) === slug);
                
                if (!product) {
                    showError();
                    return;
                }
                
                // Store current product
                currentProduct = product;
                
                // Add to recently viewed
                let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
                recent = [product.id.toString(), ...recent.filter(id => id !== product.id.toString())].slice(0, 8);
                localStorage.setItem('jayen_recent', JSON.stringify(recent));
                
                // Get variants
                const { data: variants } = await _supabase
                    .from('product_variants')
                    .select('*')
                    .eq('product_id', product.id);
                
                // Get reviews
                const { data: reviews } = await _supabase
                    .from('product_reviews')
                    .select('*')
                    .eq('product_id', product.id);
                
                // Render product
                renderProduct(product, variants || [], reviews || []);
                
                // Update SEO
                updateSEOMeta(product);
                
            } catch (error) {
                console.error('Error loading product:', error);
                showError();
            }
        }
        
        function showError() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('product-content').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }
        
        function updateSEOMeta(product) {
            document.title = `${product.title} | Buy Online | JAYENWARE`;
            document.getElementById('page-title').innerText = document.title;
            
            const desc = (product.description || '').substring(0, 155) + '...';
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.content = desc;
            
            const canonical = document.getElementById('canonical-url');
            const ogUrl = document.getElementById('og-url');
            const slug = getProductSlug(product.title);
            const url = `https://www.jayenware.shop/product/${slug}`;
            
            if (canonical) canonical.href = url;
            if (ogUrl) ogUrl.content = url;
            
            // Update OG meta
            const ogTitle = document.querySelector('meta[property="og:title"]');
            const ogDesc = document.querySelector('meta[property="og:description"]');
            const ogImage = document.querySelector('meta[property="og:image"]');
            
            if (ogTitle) ogTitle.content = product.title + ' | JAYENWARE';
            if (ogDesc) ogDesc.content = desc;
            if (ogImage) ogImage.content = product.img || 'https://www.jayenware.shop/logo.png';
            
            // Update Twitter meta
            const twitterTitle = document.querySelector('meta[name="twitter:title"]');
            const twitterDesc = document.querySelector('meta[name="twitter:description"]');
            const twitterImage = document.querySelector('meta[name="twitter:image"]');
            
            if (twitterTitle) twitterTitle.content = product.title + ' | JAYENWARE';
            if (twitterDesc) twitterDesc.content = desc;
            if (twitterImage) twitterImage.content = product.img || 'https://www.jayenware.shop/logo.png';
        }
        
        function renderProduct(product, variants, reviews) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            
            const content = document.getElementById('product-content');
            content.classList.remove('hidden');
            
            const allImages = product.images ? product.images.split(',') : [product.img];
            const isOut = product.stock <= 0;
            
            if (variants.length > 0) {
                selectedVariantObj = { id: variants[0].id, name: variants[0].name, price: variants[0].price };
            }
            
            // Reviews HTML
            const avgRating = reviews.length 
                ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1) 
                : 0;
            
            const reviewsHTML = reviews.length 
                ? reviews.map(r => `
                    <div class="bg-white p-4 rounded-xl border border-gray-100">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[#ff9500] text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                            <span class="text-xs font-bold">${r.user_name || 'Anonymous'}</span>
                            <span class="text-[9px] text-gray-400 ml-auto">${new Date(r.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-xs text-gray-600">${r.review_text}</p>
                    </div>
                `).join('') 
                : '<p class="text-gray-400 text-sm italic">No reviews yet. Be the first to review!</p>';
            
            content.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 mb-10">
                    <!-- Image Gallery -->
                    <div>
                        <div id="product-zoom-container" class="rounded-3xl overflow-hidden bg-soft" style="aspect-ratio:3/4; max-height:70vh;" 
                             onmousemove="zoomImage(event)" onmouseleave="resetZoom()" 
                             ontouchmove="zoomImage(event)" ontouchend="resetZoom()">
                            <img id="product-zoom-image" src="${allImages[0]}" alt="${product.title}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-1">
                            ${allImages.map(img => `
                                <img src="${img}" onclick="document.getElementById('product-zoom-image').src='${img}';resetZoom()" 
                                     class="w-16 h-16 sm:w-20 sm:h-20 object-cover rounded-xl cursor-pointer border-2 border-transparent hover:border-primary transition shrink-0" 
                                     alt="${product.title}">
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- Product Info -->
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-blue">${product.category}</span>
                        <h1 class="text-2xl sm:text-4xl font-bold tracking-tight text-primary mt-2 mb-6">${product.title}</h1>
                        
                        <!-- Price -->
                        <div class="mb-6">
                            <span class="text-2xl sm:text-3xl font-black">৳ ${product.price}</span>
                            ${product.old_price ? `<span class="ml-3 text-lg text-accent line-through">৳${product.old_price}</span>` : ''}
                        </div>
                        
                        <!-- Stock Status -->
                        <div class="flex items-center gap-2 mb-6">
                            <span class="w-2 h-2 rounded-full ${isOut ? 'bg-red-500' : 'bg-green-500'}"></span>
                            <span class="text-xs font-bold ${isOut ? 'text-red-500' : 'text-green-600'}">
                                ${isOut ? 'Out of Stock' : `In Stock: ${product.stock}`}
                            </span>
                            ${reviews.length ? `
                                <span class="text-xs text-gray-400 ml-2">
                                    <i class="fa-solid fa-star text-[#ff9500] text-[9px]"></i> 
                                    ${avgRating} (${reviews.length} reviews)
                                </span>
                            ` : ''}
                        </div>
                        
                        <!-- Variants -->
                        ${variants.length ? `
                            <div class="mb-8">
                                <p class="text-[10px] font-black uppercase text-accent mb-3">Select Variant</p>
                                <div class="flex flex-wrap gap-2" id="detail-variant-container">
                                    ${variants.map((v, i) => `
                                        <button onclick="selectVariant(this, '${v.id}', '${v.name}', ${v.price})" 
                                                class="variant-btn px-5 py-2.5 border-2 rounded-2xl text-xs font-bold transition ${i === 0 ? 'selected' : ''}" 
                                                data-vid="${v.id}">
                                            ${v.name} - ৳${v.price}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        <!-- Action Buttons -->
                        <div class="grid grid-cols-2 gap-3 mb-8">
                            <button onclick="addToCart(${product.id}, false)" ${isOut ? 'disabled' : ''} 
                                    class="py-4 ${isOut ? 'bg-gray-200' : 'bg-primary hover:bg-blue'} text-white rounded-2xl font-bold text-xs uppercase tracking-wider transition">
                                Add to Bag
                            </button>
                            <button onclick="addToCart(${product.id}, true)" ${isOut ? 'disabled' : ''} 
                                    class="py-4 ${isOut ? 'bg-gray-100' : 'bg-white border-2 border-primary hover:bg-primary hover:text-white'} rounded-2xl font-bold text-xs uppercase tracking-wider transition">
                                Buy Now
                            </button>
                        </div>
                        
                        <!-- Description -->
                        <div class="bg-soft p-6 rounded-2xl mb-6">
                            <h3 class="font-bold text-xs uppercase mb-2">Description</h3>
                            <p class="text-sm text-gray-600 leading-relaxed">${product.description}</p>
                        </div>
                        
                        <!-- Trust Badges -->
                        <div class="flex flex-wrap gap-2 mt-auto">
                            <div class="flex items-center gap-1 bg-green-50 px-3 py-1 rounded-full text-[10px]">
                                <i class="fa-solid fa-shield-halved text-green-600"></i> 100% Authentic
                            </div>
                            <div class="flex items-center gap-1 bg-blue-50 px-3 py-1 rounded-full text-[10px]">
                                <i class="fa-solid fa-truck-fast text-blue-600"></i> Fast Delivery
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Reviews Section -->
                <div class="border-t pt-10">
                    <div class="flex items-center gap-3 mb-6">
                        <h3 class="text-2xl font-bold tracking-tight text-primary">Customer Reviews</h3>
                        <span class="text-sm text-gray-400 font-bold">(${reviews.length})</span>
                    </div>
                    <div class="space-y-4 mb-8">
                        ${reviewsHTML}
                    </div>
                    
                    <!-- Review Form -->
                    <div class="bg-soft p-5 rounded-2xl">
                        <h4 class="font-bold text-xs uppercase mb-3">Write a Review</h4>
                        <div class="star-rating mb-3" id="review-stars">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
                        </div>
                        <textarea id="review-text" placeholder="Share your experience..." class="w-full p-3 border rounded-xl text-xs h-20 mb-3 outline-none focus:border-blue transition"></textarea>
                        <input type="text" id="review-name" placeholder="Your name" class="w-full p-3 border rounded-xl text-xs mb-3 outline-none focus:border-blue transition">
                        <button onclick="submitReview(${product.id})" class="px-6 py-2.5 bg-primary text-white rounded-full text-[10px] font-bold uppercase hover:bg-blue transition">Submit Review</button>
                    </div>
                </div>
            `;
        }
        
        // Variant Selection
        function selectVariant(btn, vId, vName, vPrice) {
            document.querySelectorAll('#detail-variant-container .variant-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedVariantObj = { id: vId, name: vName, price: vPrice };
        }
        
        // Image Zoom
        function zoomImage(e) {
            const container = document.getElementById('product-zoom-container');
            const img = document.getElementById('product-zoom-image');
            if (!container || !img) return;
            
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) / rect.width;
            const y = (clientY - rect.top) / rect.height;
            
            img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
            img.style.transform = 'scale(2)';
        }
        
        function resetZoom() {
            const img = document.getElementById('product-zoom-image');
            if (img) img.style.transform = 'scale(1)';
        }
        
        // Add to Cart
        function addToCart(productId, buyNow = false) {
            if (!currentProduct) return;
            
            const product = currentProduct;
            let finalPrice = product.price;
            let vId = null;
            let vName = null;
            
            const hasVariants = document.getElementById('detail-variant-container');
            if (hasVariants) {
                if (!selectedVariantObj) {
                    showToast('Please select a variant', 'error');
                    return;
                }
                vId = selectedVariantObj.id;
                vName = selectedVariantObj.name;
                finalPrice = selectedVariantObj.price;
            }
            
            // Check stock
            const existingCount = cart.filter(i => i.product_id === productId).length;
            if (existingCount >= product.stock) {
                showToast('Stock limit reached', 'error');
                return;
            }
            
            cart.push({
                id: Date.now(),
                product_id: product.id,
                variant_id: vId,
                title: product.title,
                price: finalPrice,
                img: product.img,
                variant: vName,
                quantity: 1
            });
            
            saveCart();
            showToast('Added to Bag!');
            
            if (buyNow) {
                window.location.href = '/cart';
            }
        }
        
        // Submit Review
        async function submitReview(productId) {
            const text = document.getElementById('review-text').value;
            const name = document.getElementById('review-name').value;
            const stars = document.querySelector('input[name="rating"]:checked');
            
            if (!text || !name || !stars) {
                showToast('Please complete all fields', 'error');
                return;
            }
            
            try {
                const { error } = await _supabase
                    .from('product_reviews')
                    .insert([{
                        product_id: productId,
                        user_name: name,
                        rating: parseInt(stars.value),
                        review_text: text
                    }]);
                
                if (error) throw error;
                
                showToast('Review submitted! Thank you.');
                
                // Reload product to show new review
                setTimeout(() => loadProduct(), 1500);
            } catch (error) {
                showToast('Failed to submit review', 'error');
                console.error(error);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('display-year').innerText = new Date().getFullYear();
            updateCartCount();
            loadProduct();
        });
    </script>
</body>
</html>
