<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Product Details | JAYENWARE</title>
  <meta name="description" content="Discover detailed product specifications, fabric, fit, and more at JAYENWARE.">
  <meta name="theme-color" content="#1d1d1f">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="canonical" id="canonical-url" href="https://jayenwaretest369.vercel.app/product/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    img { max-width: 100%; height: auto; display: block; }
    .glass-nav {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
    }
    
    /* Color Swatch Button - Circle Only */
    .color-swatch-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid #e5e5e5;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      flex-shrink: 0;
      background: transparent;
      padding: 0;
      outline: none;
    }
    .color-swatch-btn:hover {
      transform: scale(1.08);
      border-color: #86868b;
    }
    .color-swatch-btn.selected {
      border-color: #1d1d1f !important;
      box-shadow: 0 0 0 2px #ffffff, 0 0 0 5px #1d1d1f;
      transform: scale(1.08);
    }
    .color-swatch-btn .swatch-color {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }
    .color-swatch-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    .color-swatch-btn.disabled .swatch-color {
      position: relative;
    }
    .color-swatch-btn.disabled .swatch-color::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -5%;
      width: 110%;
      height: 2px;
      background: #ef4444;
      transform: rotate(-45deg);
    }
    
    /* Size Button Styles */
    .size-btn {
      transition: all 0.2s ease;
      cursor: pointer;
      border: 2px solid #e5e5e5;
      border-radius: 14px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 13px;
      background: white;
      color: #1d1d1f;
      min-width: 52px;
      text-align: center;
      flex-shrink: 0;
    }
    .size-btn:hover {
      border-color: #86868b;
      background: #f9f9f9;
    }
    .size-btn.selected {
      border-color: #1d1d1f !important;
      background: #1d1d1f !important;
      color: white !important;
    }
    .size-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      background: #f5f5f7;
      border-color: #e5e5e5;
      text-decoration: line-through;
      pointer-events: none;
    }
    
    #product-zoom-container {
      cursor: crosshair;
      overflow: hidden;
      position: relative;
      background: #f5f5f7;
    }
    #product-zoom-image {
      transition: transform 0.1s ease-out;
      will-change: transform;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .star-rating {
      direction: rtl;
      display: inline-flex;
    }
    .star-rating input[type="radio"] { display: none; }
    .star-rating label {
      color: #d2d2d7;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: #ff9500; }
    #toast {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 32px);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .product-card {
      transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .product-card:hover { transform: translateY(-3px); }
    .product-card .product-image {
      transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .product-card:hover .product-image { transform: scale(1.03); }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .detail-badge {
      background: #f5f5f7;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-badge i {
      font-size: 18px;
      color: #1d1d1f;
      width: 24px;
      text-align: center;
    }
    .toggle-btn {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      text-align: left;
    }
    .toggle-btn:hover {
      background: #f9f9f9;
      border-color: #d1d1d1;
    }
    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
      margin-bottom: 16px;
    }
    .barcode-wrapper {
      background: white;
      padding: 24px 16px 16px;
      border-radius: 20px;
      border: 1px solid #f0f0f0;
      margin-top: 4px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      overflow: hidden;
    }
    .barcode-wrapper svg {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .collapse-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
    }
    .collapse-section.open {
      max-height: 800px;
    }
    .description-content {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 16px;
      margin-top: 4px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.7;
    }
    .variant-info-badge {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 12px;
      color: #0369a1;
    }
    .selected-info {
      font-size: 11px;
      color: #86868b;
      margin-top: 8px;
      font-weight: 500;
    }
    .selected-info strong {
      color: #1d1d1f;
    }
  </style>
</head>

          <div class="skeleton" style="height:16px;width:80px;margin-bottom:8px;"></div>

      <p style="font-size:10px;">Powered by <a href="https://binzeo.vercel.app" target="_blank" rel="noopener noreferrer" style="color:#007aff;font-weight:700;text-decoration:none;">BINZEO</a></p>
      <p style="font-size:8px;margin-top:8px;">&copy; <span id="display-year"></span> JAYENWARE. All rights reserved.</p>
    </div>

  <script>
    (function() {
      if (typeof JsBarcode === 'undefined') {
        console.error('JsBarcode library failed to load. Barcode generation will not work.');
      }
      
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let currentProduct = null;
      let allProducts = [];
      let productColors = [];
      let colorSizes = [];
      let productVariants = [];
      let allReviews = [];
      let selectedColorId = null;
      let selectedSizeId = null;
      let selectedVariant = null;
      let cart = [];
      let wishlist = [];
      let barcodeGenerated = false;
      
      const loader = document.getElementById('global-loader');
      const notFoundDiv = document.getElementById('product-not-found');
      const loadingDiv = document.getElementById('product-loading');
      const contentDiv = document.getElementById('product-detail-content');
      const ctlSection = document.getElementById('complete-the-look-section');
      const ctlGrid = document.getElementById('complete-the-look-grid');
      const canonicalLink = document.getElementById('canonical-url');
      
      function getSlugFromURL() {
        const path = window.location.pathname;
        let slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
        slug = slug.split('?')[0].split('#')[0];
        return slug || null;
      }
      
      function generateSlug(title) {
        if (!title) return '';
        return title.toLowerCase().replace(/[^\w\s\u0980-\u09FF-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '').substring(0, 80);
      }
      
      function initLocalStorage() {
        try {
          cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
          wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
        } catch(e) { cart = []; wishlist = []; }
      }
      
      function showToast(text, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        document.getElementById('toast-text').innerText = text;
        const icon = document.getElementById('toast-icon');
        if (type === 'success') {
          icon.style.background = '#ecfdf5'; icon.style.color = '#059669';
          icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else if (type === 'error') {
          icon.style.background = '#fef2f2'; icon.style.color = '#dc2626';
          icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
        } else {
          icon.style.background = '#eff6ff'; icon.style.color = '#2563eb';
          icon.innerHTML = '<i class="fa-solid fa-info"></i>';
        }
        toast.style.transform = 'translateX(0)';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.transform = 'translateX(120%)'; }, 3000);
      }
      
      window.hideToast = function() {
        const toast = document.getElementById('toast');
        if (toast) toast.style.transform = 'translateX(120%)';
      };
      
      function updateCartCount() {
        const countEl = document.getElementById('cart-count');
        if (countEl) countEl.innerText = cart.length;
      }
      
      function saveCart() { localStorage.setItem('jayen_cart', JSON.stringify(cart)); updateCartCount(); }
      
      // Get available sizes for selected color
      function getAvailableSizesForColor(colorId) {
        const variants = productVariants.filter(v => v.color_id == colorId && v.is_active && v.stock > 0);
        const sizeIds = variants.map(v => v.size_id);
        return colorSizes.filter(s => sizeIds.includes(s.id) && s.color_id == colorId);
      }
      
      // Get variant by color and size
      function getVariant(colorId, sizeId) {
        return productVariants.find(v => v.color_id == colorId && v.size_id == sizeId) || null;
      }
      
      // Select color
      window.selectColor = function(colorId) {
        selectedColorId = colorId;
        selectedSizeId = null;
        selectedVariant = null;
        
        // Update color swatch buttons UI
        document.querySelectorAll('.color-swatch-btn').forEach(btn => {
          btn.classList.remove('selected');
          btn.style.borderColor = '#e5e5e5';
          btn.style.boxShadow = 'none';
          btn.style.transform = 'scale(1)';
        });
        
        const selectedBtn = document.querySelector(`.color-swatch-btn[data-color-id="${colorId}"]`);
        if (selectedBtn) {
          selectedBtn.classList.add('selected');
          selectedBtn.style.borderColor = '#1d1d1f';
          selectedBtn.style.boxShadow = '0 0 0 2px #ffffff, 0 0 0 5px #1d1d1f';
          selectedBtn.style.transform = 'scale(1.08)';
        }
        
        // Update selected color name display
        const color = productColors.find(c => c.id == colorId);
        const selectedColorNameEl = document.getElementById('selected-color-name');
        if (selectedColorNameEl && color) {
          selectedColorNameEl.textContent = color.color_name;
        }
        
        // Update color image if available
        if (color && color.color_image) {
          const mainImg = document.getElementById('product-zoom-image');
          if (mainImg) mainImg.src = color.color_image;
        }
        
        // Update sizes
        updateSizeButtons();
        updatePriceDisplay();
        updateVariantInfo();
      };
      
      // Select size
      window.selectSize = function(sizeId) {
        selectedSizeId = sizeId;
        
        // Update size buttons UI
        document.querySelectorAll('.size-btn').forEach(btn => {
          btn.classList.remove('selected');
          btn.style.borderColor = '#e5e5e5';
          btn.style.background = 'white';
          btn.style.color = '#1d1d1f';
        });
        
        const selectedBtn = document.querySelector(`.size-btn[data-size-id="${sizeId}"]`);
        if (selectedBtn) {
          selectedBtn.classList.add('selected');
          selectedBtn.style.borderColor = '#1d1d1f';
          selectedBtn.style.background = '#1d1d1f';
          selectedBtn.style.color = 'white';
        }
        
        // Update selected size name display
        const size = colorSizes.find(s => s.id == sizeId);
        const selectedSizeNameEl = document.getElementById('selected-size-name');
        if (selectedSizeNameEl && size) {
          selectedSizeNameEl.textContent = size.size_name;
        }
        
        // Find matching variant
        if (selectedColorId && selectedSizeId) {
          selectedVariant = getVariant(selectedColorId, selectedSizeId);
        }
        
        updatePriceDisplay();
        updateVariantInfo();
      };
      
      function updateSizeButtons() {
        const sizeContainer = document.getElementById('size-buttons-container');
        if (!sizeContainer || !selectedColorId) return;
        
        const availableSizes = getAvailableSizesForColor(selectedColorId);
        const allSizesForColor = colorSizes.filter(s => s.color_id == selectedColorId);
        
        if (allSizesForColor.length === 0) {
          sizeContainer.innerHTML = '<p style="font-size:12px;color:#9ca3af;padding:8px 0;">No sizes available</p>';
          return;
        }
        
        sizeContainer.innerHTML = allSizesForColor.map(size => {
          const variant = getVariant(selectedColorId, size.id);
          const isAvailable = variant && variant.stock > 0 && variant.is_active;
          
          return `
            <button 
              data-size-id="${size.id}"
              class="size-btn ${!isAvailable ? 'disabled' : ''}"
              onclick="${isAvailable ? `selectSize(${size.id})` : ''}"
              ${!isAvailable ? 'disabled' : ''}
              title="${isAvailable ? (variant ? `Stock: ${variant.stock}` : '') : 'Out of stock'}"
            >
              ${size.size_name}
            </button>
          `;
        }).join('');
        
        // Reset size selection
        selectedSizeId = null;
        selectedVariant = null;
        const selectedSizeNameEl = document.getElementById('selected-size-name');
        if (selectedSizeNameEl) selectedSizeNameEl.textContent = 'Select a size';
      }
      
      function updatePriceDisplay() {
        const priceEl = document.getElementById('variant-price-display');
        if (!priceEl) return;
        
        if (selectedVariant) {
          priceEl.innerHTML = `
            <span style="font-size:28px;font-weight:900;">৳ ${selectedVariant.price}</span>

      window.addToCart = function(productId, buyNow = false) {
        const product = allProducts.find(p => p.id == productId);
        if (!product) return showToast('Product not found', 'error');
        
        let finalPrice = product.price;
        let variantId = null;
        let variantName = null;
        let variantSku = null;
        
        if (productColors.length > 0 && !selectedVariant) {
          if (!selectedColorId) return showToast('Please select a color', 'error');
          if (!selectedSizeId) return showToast('Please select a size', 'error');
          return showToast('Please select a color and size', 'error');
        }
        
        if (selectedVariant) {
          if (selectedVariant.stock <= 0) return showToast('Out of stock', 'error');
          
          const cartCount = cart.filter(i => i.variant_id == selectedVariant.id).length;
          if (cartCount >= selectedVariant.stock) return showToast('Stock limit reached', 'error');
          
          variantId = selectedVariant.id;
          variantName = selectedVariant.name;
          variantSku = selectedVariant.sku;
          finalPrice = selectedVariant.price;
        } else {
          if (cart.filter(i => i.product_id == productId && !i.variant_id).length >= product.stock) {
            return showToast('Stock limit reached', 'error');
          }
        }
        
        cart.push({
          id: Date.now(),
          product_id: product.id,
          variant_id: variantId,
          title: product.title,
          price: finalPrice,
          img: product.img,
          variant: variantName,
          sku: variantSku,
          quantity: 1
        });
        
        saveCart();
        showToast('Added to Bag!');
        if (buyNow) window.location.href = '/checkout';
      };
      
      window.toggleWishlist = function(productId) {
        if (wishlist.includes(productId)) {
          wishlist = wishlist.filter(x => x !== productId);
        } else {
          wishlist.push(productId);
        }
        localStorage.setItem('jayen_wish', JSON.stringify(wishlist));
        showToast('Wishlist Updated', 'info');
        const heartBtn = document.querySelector('[data-wishlist-btn]');
        if (heartBtn) {
          const isWished = wishlist.includes(productId);
          heartBtn.querySelector('i').className = `fa-${isWished ? 'solid' : 'regular'} fa-heart`;
          heartBtn.style.color = isWished ? '#ef4444' : '#9ca3af';
        }
      };
      
      window.zoomImage = function(e) {
        const container = document.getElementById('product-zoom-container');
        const img = document.getElementById('product-zoom-image');
        if (!container || !img) return;
        const rect = container.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - rect.left) / rect.width;
        const y = (clientY - rect.top) / rect.height;
        img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
        img.style.transform = 'scale(2)';
      };
      
      window.resetZoom = function() {
        const img = document.getElementById('product-zoom-image');
        if (img) img.style.transform = 'scale(1)';
      };
      
      window.submitReview = async function(productId) {
        const text = document.getElementById('review-text')?.value?.trim();
        const starsInput = document.querySelector('input[name="product-rating"]:checked');
        if (!text || !starsInput) return showToast('Please complete all fields', 'error');
        const rating = parseInt(starsInput.value);
        try {
          const { error } = await _supabase.from('product_reviews').insert([{
            product_id: productId, user_name: 'Guest User', rating: rating, review_text: text
          }]);
          if (error) throw error;
          showToast('Review submitted!', 'success');
          setTimeout(() => location.reload(), 1500);
        } catch(e) { showToast(e.message || 'Failed', 'error'); }
      };
      
      window.toggleCollapse = function(sectionId, iconId, barcodeText) {
        const collapse = document.getElementById(sectionId);
        const icon = document.getElementById(iconId);
        
        if (!collapse) return;
        
        if (collapse.classList.contains('open')) {
          collapse.classList.remove('open');
          if (icon) icon.className = 'fa-solid fa-chevron-down';
        } else {
          collapse.classList.add('open');
          if (icon) icon.className = 'fa-solid fa-chevron-up';
          
          if (sectionId === 'barcode-collapse' && barcodeText && !barcodeGenerated) {
            setTimeout(() => {
              generateBarcode(barcodeText);
            }, 200);
          }
        }
      };
      
      function generateBarcode(barcodeText) {
        if (!barcodeText || typeof JsBarcode === 'undefined') {
          const container = document.getElementById('barcode-svg-container');
          if (container) {
            container.innerHTML = '<p style="color:#9ca3af;font-size:12px;text-align:center;padding:20px;">Barcode library not loaded. Please refresh the page.</p>';
          }
          return;
        }
        
        const svgElement = document.getElementById('barcode-svg');
        if (!svgElement) {
          console.error('Barcode SVG element not found');
          return;
        }
        
        try {
          JsBarcode("#barcode-svg", barcodeText, {
            format: "CODE128",
            width: 2,
            height: 80,
            displayValue: true,
            fontSize: 14,
            margin: 10,
            background: "#ffffff",
            lineColor: "#1d1d1f"
          });
          barcodeGenerated = true;
        } catch(e) {
          console.error("Barcode generation error:", e);
          const container = document.getElementById('barcode-svg-container');
          if (container) {
            container.innerHTML = '<p style="color:#ef4444;font-size:12px;text-align:center;padding:20px;">Failed to generate barcode</p>';
          }
        }
      }

          </div>
        </div>`;
        
        const related = getRandomProducts(product.id, 4);
        if (related.length) {
          ctlSection.style.display = 'block';
          ctlGrid.innerHTML = related.map(p => productCardHTML(p)).join('');
        } else { 
          ctlSection.style.display = 'none'; 
        }
      }
      
      async function loadProductBySlug(slug) {
        try {
          const { data: products, error: prodErr } = await _supabase.from('products').select('*').eq('status', 'Active');
          if (prodErr) throw prodErr;
          allProducts = products || [];
          const product = allProducts.find(p => (p.slug || generateSlug(p.title)) === slug);
          if (!product) return false;
          
          const [colorsRes, variantsRes, revRes] = await Promise.all([
            _supabase.from('product_colors').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
            _supabase.from('product_variants').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
            _supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at', { ascending: false })
          ]);
          
          productColors = colorsRes.data || [];
          productVariants = variantsRes.data || [];
          allReviews = revRes.data || [];
          
          if (productColors.length > 0) {
            const colorIds = productColors.map(c => c.id);
            const { data: sizesData } = await _supabase.from('color_sizes').select('*').in('color_id', colorIds).order('sort_order', { ascending: true });
            colorSizes = sizesData || [];
          } else {
            colorSizes = [];
          }
          
          try {
            let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
            recent = [product.id.toString(), ...recent.filter(id => id != product.id)].slice(0,8);
            localStorage.setItem('jayen_recent', JSON.stringify(recent));
          } catch(e) {}
          
          renderProductDetails(product);
          return true;
        } catch(e) { 
          console.error(e); 
          return false; 
        }
      }
      
      function hideLoader() {
        if (loader) { 
          loader.style.opacity = '0'; 
          loader.style.transition = 'opacity 0.5s'; 
          setTimeout(() => { loader.style.display = 'none'; }, 600); 
        }
      }
      
      function showNotFound() {
        hideLoader();
        if (loadingDiv) loadingDiv.style.display = 'none';
        if (contentDiv) contentDiv.innerHTML = '';
        if (ctlSection) ctlSection.style.display = 'none';
        if (notFoundDiv) notFoundDiv.style.display = 'block';
      }
      
      async function init() {
        initLocalStorage();
        updateCartCount();
        document.getElementById('display-year').innerText = new Date().getFullYear();
        const slug = getSlugFromURL();
        if (!slug) { showNotFound(); return; }
        if (loadingDiv) loadingDiv.style.display = 'grid';
        if (notFoundDiv) notFoundDiv.style.display = 'none';
        const found = await loadProductBySlug(slug);
        if (!found) showNotFound(); 
        else hideLoader();
      }
      
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
</body>
