<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Product Details | JAYENWARE</title>
  <meta name="description" content="Premium lifestyle product details with barcode & QR sharing">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231d1d1f'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold' font-size='20'%3EJ%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Space Grotesk', 'monospace']
          },
          colors: {
            glass: 'rgba(255, 255, 255, 0.08)',
            borderGlass: 'rgba(255, 255, 255, 0.12)',
            accent: '#007aff'
          }
        }
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #f5f5f7;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .liquid-glass {
      background: rgba(20, 20, 22, 0.65);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      border-radius: 32px;
    }
    .liquid-blob {
      background: radial-gradient(circle at 30% 20%, rgba(0,122,255,0.25), transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1), transparent 50%);
      filter: blur(60px);
      position: fixed;
      top: -20%;
      left: -10%;
      width: 70vw;
      height: 70vh;
      z-index: -1;
      opacity: 0.7;
      pointer-events: none;
    }
    .liquid-blob-right {
      background: radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 55%);
      top: auto;
      bottom: -20%;
      left: auto;
      right: -15%;
      width: 60vw;
      height: 60vh;
    }
    .barcode-scanner-container {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background: #000;
    }
    #scanner-video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 24px;
    }
    .qr-modal {
      background: white;
      padding: 24px;
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .variant-pill {
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ccc;
    }
    .variant-pill.selected {
      background: white;
      border-color: white;
      color: #0a0a0a;
      font-weight: 700;
      box-shadow: 0 10px 20px -8px rgba(255,255,255,0.3);
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .info-chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 12px 16px;
      backdrop-filter: blur(8px);
    }
    @keyframes liquidPulse {
      0% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.05); }
      100% { opacity: 0.6; transform: scale(1); }
    }
    .pulse-blob {
      animation: liquidPulse 8s infinite ease-in-out;
    }
  </style>
</head>
<body class="antialiased relative">
  <div class="liquid-blob pulse-blob"></div>
  <div class="liquid-blob liquid-blob-right pulse-blob" style="animation-delay: 4s;"></div>

  <div id="global-loader" style="position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s;">
    <div class="text-center">
      <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:white;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px;"></div>
      <p class="text-xs font-semibold tracking-[0.3em] uppercase text-white/50">JAYENWARE</p>
    </div>
  </div>

  <div id="toast" style="position:fixed;top:20px;right:20px;z-index:200;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-width:calc(100vw - 32px);">
    <div class="liquid-glass rounded-2xl p-4 flex items-center gap-3 min-w-[260px]">
      <span id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0"></span>
      <p id="toast-text" class="text-xs font-semibold flex-grow"></p>
      <button onclick="hideToast()" class="text-white/40 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

  <nav class="sticky top-0 z-40 px-4 py-3 flex justify-between items-center max-w-6xl mx-auto w-full" style="background:rgba(10,10,10,0.7);backdrop-filter:blur(30px);">
    <a href="/" class="flex items-center gap-2 text-white no-underline">
      <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center text-black font-black text-lg">J</div>
      <span class="font-mono font-bold tracking-tight text-lg">JAYENWARE</span>
    </a>
    <div class="flex gap-4 items-center text-xs font-semibold uppercase tracking-widest text-white/70">
      <a href="/products" class="hover:text-white transition">Shop</a>
      <a href="/cart" class="relative p-2 text-white"><i class="fa-solid fa-bag-shopping text-base"></i><span id="cart-count" class="absolute -top-1 -right-1 bg-blue-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></a>
    </div>
  </nav>

  <main class="flex-grow px-4 pt-6 pb-20 max-w-6xl mx-auto w-full">
    <a href="/products" class="inline-flex items-center gap-2 text-xs font-semibold text-white/50 hover:text-white/80 mb-8 transition"><i class="fa-solid fa-arrow-left"></i> Back to Collection</a>

    <div id="product-not-found" class="hidden text-center py-32">
      <i class="fa-solid fa-cube text-6xl text-white/10 mb-6"></i>
      <h2 class="text-2xl font-bold text-white mb-3">Product Not Found</h2>
      <p class="text-white/50 mb-8">This item may have been moved or discontinued.</p>
      <a href="/products" class="inline-block px-8 py-3 bg-white text-black rounded-full font-bold text-xs uppercase tracking-wider">Browse Collection</a>
    </div>

    <div id="product-loading" class="grid grid-cols-1 md:grid-cols-2 gap-10">
      <div class="skeleton rounded-[40px] aspect-[3/4]"></div>
      <div class="space-y-4">
        <div class="skeleton h-4 w-20 rounded-full"></div>
        <div class="skeleton h-8 w-full rounded-2xl"></div>
        <div class="skeleton h-10 w-32 rounded-2xl"></div>
        <div class="skeleton h-5 w-48 rounded-full"></div>
        <div class="flex gap-3"><div class="skeleton h-10 w-24 rounded-full"></div><div class="skeleton h-10 w-24 rounded-full"></div></div>
        <div class="grid grid-cols-2 gap-3"><div class="skeleton h-12 rounded-2xl"></div><div class="skeleton h-12 rounded-2xl"></div></div>
      </div>
    </div>

    <div id="product-detail-content"></div>
    <div id="complete-the-look-section" class="hidden mt-20 border-t border-white/10 pt-12">
      <h2 class="text-2xl font-bold text-white mb-8">Complete the Look</h2>
      <div id="complete-the-look-grid" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
    </div>
  </main>

  <footer class="border-t border-white/5 py-8 text-center text-[10px] text-white/30">
    <p>Powered by <a href="#" class="text-blue-400 font-semibold">BINZEO</a> · &copy; <span id="display-year"></span> JAYENWARE</p>
  </footer>

  <div id="qr-modal-overlay" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4" onclick="closeQRModal(event)">
    <div class="qr-modal max-w-xs w-full" onclick="event.stopPropagation()">
      <h3 class="text-black font-bold text-lg mb-4">Scan & Share</h3>
      <div id="qr-code-container" class="bg-white p-2 rounded-2xl mb-4"></div>
      <p class="text-gray-500 text-xs mb-4 break-all" id="qr-product-url"></p>
      <button onclick="shareProduct()" class="w-full py-3 bg-black text-white rounded-full font-bold text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-share-nodes"></i> Share Product</button>
      <button onclick="closeQRModalDirect()" class="mt-3 text-xs text-gray-500 underline">Close</button>
    </div>
  </div>

  <div id="scanner-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md hidden flex flex-col items-center justify-center p-4" onclick="closeScanner(event)">
    <div class="w-full max-w-sm barcode-scanner-container" onclick="event.stopPropagation()">
      <video id="scanner-video" autoplay playsinline></video>
      <div class="absolute inset-0 border-2 border-white/40 rounded-3xl pointer-events-none"></div>
    </div>
    <p class="text-white/70 text-xs mt-4">Point camera at a barcode</p>
    <button onclick="stopScanner()" class="mt-4 px-6 py-2 bg-white text-black rounded-full font-bold text-xs">Cancel</button>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://your-project.supabase.co';
      const SUPABASE_KEY = 'your-anon-key';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      let allProducts = [], allVariants = [], allReviews = [], currentProduct = null;
      let cart = [], wishlist = [], selectedVariant = null;
      let scannerStream = null;

      function initStorage() {
        try { cart = JSON.parse(localStorage.getItem('jayen_cart')||'[]'); wishlist = JSON.parse(localStorage.getItem('jayen_wish')||'[]'); } catch(e) { cart=[]; wishlist=[]; }
      }
      function updateCartCount() { const el = document.getElementById('cart-count'); if(el) el.innerText = cart.length; }
      function saveCart() { localStorage.setItem('jayen_cart', JSON.stringify(cart)); updateCartCount(); }

      function showToast(text, type='success') {
        const toast = document.getElementById('toast'), icon = document.getElementById('toast-icon');
        document.getElementById('toast-text').innerText = text;
        if(type==='success') { icon.style.background='#ecfdf5'; icon.style.color='#059669'; icon.innerHTML='<i class="fa-solid fa-check"></i>'; }
        else if(type==='error') { icon.style.background='#fef2f2'; icon.style.color='#dc2626'; icon.innerHTML='<i class="fa-solid fa-exclamation"></i>'; }
        else { icon.style.background='#eff6ff'; icon.style.color='#2563eb'; icon.innerHTML='<i class="fa-solid fa-info"></i>'; }
        toast.style.transform='translateX(0)'; clearTimeout(toast._timeout); toast._timeout=setTimeout(()=>{toast.style.transform='translateX(120%)'},3000);
      }
      window.hideToast = ()=> document.getElementById('toast').style.transform='translateX(120%)';

      function getSlugFromURL() {
        let slug = window.location.pathname.replace(/^\/product\//,'').replace(/\/$/,'').split('?')[0].split('#')[0];
        return slug || null;
      }

      function generateSlug(title) {
        return title ? title.toLowerCase().replace(/[^\w\s\u0980-\u09FF-]/g,'').replace(/[\s_]+/g,'-').replace(/^-+|-+$/g,'').substring(0,80) : '';
      }

      async function loadProductData(slug) {
        try {
          const { data: products } = await supabase.from('products').select('*').eq('status','Active');
          allProducts = products || [];
          const product = allProducts.find(p => (p.slug || generateSlug(p.title)) === slug);
          if(!product) return false;
          
          const [{data:variants},{data:reviews}] = await Promise.all([
            supabase.from('product_variants').select('*').eq('product_id', product.id),
            supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at',{ascending:false})
          ]);
          allVariants = variants || []; allReviews = reviews || [];
          currentProduct = product;
          return true;
        } catch(e) { console.error(e); return false; }
      }

      function selectVariant(btn, id, name, price) {
        document.querySelectorAll('.variant-pill').forEach(b=>{b.classList.remove('selected');});
        btn.classList.add('selected');
        selectedVariant = {id, name, price};
        const priceEl = document.getElementById('display-price');
        if(priceEl) priceEl.innerText = `৳ ${price}`;
      }

      function addToCart(buyNow=false) {
        if(!currentProduct) return;
        const hasVariants = allVariants.some(v=>v.product_id===currentProduct.id);
        if(hasVariants && !selectedVariant) return showToast('Please select a variant','error');
        let finalPrice = hasVariants ? selectedVariant.price : currentProduct.price;
        cart.push({id:Date.now(),product_id:currentProduct.id,variant_id:hasVariants?selectedVariant.id:null,title:currentProduct.title,price:finalPrice,img:currentProduct.img,variant:hasVariants?selectedVariant.name:null,quantity:1});
        saveCart(); showToast('Added to Bag');
        if(buyNow) window.location.href='/checkout';
      }

      function openQRModal() {
        if(!currentProduct) return;
        const url = `${window.location.origin}/product/${currentProduct.slug || generateSlug(currentProduct.title)}`;
        document.getElementById('qr-product-url').innerText = url;
        document.getElementById('qr-modal-overlay').classList.remove('hidden');
        const container = document.getElementById('qr-code-container');
        container.innerHTML = '';
        new QRCode(container, {text:url,width:180,height:180,colorDark:'#000',colorLight:'#fff'});
      }
      window.closeQRModalDirect = ()=> document.getElementById('qr-modal-overlay').classList.add('hidden');
      window.closeQRModal = (e)=> { if(e.target===document.getElementById('qr-modal-overlay')) closeQRModalDirect(); };
      
      async function shareProduct() {
        const url = document.getElementById('qr-product-url').innerText;
        if(navigator.share) { try{await navigator.share({title:currentProduct.title,url});}catch(e){} }
        else { await navigator.clipboard.writeText(url); showToast('Link copied!','info'); }
      }

      async function startScanner() {
        document.getElementById('scanner-modal').classList.remove('hidden');
        try {
          scannerStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const video = document.getElementById('scanner-video');
          video.srcObject = scannerStream;
          video.play();
          scanLoop();
        } catch(e) { showToast('Camera access denied','error'); stopScanner(); }
      }

      function scanLoop() {
        const video = document.getElementById('scanner-video');
        if(!video || video.readyState !== video.HAVE_ENOUGH_DATA) { requestAnimationFrame(scanLoop); return; }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d'); ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);
        if(code) {
          stopScanner();
          const barcode = code.data;
          const found = allProducts.find(p=>p.barcode===barcode);
          if(found) window.location.href=`/product/${found.slug||generateSlug(found.title)}`;
          else showToast(`Barcode ${barcode} not found`,'error');
          return;
        }
        if(document.getElementById('scanner-modal').classList.contains('hidden')) return;
        requestAnimationFrame(scanLoop);
      }

      window.stopScanner = ()=> {
        if(scannerStream) { scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
        document.getElementById('scanner-modal').classList.add('hidden');
      };
      window.closeScanner = (e)=> { if(e.target===document.getElementById('scanner-modal')) stopScanner(); };

      function renderProduct(product) {
        document.getElementById('product-loading').style.display='none';
        document.getElementById('product-not-found').classList.add('hidden');
        const content = document.getElementById('product-detail-content');
        content.style.display='block';
        
        const variants = allVariants.filter(v=>v.product_id===product.id);
        if(variants.length) selectedVariant = {id:variants[0].id, name:variants[0].name, price:variants[0].price};
        else selectedVariant = null;
        
        const images = product.images ? product.images.split(',').filter(Boolean) : [];
        if(!images.length && product.img) images.push(product.img);
        const isOut = product.stock <= 0;
        const reviews = allReviews.filter(r=>r.product_id===product.id);
        
        content.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-16">
            <div>
              <div class="liquid-glass overflow-hidden aspect-[3/4] max-h-[75vh] relative" id="zoom-container" onmousemove="zoomImage(event)" onmouseleave="resetZoom()" ontouchmove="zoomImage(event)" ontouchend="resetZoom()">
                <img id="main-image" src="${images[0] || '/logo.png'}" alt="${product.title}" class="w-full h-full object-cover transition-transform duration-150" style="will-change:transform;">
                ${isOut ? '<div class="absolute inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center"><span class="bg-white text-black px-6 py-2 rounded-full font-black text-xs uppercase">Sold Out</span></div>' : ''}
              </div>
              ${images.length>1 ? `<div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar">${images.map((img,i)=>`<img src="${img}" onclick="document.getElementById('main-image').src='${img}';resetZoom()" class="w-14 h-14 object-cover rounded-xl border-2 ${i===0?'border-white':'border-white/20'} cursor-pointer flex-shrink-0">`).join('')}</div>`:''}
            </div>
            <div class="flex flex-col">
              <span class="text-xs font-bold uppercase tracking-[0.2em] text-blue-400">${product.category || 'Essentials'}</span>
              <h1 class="text-3xl md:text-4xl font-bold text-white mt-2 mb-4">${product.title}</h1>
              <div class="flex items-baseline gap-3 mb-4">
                <span id="display-price" class="text-3xl font-black">৳ ${variants.length ? selectedVariant.price : product.price}</span>
                ${product.old_price?`<span class="text-white/40 line-through text-lg">৳ ${product.old_price}</span>`:''}
              </div>
              <div class="flex items-center gap-3 mb-6">
                <span class="w-3 h-3 rounded-full ${isOut?'bg-red-500':'bg-green-400'}"></span>
                <span class="text-sm font-semibold ${isOut?'text-red-400':'text-green-300'}">${isOut?'Out of Stock':`In Stock: ${product.stock}`}</span>
              </div>
              ${variants.length ? `
              <div class="mb-6">
                <p class="text-[10px] font-bold uppercase text-white/40 mb-3">Select Variant</p>
                <div class="flex flex-wrap gap-2">${variants.map((v,i)=>`<button onclick="selectVariant(this,'${v.id}','${v.name.replace(/'/g,"\\'")}',${v.price})" class="variant-pill px-5 py-3 rounded-full text-sm font-semibold ${i===0?'selected':''}">${v.name} · ৳${v.price}</button>`).join('')}</div>
              </div>`:''}
              <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="addToCart(false)" ${isOut?'disabled':''} class="py-4 bg-white text-black rounded-2xl font-bold text-sm uppercase tracking-wider disabled:opacity-30">Add to Bag</button>
                <button onclick="addToCart(true)" ${isOut?'disabled':''} class="py-4 border border-white/20 text-white rounded-2xl font-bold text-sm uppercase">Buy Now</button>
              </div>
              <div class="flex gap-3 mb-8">
                <button onclick="openQRModal()" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full text-xs font-bold"><i class="fa-solid fa-qrcode"></i> QR</button>
                <button onclick="startScanner()" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full text-xs font-bold"><i class="fa-solid fa-barcode"></i> Scan</button>
                <button onclick="shareProduct()" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full text-xs font-bold"><i class="fa-solid fa-share-nodes"></i> Share</button>
              </div>
              <div class="liquid-glass p-5 mb-6">
                <h3 class="text-xs font-bold uppercase tracking-widest text-white/50 mb-3">Description</h3>
                <p class="text-sm text-white/80 leading-relaxed">${product.description || 'No description available.'}</p>
              </div>
              <div class="liquid-glass p-5">
                <h3 class="text-xs font-bold uppercase tracking-widest text-white/50 mb-4">Details</h3>
                <div class="info-grid">
                  ${product.fabric_type?`<div class="info-chip"><span class="text-[10px] text-white/40">Fabric</span><p class="font-semibold text-sm">${product.fabric_type}</p></div>`:''}
                  ${product.gsm_type?`<div class="info-chip"><span class="text-[10px] text-white/40">GSM</span><p class="font-semibold text-sm">${product.gsm_type}</p></div>`:''}
                  ${product.fit_type?`<div class="info-chip"><span class="text-[10px] text-white/40">Fit</span><p class="font-semibold text-sm">${product.fit_type}</p></div>`:''}
                  ${product.gender?`<div class="info-chip"><span class="text-[10px] text-white/40">Gender</span><p class="font-semibold text-sm">${product.gender}</p></div>`:''}
                  ${product.print_type?`<div class="info-chip"><span class="text-[10px] text-white/40">Print</span><p class="font-semibold text-sm">${product.print_type}</p></div>`:''}
                  ${product.sku?`<div class="info-chip col-span-2"><span class="text-[10px] text-white/40">SKU</span><p class="font-mono font-bold text-sm break-all">${product.sku}</p></div>`:''}
                  ${product.barcode?`<div class="info-chip col-span-2"><span class="text-[10px] text-white/40">Barcode</span><p class="font-mono font-bold text-sm">${product.barcode}</p></div>`:''}
                </div>
              </div>
            </div>
          </div>
          <div class="border-t border-white/10 pt-10">
            <h2 class="text-2xl font-bold text-white mb-6">Reviews (${reviews.length})</h2>
            ${reviews.map(r=>`<div class="liquid-glass p-4 mb-3"><div class="flex justify-between"><span class="text-yellow-400">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span><span class="text-xs text-white/40">${new Date(r.created_at).toLocaleDateString()}</span></div><p class="text-sm mt-2 text-white/80">${r.review_text}</p></div>`).join('') || '<p class="text-white/50 italic">No reviews yet.</p>'}
          </div>`;
          
        const related = allProducts.filter(p=>p.id!==product.id).sort(()=>0.5-Math.random()).slice(0,4);
        if(related.length) {
          document.getElementById('complete-the-look-section').classList.remove('hidden');
          document.getElementById('complete-the-look-grid').innerHTML = related.map(p=>`
            <a href="/product/${p.slug||generateSlug(p.title)}" class="liquid-glass overflow-hidden block no-underline">
              <img src="${p.img}" class="w-full aspect-square object-cover" onerror="this.src='/logo.png'">
              <div class="p-3"><p class="text-xs font-bold text-white/70">${p.category}</p><h4 class="font-semibold text-white">${p.title}</h4><p class="font-bold">৳${p.price}</p></div>
            </a>`).join('');
        }
      }

      window.zoomImage = (e) => {
        const img = document.getElementById('main-image');
        if(!img) return;
        const rect = img.parentElement.getBoundingClientRect();
        const x = ((e.touches?e.touches[0].clientX:e.clientX)-rect.left)/rect.width;
        const y = ((e.touches?e.touches[0].clientY:e.clientY)-rect.top)/rect.height;
        img.style.transformOrigin = `${x*100}% ${y*100}%`;
        img.style.transform = 'scale(2.2)';
      };
      window.resetZoom = ()=> { const img=document.getElementById('main-image'); if(img) img.style.transform='scale(1)'; };

      async function init() {
        initStorage(); updateCartCount();
        document.getElementById('display-year').innerText = new Date().getFullYear();
        const slug = getSlugFromURL();
        if(!slug) { document.getElementById('product-not-found').classList.remove('hidden'); document.getElementById('global-loader').style.display='none'; return; }
        const found = await loadProductData(slug);
        if(!found) { document.getElementById('product-not-found').classList.remove('hidden'); document.getElementById('product-loading').style.display='none'; }
        else renderProduct(currentProduct);
        document.getElementById('global-loader').style.opacity='0';
        setTimeout(()=>{ document.getElementById('global-loader').style.display='none'; },600);
      }

      window.addToCart = addToCart;
      window.selectVariant = selectVariant;
      window.openQRModal = openQRModal;
      window.shareProduct = shareProduct;
      window.startScanner = startScanner;
      window.stopScanner = stopScanner;
      
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
      else init();
    })();
  </script>
  <style>
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size:200% 100%; animation:shimmer 1.8s infinite; border-radius:24px; }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    .no-scrollbar::-webkit-scrollbar{display:none;} .no-scrollbar{scrollbar-width:none;}
    @keyframes spin { to{transform:rotate(360deg);} }
  </style>
</body>
</html>
