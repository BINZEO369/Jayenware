<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Product Details | JAYENWARE</title>
  <meta name="description" content="Discover detailed product specifications, fabric, fit, and more at JAYENWARE.">
  <meta name="theme-color" content="#1d1d1f">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="canonical" id="canonical-url" href="https://jayenwaretest369.vercel.app/product/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    img { max-width: 100%; height: auto; display: block; }
    .glass-nav {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
    }
    
    /* Color Selection Styles */
    .color-btn {
      transition: all 0.2s ease;
      position: relative;
      border: 2px solid transparent;
    }
    .color-btn:hover {
      transform: scale(1.05);
    }
    .color-btn.selected {
      border-color: #1d1d1f !important;
      box-shadow: 0 0 0 2px white, 0 0 0 4px #1d1d1f;
    }
    .color-btn .color-swatch {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }
    .color-btn.out-of-stock {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .color-btn.out-of-stock::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 1px;
      background: #ef4444;
      transform: rotate(-45deg);
    }
    
    /* Size Selection Styles */
    .size-btn {
      transition: all 0.2s ease;
      min-width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e5e5e5;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      background: white;
      color: #1d1d1f;
    }
    .size-btn:hover {
      border-color: #1d1d1f;
      background: #f9f9f9;
    }
    .size-btn.selected {
      border-color: #1d1d1f !important;
      background: #1d1d1f !important;
      color: white !important;
    }
    .size-btn.out-of-stock {
      opacity: 0.4;
      cursor: not-allowed;
      text-decoration: line-through;
      color: #9ca3af;
    }
    
    .variant-btn {
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .variant-btn.selected {
      border-color: #1d1d1f !important;
      background: #1d1d1f !important;
      color: white !important;
    }
    #product-zoom-container {
      cursor: crosshair;
      overflow: hidden;
      position: relative;
      background: #f5f5f7;
    }
    #product-zoom-image {
      transition: transform 0.1s ease-out;
      will-change: transform;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .star-rating {
      direction: rtl;
      display: inline-flex;
    }
    .star-rating input[type="radio"] { display: none; }
    .star-rating label {
      color: #d2d2d7;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: #ff9500; }
    #toast {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: calc(100vw - 32px);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .product-card {
      transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .product-card:hover { transform: translateY(-3px); }
    .product-card .product-image {
      transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .product-card:hover .product-image { transform: scale(1.03); }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .detail-badge {
      background: #f5f5f7;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-badge i {
      font-size: 18px;
      color: #1d1d1f;
      width: 24px;
      text-align: center;
    }
    .toggle-btn {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      text-align: left;
    }
    .toggle-btn:hover {
      background: #f9f9f9;
      border-color: #d1d1d1;
    }
    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
      margin-bottom: 16px;
    }
    .barcode-wrapper {
      background: white;
      padding: 24px 16px 16px;
      border-radius: 20px;
      border: 1px solid #f0f0f0;
      margin-top: 4px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      overflow: hidden;
    }
    .barcode-wrapper svg {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .collapse-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
    }
    .collapse-section.open {
      max-height: 2000px;
    }
    .description-content {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 16px;
      margin-top: 4px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.7;
    }
    
    /* Color Image Carousel */
    .color-image-item {
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .color-image-item.active {
      border-color: #007aff;
      box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
    }
    
    .selected-color-info {
      background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>

  <div id="toast">
    <div style="background:white;box-shadow:0 20px 60px rgba(0,0,0,0.15);border-radius:16px;padding:12px;display:flex;align-items:center;gap:12px;min-width:280px;border:1px solid #f0f0f0;">
      <span id="toast-icon" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;"></span>

  <nav class="glass-nav">
    <div style="max-width:1280px;margin:0 auto;padding:0 16px;height:56px;display:flex;justify-content:space-between;align-items:center;">
      <a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#1d1d1f;" aria-label="JAYENWARE Home">
        <img src="/logo.png" style="width:32px;height:32px;border-radius:8px;" alt="JAYENWARE Logo" width="40" height="40">

        <a href="/cart" style="position:relative;padding:6px;text-decoration:none;color:#1d1d1f;" aria-label="Cart">
          <i class="fa-solid fa-bag-shopping" style="font-size:18px;"></i>
          <span id="cart-count" style="position:absolute;top:-2px;right:-2px;background:#1d1d1f;color:white;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;">0</span>

  <main style="padding-top:72px;flex-grow:1;">

      </div>
      <div id="product-loading" style="display:grid;grid-template-columns:1fr;gap:32px;">
        <div>
          <div class="skeleton" style="border-radius:24px;aspect-ratio:3/4;"></div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <div class="skeleton" style="width:56px;height:56px;border-radius:12px;"></div>
            <div class="skeleton" style="width:56px;height:56px;border-radius:12px;"></div>
            <div class="skeleton" style="width:56px;height:56px;border-radius:12px;"></div>
          </div>
        </div>
        <div>
          <div class="skeleton" style="height:16px;width:80px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:32px;width:100%;margin-bottom:16px;"></div>
          <div class="skeleton" style="height:40px;width:128px;margin-bottom:16px;"></div>
          <div class="skeleton" style="height:16px;width:192px;margin-bottom:16px;"></div>
          <div style="display:flex;gap:8px;margin-bottom:24px;">
            <div class="skeleton" style="height:40px;width:96px;border-radius:16px;"></div>
            <div class="skeleton" style="height:40px;width:96px;border-radius:16px;"></div>
          </div>

      <div id="product-detail-content"></div>
      <div id="complete-the-look-section" style="display:none;margin-top:48px;border-top:1px solid #e5e5e5;padding-top:40px;">

  <footer style="background:#1d1d1f;color:#9ca3af;padding:32px 0 16px;margin-top:auto;">
    <div style="max-width:1280px;margin:0 auto;padding:0 16px;text-align:center;">
      <p style="font-size:10px;">Powered by <a href="https://binzeo.vercel.app" target="_blank" rel="noopener noreferrer" style="color:#007aff;font-weight:700;text-decoration:none;">BINZEO</a></p>
      <p style="font-size:8px;margin-top:8px;">&copy; <span id="display-year"></span> JAYENWARE. All rights reserved.</p>
    </div>
  </footer>

  <script>
    (function() {
      if (typeof JsBarcode === 'undefined') {
        console.error('JsBarcode library failed to load. Barcode generation will not work.');
      }
      
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let currentProduct = null;
      let allProducts = [];
      let allVariants = [];
      let allColors = [];
      let allSizes = [];
      let allReviews = [];
      let selectedVariantObj = null;
      let selectedColorId = null;
      let cart = [];
      let wishlist = [];
      let barcodeGenerated = false;
      
      const loader = document.getElementById('global-loader');
      const notFoundDiv = document.getElementById('product-not-found');
      const loadingDiv = document.getElementById('product-loading');
      const contentDiv = document.getElementById('product-detail-content');
      const ctlSection = document.getElementById('complete-the-look-section');
      const ctlGrid = document.getElementById('complete-the-look-grid');
      const canonicalLink = document.getElementById('canonical-url');
      
      function getSlugFromURL() {
        const path = window.location.pathname;
        let slug = path.replace(/^\/product\//, '').replace(/\/$/, '');
        slug = slug.split('?')[0].split('#')[0];
        return slug || null;
      }
      
      function generateSlug(title) {
        if (!title) return '';
        return title.toLowerCase().replace(/[^\w\s\u0980-\u09FF-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '').substring(0, 80);
      }
      
      function initLocalStorage() {
        try {
          cart = JSON.parse(localStorage.getItem('jayen_cart') || '[]');
          wishlist = JSON.parse(localStorage.getItem('jayen_wish') || '[]');
        } catch(e) { cart = []; wishlist = []; }
      }
      
      function showToast(text, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        document.getElementById('toast-text').innerText = text;
        const icon = document.getElementById('toast-icon');
        if (type === 'success') {
          icon.style.background = '#ecfdf5'; icon.style.color = '#059669';
          icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else if (type === 'error') {
          icon.style.background = '#fef2f2'; icon.style.color = '#dc2626';
          icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
        } else {
          icon.style.background = '#eff6ff'; icon.style.color = '#2563eb';
          icon.innerHTML = '<i class="fa-solid fa-info"></i>';
        }
        toast.style.transform = 'translateX(0)';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.transform = 'translateX(120%)'; }, 3000);
      }
      
      window.hideToast = function() {
        const toast = document.getElementById('toast');
        if (toast) toast.style.transform = 'translateX(120%)';
      };
      
      function updateCartCount() {
        const countEl = document.getElementById('cart-count');
        if (countEl) countEl.innerText = cart.length;
      }
      
      function saveCart() { localStorage.setItem('jayen_cart', JSON.stringify(cart)); updateCartCount(); }
      
      // Get available sizes for selected color
      function getSizesForColor(colorId) {
        if (!colorId) return [];
        const variantSizes = allVariants
          .filter(v => v.color_id == colorId && v.is_active && v.stock > 0)
          .map(v => v.size_id);
        return allSizes.filter(s => variantSizes.includes(s.id));
      }
      
      // Get available colors with stock info
      function getColorsWithStock() {
        return allColors.map(color => {
          const colorVariants = allVariants.filter(v => v.color_id == color.id && v.is_active);
          const totalStock = colorVariants.reduce((sum, v) => sum + (v.stock || 0), 0);
          return { ...color, totalStock };
        });
      }
      
      // Get variant for specific color and size combination
      function getVariantForColorSize(colorId, sizeId) {
        return allVariants.find(v => v.color_id == colorId && v.size_id == sizeId && v.is_active);
      }
      
      // Select color and update UI
      window.selectColor = function(colorId, colorName, colorCode, colorImage) {
        selectedColorId = colorId;
        
        // Update color buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
          btn.classList.remove('selected');
          btn.style.borderColor = '#e5e5e5';
        });
        const selectedBtn = document.querySelector(`.color-btn[data-color-id="${colorId}"]`);
        if (selectedBtn) {
          selectedBtn.classList.add('selected');
        }
        
        // Update selected color info display
        const colorInfoDiv = document.getElementById('selected-color-info');
        if (colorInfoDiv) {
          colorInfoDiv.innerHTML = `
            <div style="width:40px;height:40px;border-radius:50%;background:${colorCode || '#ccc'};flex-shrink:0;border:2px solid #e5e5e5;overflow:hidden;">
              ${colorImage ? `<img src="${colorImage}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.style.display='none'">` : ''}
            </div>
            <div>
              <p style="font-size:10px;color:#86868b;text-transform:uppercase;font-weight:700;">Selected Color</p>
              <p style="font-size:14px;font-weight:700;color:#1d1d1f;">${colorName}</p>
            </div>
          `;
        }
        
        // Update color images
        if (colorImage) {
          const mainImg = document.getElementById('product-zoom-image');
          if (mainImg) {
            mainImg.src = colorImage;
            resetZoom();
          }
          
          // Update thumbnail active state
          document.querySelectorAll('.color-image-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.colorId == colorId) {
              item.classList.add('active');
            }
          });
        }
        
        // Update size buttons availability
        updateSizeButtons(colorId);
        
        // Reset size selection
        selectedVariantObj = null;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        
        // Update price display
        updatePriceForColor(colorId);
        
        // Update variant details section
        updateVariantDetails(colorId);
      };
      
      // Select size and update variant
      window.selectSize = function(sizeId, sizeName) {
        if (!selectedColorId) {
          showToast('Please select a color first', 'error');
          return;
        }
        
        const variant = getVariantForColorSize(selectedColorId, sizeId);
        if (!variant || variant.stock <= 0) {
          showToast('This combination is out of stock', 'error');
          return;
        }
        
        // Update size buttons
        document.querySelectorAll('.size-btn').forEach(btn => {
          btn.classList.remove('selected');
        });
        const selectedBtn = document.querySelector(`.size-btn[data-size-id="${sizeId}"]`);
        if (selectedBtn) {
          selectedBtn.classList.add('selected');
        }
        
        selectedVariantObj = {
          id: variant.id,
          name: variant.name,
          price: variant.price,
          old_price: variant.old_price,
          stock: variant.stock,
          sku: variant.sku,
          barcode: variant.barcode,
          color_id: variant.color_id,
          size_id: variant.size_id
        };
        
        // Update price display
        updatePriceDisplay(variant);
        
        // Update stock status
        updateStockStatus(variant);
        
        // Update barcode if section is open
        if (variant.barcode && document.getElementById('barcode-collapse')?.classList.contains('open')) {
          barcodeGenerated = false;
          generateBarcode(variant.barcode);
        }
      };
      
      function updateSizeButtons(colorId) {
        const availableSizes = getSizesForColor(colorId);
        const availableSizeIds = availableSizes.map(s => s.id);
        
        document.querySelectorAll('.size-btn').forEach(btn => {
          const sizeId = parseInt(btn.dataset.sizeId);
          if (availableSizeIds.includes(sizeId)) {
            btn.classList.remove('out-of-stock');
            btn.style.cursor = 'pointer';
            btn.style.pointerEvents = 'auto';
          } else {

      window.addToCart = function(productId, buyNow = false) {
        const product = allProducts.find(p => p.id == productId);
        if (!product) return showToast('Product not found', 'error');
        
        if (allColors.length > 0 && allSizes.length > 0) {
          if (!selectedVariantObj) return showToast('Please select color and size', 'error');
          if (selectedVariantObj.stock <= 0) return showToast('Out of stock', 'error');
          
          const existingCount = cart.filter(i => i.variant_id == selectedVariantObj.id).length;
          if (existingCount >= selectedVariantObj.stock) return showToast('Stock limit reached', 'error');
          
          cart.push({
            id: Date.now(),
            product_id: product.id,
            variant_id: selectedVariantObj.id,
            title: product.title,
            price: selectedVariantObj.price,
            img: allColors.find(c => c.id == selectedVariantObj.color_id)?.color_image || product.img,
            variant: selectedVariantObj.name,
            quantity: 1
          });
        } else {
          // Fallback for products without color/size system
          if (cart.filter(i => i.product_id == productId).length >= product.stock) return showToast('Stock limit reached', 'error');
          cart.push({
            id: Date.now(),
            product_id: product.id,
            variant_id: null,
            title: product.title,
            price: product.price,
            img: product.img,
            variant: null,
            quantity: 1
          });
        }
        
        saveCart();
        showToast('Added to Bag!');
        if (buyNow) window.location.href = '/checkout';
      };
      
      window.toggleWishlist = function(productId) {
        if (wishlist.includes(productId)) {
          wishlist = wishlist.filter(x => x !== productId);
        } else {
          wishlist.push(productId);
        }
        localStorage.setItem('jayen_wish', JSON.stringify(wishlist));
        showToast('Wishlist Updated', 'info');
        const heartBtn = document.querySelector('[data-wishlist-btn]');
        if (heartBtn) {
          const isWished = wishlist.includes(productId);
          heartBtn.querySelector('i').className = `fa-${isWished ? 'solid' : 'regular'} fa-heart`;
          heartBtn.style.color = isWished ? '#ef4444' : '#9ca3af';
        }
      };
      
      window.zoomImage = function(e) {
        const container = document.getElementById('product-zoom-container');
        const img = document.getElementById('product-zoom-image');
        if (!container || !img) return;
        const rect = container.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = (clientX - rect.left) / rect.width;
        const y = (clientY - rect.top) / rect.height;
        img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
        img.style.transform = 'scale(2)';
      };
      
      window.resetZoom = function() {
        const img = document.getElementById('product-zoom-image');
        if (img) img.style.transform = 'scale(1)';
      };
      
      window.submitReview = async function(productId) {
        const text = document.getElementById('review-text')?.value?.trim();
        const starsInput = document.querySelector('input[name="product-rating"]:checked');
        if (!text || !starsInput) return showToast('Please complete all fields', 'error');
        const rating = parseInt(starsInput.value);
        try {
          const { error } = await _supabase.from('product_reviews').insert([{
            product_id: productId, user_name: 'Guest User', rating: rating, review_text: text
          }]);
          if (error) throw error;
          showToast('Review submitted!', 'success');
          setTimeout(() => location.reload(), 1500);
        } catch(e) { showToast(e.message || 'Failed', 'error'); }
      };
      
      window.toggleCollapse = function(sectionId, iconId, barcodeText) {
        const collapse = document.getElementById(sectionId);
        const icon = document.getElementById(iconId);
        
        if (!collapse) return;
        
        if (collapse.classList.contains('open')) {
          collapse.classList.remove('open');
          if (icon) icon.className = 'fa-solid fa-chevron-down';
        } else {
          collapse.classList.add('open');
          if (icon) icon.className = 'fa-solid fa-chevron-up';
          
          if (sectionId === 'barcode-collapse' && barcodeText && !barcodeGenerated) {
            setTimeout(() => {
              generateBarcode(barcodeText);
            }, 200);
          }
        }
      };
      
      function generateBarcode(barcodeText) {
        if (!barcodeText || typeof JsBarcode === 'undefined') {
          const container = document.getElementById('barcode-svg-container');
          if (container) {
            container.innerHTML = '<p style="color:#9ca3af;font-size:12px;text-align:center;padding:20px;">Barcode library not loaded. Please refresh the page.</p>';
          }
          return;
        }
        
        const svgElement = document.getElementById('barcode-svg');
        if (!svgElement) {
          console.error('Barcode SVG element not found');
          return;
        }
        
        try {
          JsBarcode("#barcode-svg", barcodeText, {
            format: "CODE128",
            width: 2,
            height: 80,
            displayValue: true,
            fontSize: 14,
            margin: 10,
            background: "#ffffff",
            lineColor: "#1d1d1f"
          });
          barcodeGenerated = true;
        } catch(e) {
          console.error("Barcode generation error:", e);
          const container = document.getElementById('barcode-svg-container');
          if (container) {
            container.innerHTML = '<p style="color:#ef4444;font-size:12px;text-align:center;padding:20px;">Failed to generate barcode</p>';

        }

            ${variantDetailsHTML}
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
              <button onclick="addToCart(${product.id})" ${isCurrentlyOut && hasVariants ? 'disabled' : ''} style="padding:14px;${isCurrentlyOut && hasVariants ? 'background:#e5e5e5;cursor:not-allowed;' : 'background:#1d1d1f;'}color:white;border:none;border-radius:16px;font-weight:700;text-transform:uppercase;font-size:12px;">Add to Bag</button>
              <button onclick="addToCart(${product.id},true)" ${isCurrentlyOut && hasVariants ? 'disabled' : ''} style="padding:14px;background:white;border:2px solid #1d1d1f;color:#1d1d1f;border-radius:16px;font-weight:700;text-transform:uppercase;font-size:12px;">Buy Now</button>
            </div>
            
            ${product.short_description ? `<p style="font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.6;font-style:italic;">${product.short_description}</p>` : ''}
            
            <!-- SPECIFICATIONS TOGGLE -->
            <button class="toggle-btn" onclick="toggleCollapse('specs-collapse','specs-icon')">
              <span><i class="fa-solid fa-sliders" style="margin-right:8px;"></i>Specifications</span>
              <i id="specs-icon" class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="specs-collapse" class="collapse-section">
              <div class="specs-grid">
                ${product.fabric_type ? `<div class="detail-badge"><i class="fa-solid fa-shirt"></i><div><span style="color:#9ca3af;font-size:9px;">Fabric</span><br><span style="font-weight:700;">${product.fabric_type}</span></div></div>` : ''}
                ${product.gsm_type ? `<div class="detail-badge"><i class="fa-solid fa-weight-scale"></i><div><span style="color:#9ca3af;font-size:9px;">GSM</span><br><span style="font-weight:700;">${product.gsm_type}</span></div></div>` : ''}
                ${product.fit_type ? `<div class="detail-badge"><i class="fa-solid fa-ruler"></i><div><span style="color:#9ca3af;font-size:9px;">Fit</span><br><span style="font-weight:700;">${product.fit_type}</span></div></div>` : ''}
                ${product.gender ? `<div class="detail-badge"><i class="fa-solid fa-venus-mars"></i><div><span style="color:#9ca3af;font-size:9px;">Gender</span><br><span style="font-weight:700;">${product.gender}</span></div></div>` : ''}
                ${product.print_type ? `<div class="detail-badge"><i class="fa-solid fa-palette"></i><div><span style="color:#9ca3af;font-size:9px;">Print</span><br><span style="font-weight:700;">${product.print_type}</span></div></div>` : ''}
                ${product.sku ? `<div class="detail-badge"><i class="fa-solid fa-barcode"></i><div><span style="color:#9ca3af;font-size:9px;">SKU</span><br><span style="font-weight:700;font-size:10px;">${product.sku}</span></div></div>` : ''}
              </div>
            </div>
            
            <!-- DESCRIPTION TOGGLE -->
            ${product.description ? `
            <button class="toggle-btn" onclick="toggleCollapse('desc-collapse','desc-icon')">
              <span><i class="fa-solid fa-align-left" style="margin-right:8px;"></i>Description</span>
              <i id="desc-icon" class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="desc-collapse" class="collapse-section">
              <div class="description-content">${product.description}</div>
            </div>` : ''}
            
            <!-- BARCODE TOGGLE -->
            ${currentBarcode ? `
            <button class="toggle-btn" onclick="toggleCollapse('barcode-collapse','barcode-icon', '${safeBarcode}')">
              <span><i class="fa-solid fa-upc" style="margin-right:8px;"></i>Barcode</span>
              <i id="barcode-icon" class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="barcode-collapse" class="collapse-section">
              <div class="barcode-wrapper" id="barcode-svg-container">
                <svg id="barcode-svg"></svg>
              </div>
            </div>` : ''}
            
          </div>
        </div>
        <div style="border-top:1px solid #e5e5e5;padding-top:32px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;"><h3 style="font-size:24px;font-weight:700;">Reviews</h3><span style="color:#9ca3af;">(${prodReviews.length})</span></div>
          <div style="margin-bottom:24px;">${reviewsHTML}</div>
          <div style="background:#f5f5f7;padding:20px;border-radius:16px;">
            <h4 style="font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:12px;">Write a Review</h4>
            <div class="star-rating" style="margin-bottom:12px;">
              <input type="radio" id="star5" name="product-rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star4" name="product-rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star3" name="product-rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star2" name="product-rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
              <input type="radio" id="star1" name="product-rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
            </div>
            <textarea id="review-text" placeholder="Share your experience..." style="width:100%;padding:12px;border:1px solid #e5e5e5;border-radius:12px;font-size:12px;height:80px;margin-bottom:12px;font-family:Inter,sans-serif;"></textarea>
            <button onclick="submitReview(${product.id})" style="padding:10px 24px;background:#1d1d1f;color:white;border:none;border-radius:9999px;font-weight:700;text-transform:uppercase;font-size:10px;cursor:pointer;">Submit</button>
          </div>
        </div>`;
        
        // Initialize size buttons for first color
        if (productColors.length > 0 && productSizes.length > 0) {
          setTimeout(() => {
            updateSizeButtons(productColors[0].id);
            
            // Auto-select first available size
            const availableSizes = getSizesForColor(productColors[0].id);
            if (availableSizes.length > 0) {
              const firstSizeBtn = document.querySelector(`.size-btn[data-size-id="${availableSizes[0].id}"]`);
              if (firstSizeBtn) {
                firstSizeBtn.click();
              }
            }
          }, 100);
        }
        
        const related = getRandomProducts(product.id, 4);
        if (related.length) {
          ctlSection.style.display = 'block';
          ctlGrid.innerHTML = related.map(p => productCardHTML(p)).join('');
        } else { 
          ctlSection.style.display = 'none'; 
        }
      }
      
      async function loadProductBySlug(slug) {
        try {
          const { data: products, error: prodErr } = await _supabase.from('products').select('*').eq('status', 'Active');
          if (prodErr) throw prodErr;
          allProducts = products || [];
          const product = allProducts.find(p => (p.slug || generateSlug(p.title)) === slug);
          if (!product) return false;
          
          // Load colors, sizes, and variants
          const [colorRes, sizeRes, varRes, revRes] = await Promise.all([
            _supabase.from('product_colors').select('*').eq('product_id', product.id).order('sort_order', { ascending: true }),
            _supabase.from('color_sizes').select('*').order('sort_order', { ascending: true }),
            _supabase.from('product_variants').select('*').eq('product_id', product.id).eq('is_active', true),
            _supabase.from('product_reviews').select('*').eq('product_id', product.id).order('created_at', { ascending: false })
          ]);
          
          allColors = colorRes.data || [];
          allSizes = sizeRes.data || [];
          allVariants = varRes.data || [];
          allReviews = revRes.data || [];
          
          try {
            let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
            recent = [product.id.toString(), ...recent.filter(id => id != product.id)].slice(0,8);
            localStorage.setItem('jayen_recent', JSON.stringify(recent));
          } catch(e) {}
          
          renderProductDetails(product);
          return true;
        } catch(e) { 
          console.error(e); 
          return false; 
        }
      }
      
      function hideLoader() {
        if (loader) { 
          loader.style.opacity = '0'; 
          loader.style.transition = 'opacity 0.5s'; 
          setTimeout(() => { loader.style.display = 'none'; }, 600); 
        }
      }
      
      function showNotFound() {
        hideLoader();
        if (loadingDiv) loadingDiv.style.display = 'none';
        if (contentDiv) contentDiv.innerHTML = '';
        if (ctlSection) ctlSection.style.display = 'none';
        if (notFoundDiv) notFoundDiv.style.display = 'block';
      }
      
      async function init() {
        initLocalStorage();
        updateCartCount();
        document.getElementById('display-year').innerText = new Date().getFullYear();
        const slug = getSlugFromURL();
        if (!slug) { showNotFound(); return; }
        if (loadingDiv) loadingDiv.style.display = 'grid';
        if (notFoundDiv) notFoundDiv.style.display = 'none';
        const found = await loadProductBySlug(slug);
        if (!found) showNotFound(); 
        else hideLoader();
      }
      
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
</body>
</html>
