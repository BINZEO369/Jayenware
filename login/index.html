    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c9a96e;

        }
        
        * {

        body {

        }

        /* Glass Navigation */
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(50px) saturate(180%);

            top: 0;
            left: 0;
            right: 0;
            z-index: 50;

        .glass-nav .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (min-width: 640px) {
            .glass-nav .nav-inner {
                height: 64px;
                padding: 0 24px;
            }
        }
        
        @media (min-width: 1024px) {
            .glass-nav .nav-inner {
                height: 80px;
                padding: 0 32px;
            }
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
        }
        
        .brand-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }
        
        .brand-logo span {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -0.5px;
        }
        
        @media (min-width: 640px) {
            .brand-logo span {
                font-size: 20px;
            }
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 16px 40px;
        }
        
        @media (min-width: 640px) {
            main {
                padding: 100px 24px 60px;
            }
        }

        /* Auth Card */
        .auth-card {
            background: white;
            width: 100%;
            max-width: 440px;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        
        @media (min-width: 640px) {
            .auth-card {
                border-radius: 32px;
                padding: 48px 40px;
            }
        }

        .auth-card .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-card .logo-area img {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        
        .auth-card .logo-area h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 24px;
            color: var(--primary);
        }
        
        .auth-card .logo-area p {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Tab Buttons */
        .tab-buttons {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 28px;
        }
        
        .tab-buttons a {
            flex: 1;
            text-align: center;
            padding-bottom: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-buttons a.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .tab-buttons a.inactive {
            color: #bbb;
        }
        
        .tab-buttons a.inactive:hover {
            color: var(--primary);
            border-bottom-color: #ddd;
        }

        /* Form Styles */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }
        
        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 14px;
            transition: color 0.3s;
            pointer-events: none;
        }
        
        .input-group input:focus ~ i {
            color: var(--accent);
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border: 1.5px solid #e5e5e5;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
        }
        
        @media (max-width: 640px) {
            .input-group input {
                font-size: 16px;
                padding: 16px 14px 16px 42px;
            }
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            background: var(--accent);
            box-shadow: 0 8px 24px rgba(201,169,110,0.3);
        }
        
        @media (max-width: 640px) {
            .submit-btn {
                padding: 16px;
            }
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #ccc;
            font-size: 10px;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e5e5e5;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: #999;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .home-link:hover {
            color: var(--primary);
        }
        
        .home-link i {
            margin-right: 4px;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: calc(100vw - 32px);
        }
        
        #toast .toast-inner {
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            border: 1px solid #f0f0f0;
        }
        
        #toast .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .toast-success {
            background: #ecfdf5;
            color: #059669;
        }
        
        .toast-error {
            background: #fef2f2;
            color: #dc2626;
        }
        
        #toast .toast-text {
            font-size: 12px;
            font-weight: 700;
            flex-grow: 1;
        }
        
        #toast .toast-close {
            color: #ccc;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            padding: 4px;
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader-overlay .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e5e5e5;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-overlay .loader-text {
            margin-top: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 11px;
            color: rgba(26,26,26,0.6);
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: #bbb;
        }
        
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
        
        .auth-footer a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="global-loader">
        <div class="spinner"></div>
        <p class="loader-text">JAYENWARE</p>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-inner">
            <a href="/" class="brand-logo">
                <img src="https://vdqbjwzixppbtkbgvhlq.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png" alt="JAYENWARE Logo">
                <span>JAYENWARE</span>
            </a>
            <a href="/" style="text-decoration:none;font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="auth-card">
            <div class="logo-area">
                <img src="https://vdqbjwzixppbtkbgvhlq.supabase.co/storage/v1/object/public/images/Beige%20Black%20Minimal%20Simple%20Modern%20Handwritten%20Graffiti%20Typographic%20Arts%20and_20251212_154142_0000.png" alt="JAYENWARE">
                <h1>Welcome Back</h1>
                <p>Sign in to continue shopping</p>
            </div>

            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <a href="javascript:void(0)" class="active"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                <a href="/sign-up" class="inactive"><i class="fa-solid fa-user-plus"></i> Sign Up</a>
            </div>

            <!-- Login Form -->
            <form id="login-form" autocomplete="on">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email Address" required autocomplete="email">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="divider">or</div>

            <a href="/sign-up" class="submit-btn" style="background:transparent;color:var(--primary);border:2px solid var(--primary);">
                <i class="fa-solid fa-user-plus"></i> Create New Account
            </a>

            <a href="/" class="home-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Store
            </a>
        </div>
    </main>

    <!-- Footer -->
    <div class="auth-footer">
        <p>Powered by <a href="https://binzeo.vercel.app" target="_blank" rel="noopener">BINZEO</a></p>
        <p>&copy; 2025 JAYENWARE. All rights reserved.</p>
    </div>

    <!-- Toast Notification -->
    <div id="toast">
        <div class="toast-inner">
            <div class="toast-icon" id="toast-icon"></div>
            <span class="toast-text" id="toast-text"></span>
            <button class="toast-close" onclick="hideToast()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://vdqbjwzixppbtkbgvhlq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcWJqd3ppeHBwYnRrYmd2aGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc3MzQsImV4cCI6MjA5MzU4MzczNH0.E6C0_7SWIrTMJlFe5t8EbNAW5fzlpg-fKV3ZV0XYd3k";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Toast Functions
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            if (type === 'success') {
                icon.className = 'toast-icon toast-success';
                icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'error') {
                icon.className = 'toast-icon toast-error';
                icon.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            }
            
            document.getElementById('toast-text').innerText = text;
            toast.style.transform = 'translateX(0)';
            
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
            }, 3000);
        }

        function hideToast() {
            document.getElementById('toast').style.transform = 'translateX(120%)';
        }

        // Show Global Loader
        function showLoader(ms = 1500) {
            const loader = document.getElementById('global-loader');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, ms);
        }

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                // Already logged in, redirect to account page
                window.location.href = '/account';
            }
            // Hide loader
            document.getElementById('global-loader').style.display = 'none';
        }

        // Handle Login Form Submission
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            showLoader(3000);
            
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                showToast(error.message, 'error');
                return;
            }
            
            if (data.session) {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/account';
                }, 1000);
            }
        });

        // Initialize
        checkSession();
    </script>

</body>
